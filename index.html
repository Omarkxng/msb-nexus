function toggleConnect() {
  if (isConnected) disconnect(); else connectDeriv();
}

let _wsSubscriptionId = null;
let _wsReconnectTimer = null;
let _wsConnectTimeout = null;

function connectDeriv() {
  // Clean up any existing connection first
  if (ws) { try { ws.close(); } catch(e){} ws = null; }
  clearTimeout(_wsReconnectTimer);
  clearTimeout(_wsConnectTimeout);

  const rawId = (document.getElementById('appIdInput').value || '').trim();
  const appId = rawId || '1089';

  // Validate App ID — must be numeric only
  if (rawId && !/^\d{1,10}$/.test(rawId)) {
    addAlert('Invalid App ID: must be a numeric value (e.g. 1089)', 'bear');
    setStatus('error', '✕ BAD APP ID');
    return;
  }
  setStatus('connecting', '◌ CONNECTING...');
  document.getElementById('loadingMsg').textContent = 'CONNECTING TO DERIV...';
  document.getElementById('chart-loading').style.display = 'flex';

  // Connection timeout — if no open event in 8s, show error
  _wsConnectTimeout = setTimeout(() => {
    if (!isConnected) {
      setStatus('error', '✕ TIMEOUT');
      document.getElementById('chart-loading').style.display = 'none';
      document.getElementById('loadingMsg').textContent = 'CONNECTION TIMEOUT';
      addAlert('Connection timed out — check your internet or App ID', 'bear');
      document.getElementById('connectBtn').textContent = 'CONNECT';
      if (ws) { try { ws.close(); } catch(e){} ws = null; }
    }
  }, 8000);

  try {
    ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=' + appId);
  } catch(e) {
    setStatus('error', '✕ FAILED');
    document.getElementById('chart-loading').style.display = 'none';
    addAlert('WebSocket failed: ' + e.message, 'bear');
    return;
  }

  ws.onopen = () => {
    clearTimeout(_wsConnectTimeout);
    isConnected = true;
    _wsSubscriptionId = null;
    setStatus('live', '◉ LIVE');
    document.getElementById('connectBtn').textContent = 'DISCONNECT';
    document.getElementById('demoBtn').classList.remove('active');
    document.getElementById('loadingMsg').textContent = 'FETCHING CANDLES...';
    requestCandles();
    // Auto-start background live scan after chart loads
    setTimeout(() => {
      if (isConnected) {
        startLiveScan();
        addAlert('Auto-scan started on connect', 'bull');
        // Also open scanner overlay to show results
        if (!_scannerOpen) {
          setTimeout(() => { if (isConnected && !_scannerOpen) toggleScanner(); }, 3000);
        }
      }
    }, 2000);
  };

  ws.onmessage = (e) => {
    try { handleWSMessage(JSON.parse(e.data)); }
    catch(err) { console.warn('WS parse error', err); }
  };

  ws.onerror = (e) => {
    clearTimeout(_wsConnectTimeout);
    setStatus('error', '✕ ERROR');
    document.getElementById('chart-loading').style.display = 'none';
    document.getElementById('connectBtn').textContent = 'CONNECT';
    addAlert('Connection error — check App ID and internet connection', 'bear');
  };

  ws.onclose = (e) => {
    clearTimeout(_wsConnectTimeout);
    const wasConnected = isConnected;
    isConnected = false;
    _wsSubscriptionId = null;
    document.getElementById('connectBtn').textContent = 'CONNECT';
    if (wasConnected) {
      setStatus('error', '✕ DISCONNECTED');
      addAlert('Disconnected (code ' + e.code + ') — reconnecting…', 'bear');
      // Auto-reconnect after 3s — scanner drops can cause main WS to close
      _wsReconnectTimer = setTimeout(() => {
        if (!isConnected) {
          addAlert('Auto-reconnecting…', 'neutral');
          connectDeriv();
        }
      }, 3000);
    } else {
      setStatus('demo', '◉ DEMO MODE');
    }
  };
}

function disconnect() {
  clearTimeout(_wsReconnectTimer);
  clearTimeout(_wsConnectTimeout);
  isConnected = false;
  if (ws) { try { ws.close(); } catch(e){} ws = null; }
  if (_liveScanWS) { try { _liveScanWS.close(); } catch(e){} _liveScanWS = null; }
  clearTimeout(_liveScanInterval); _liveScanInterval = null;
  setStatus('demo', '◉ DEMO MODE');
  document.getElementById('connectBtn').textContent = 'CONNECT';
}

function requestCandles() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  // Forget previous subscription first, then request new candles after a brief gap
  // to avoid Deriv rejecting overlapping subscription requests
  if (_wsSubscriptionId) {
    ws.send(JSON.stringify({ forget: _wsSubscriptionId }));
    _wsSubscriptionId = null;
    setTimeout(_doRequestCandles, 300);
  } else {
    ws.send(JSON.stringify({ forget_all: 'candles' }));
    setTimeout(_doRequestCandles, 300);
  }
}

function _doRequestCandles() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    ticks_history: currentSymbol,
    adjust_start_time: 1,
    count: 500,
    end: 'latest',
    granularity: currentTF,
    style: 'candles',
    subscribe: 1,
  }));
}

function handleWSMessage(data) {
  if (data.error) {
    const code = data.error.code || '';
    // Ignore forget/subscription cleanup errors silently
    if (code === 'InvalidToken' || code === 'AlreadySubscribed') return;
    if (code === 'MarketIsClosed') { addAlert('Market closed: ' + currentSymbol, 'warn'); return; }
    // Generic server error — retry candle request once after a short delay
    addAlert('API error: ' + data.error.message + ' — retrying…', 'bear');
    document.getElementById('chart-loading').style.display = 'none';
    setTimeout(() => { if (isConnected) _doRequestCandles(); }, 1500);
    return;
  }
  if (data.msg_type === 'candles') {
    // Save subscription ID so we can forget it cleanly when switching symbol/tf
    if (data.subscription) _wsSubscriptionId = data.subscription.id;
    candles = data.candles.map(c => ({
      time: c.epoch,
      open: parseFloat(c.open), high: parseFloat(c.high),
      low: parseFloat(c.low), close: parseFloat(c.close),
      volume: Math.round(Math.abs(parseFloat(c.close) - parseFloat(c.open)) / parseFloat(c.close) * 100000) + 100,
    }));
    renderChart(); runAnalysis(true);
    document.getElementById('chart-loading').style.display = 'none';
    addAlert('Live data: ' + currentSymbol + ' ' + tfLabel(currentTF), 'bull');
  }
  if (data.msg_type === 'ohlc') {
    const o = data.ohlc;
    const barTime = parseInt(o.open_time);
    const bar = {
      time:   barTime,
      open:   parseFloat(o.open),
      high:   parseFloat(o.high),
      low:    parseFloat(o.low),
      close:  parseFloat(o.close),
      volume: Math.round(Math.abs(parseFloat(o.close) - parseFloat(o.open)) / parseFloat(o.close) * 100000) + 100,
    };
    const last    = candles[candles.length - 1];
    const isNewBar = !last || last.time !== barTime;
    if (isNewBar) {
      _lastConfirmedBarTime = last ? last.time : 0;
      candles.push(bar);
      // Keep live scanner cache in sync with chart candles
      _liveScanResults[currentSymbol + currentTF] = candles;
      runAnalysis(true);
    } else {
      candles[candles.length - 1] = bar;
      if (candleSeries) candleSeries.update({ time: bar.time, open: bar.open, high: bar.high, low: bar.low, close: bar.close });
      updateTickerPrice();
      if (_openTrades.length > 0) refreshPnL(); // skip DOM work when nothing is open
      // Throttled analysis on tick — max once per 4 seconds
      const _now = Date.now();
      if (!_tickThrottle || _now - _tickThrottle > 6000) {
        _tickThrottle = _now;
        runAnalysis(false);
      }
    }
  }
}

function tfLabel(tf) {
  return {60:'1m',120:'2m',300:'5m',600:'10m',900:'15m',1800:'30m',3600:'1h',14400:'4h',86400:'1D'}[tf] || tf+'s';
}

function generateDemoCandles(symbol, tf, count) {
  const now = Math.floor(Date.now() / 1000);
  const bars = [];
  const basePrice =
    symbol === 'BOOM1000' || symbol === 'CRASH1000' ? 3000 :
    symbol === 'BOOM500'  || symbol === 'CRASH500'  ? 3500 :
    symbol === 'BOOM300'  || symbol === 'CRASH300'  ? 4000 :
    symbol === 'STPRNG'   ? 8300 :
    symbol === 'RNGBR100' ? 1200 :
    symbol === 'RNGBR200' ? 1200 :
    symbol === 'DSW10'    ? 1000 :
    symbol.includes('R_10')  ? 5200 :
    symbol.includes('R_25')  ? 4800 :
    symbol.includes('R_50')  ? 4500 :
    symbol.includes('R_75')  ? 4200 :
    symbol.includes('R_100') ? 3900 :
    symbol.includes('JD')    ? 2000 : 1000;

  let price = basePrice;
  const vltMap = {
    R_10:0.0008, R_25:0.002, R_50:0.005, R_75:0.0085, R_100:0.012,
    BOOM1000:0.004, BOOM500:0.005, BOOM300:0.006,
    CRASH1000:0.004, CRASH500:0.005, CRASH300:0.006,
    STPRNG:0.00005,
    RNGBR100:0.003, RNGBR200:0.003,
    DSW10:0.002,
    JD10:0.006,JD25:0.009,JD50:0.012,JD75:0.015,JD100:0.018,
    '1HZ10V':0.001,'1HZ25V':0.002,'1HZ50V':0.005,'1HZ75V':0.009,'1HZ100V':0.014,
  };
  const vlt = vltMap[symbol] || 0.008;

  // Boom: mostly rises, occasional sharp spike DOWN; Crash: opposite
  const isBoom  = symbol.includes('BOOM');
  const isCrash = symbol.includes('CRASH');
  // Spike probability per bar
  const spikeProb = isBoom ? 0.003 : isCrash ? 0.003 : 0;
  // Spike magnitude (multiplier of ATR)
  const spikeMag  = isBoom ? -0.08 : 0.08; // Boom spikes down, Crash spikes up

  const dp = symbol.includes('R_10') || symbol.includes('1HZ10V') || symbol.includes('1HZ25V') || symbol.includes('1HZ50V') || symbol.includes('1HZ75V') ? 3 : symbol === 'STPRNG' ? 1 : 2;
  let trendBias = 0, trendBarsLeft = 0;

  for (let i = count - 1; i >= 0; i--) {
    if (trendBarsLeft <= 0) {
      // Boom/Crash trend strongly in one direction between spikes
      if (isBoom)  trendBias = 0.0015 + Math.random() * 0.001;  // upward drift
      else if (isCrash) trendBias = -(0.0015 + Math.random() * 0.001); // downward drift
      else trendBias = (Math.random() - 0.5) * 0.003;
      trendBarsLeft = Math.floor(Math.random() * 40) + 10;
    }
    trendBarsLeft--;

    let baseMove = (Math.random() - 0.5 + trendBias) * vlt;

    // Inject spike bar
    const isSpike = spikeProb > 0 && Math.random() < spikeProb;
    if (isSpike) {
      baseMove = spikeMag * (0.5 + Math.random() * 0.5);
      trendBarsLeft = 0; // reset trend after spike
    }

    const range = Math.abs(baseMove) * price + price * vlt * 0.5;
    const open  = price;
    const close = price * (1 + baseMove);
    const high  = Math.max(open, close) + Math.random() * range * (isSpike ? 0.1 : 0.5);
    const low   = Math.min(open, close) - Math.random() * range * (isSpike ? 0.1 : 0.5);
    const movePct  = Math.abs(close - open) / open;
    const volMult  = isSpike ? 8 + Math.random() * 4 : (Math.random() < 0.05 ? 3 + Math.random() * 4 : 1);
    const normalVol = Math.round(movePct * 100000 * (0.5 + Math.random()) * volMult);
    bars.push({
      time: now - i * tf,
      open: parseFloat(open.toFixed(dp)), high: parseFloat(high.toFixed(dp)),
      low: parseFloat(low.toFixed(dp)),   close: parseFloat(close.toFixed(dp)),
      volume: Math.max(100, Math.min(99999, normalVol)),
    });
    price = close;
  }
  return bars;
}

function computeHA(raw) {
  const ha = [];
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    const haC = (c.open + c.high + c.low + c.close) / 4;
    const haO = i === 0 ? (c.open + c.close) / 2 : (ha[i-1].open + ha[i-1].close) / 2;
    const haH = Math.max(c.high, haO, haC);
    const haL = Math.min(c.low,  haO, haC);
    ha.push({ time: c.time, open: haO, high: haH, low: haL, close: haC, volume: c.volume });
  }
  return ha;
}

  _haEnabled = !_haEnabled;

function renderChart() {

function updateTickerPrice() {
  if (candles.length < 2) return;
  const cur  = candles[candles.length - 1].close;
  const prev = candles[candles.length - 2].close;
  const chg  = ((cur - prev) / prev) * 100;
  const dp   = getDP();
  document.getElementById('tickerPrice').textContent = sf(cur,dp);
  const chgEl = document.getElementById('tickerChg');
  chgEl.textContent = ' ' + (chg >= 0 ? '+' : '') + sf(chg,2) + '%';
  chgEl.style.color = chg >= 0 ? 'var(--bull)' : 'var(--bear)';
}

// ═══════════════════════════════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════════════════════════════
function sma(arr, len) {
  // O(n) sliding window SMA
  const result = new Array(arr.length).fill(0);
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    sum += arr[i];
    if (i >= len) sum -= arr[i - len];
    if (i >= len - 1) result[i] = sum / len;
  }
  return result;
}

function stdev(arr, len) {
  // O(n) Welford-style rolling stdev
  const result = new Array(arr.length).fill(0);
  let sumX = 0, sumX2 = 0;
  for (let i = 0; i < arr.length; i++) {
    sumX  += arr[i];  sumX2  += arr[i] * arr[i];
    if (i >= len) { sumX -= arr[i-len]; sumX2 -= arr[i-len] * arr[i-len]; }
    if (i >= len - 1) {
      const mean = sumX / len;
      const variance = sumX2 / len - mean * mean;
      result[i] = variance > 0 ? Math.sqrt(variance) : 0;
    }
  }
  return result;
}

function calcRSI(closes, len) {
  if (closes.length < len + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - len; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  const avgGain = gains / len;
  const avgLoss = losses / len;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcEMA(arr, len) {
  const result = new Array(arr.length).fill(0);
  const k = 2 / (len + 1);
  let ema = arr[0];
  result[0] = ema;
  for (let i = 1; i < arr.length; i++) {
    ema = arr[i] * k + ema * (1 - k);
    result[i] = ema;
  }
  return result;
}

function percentRank(arr, len, idx) {
  const start = Math.max(0, idx - len + 1);
  const window = arr.slice(start, idx + 1);
  const val = arr[idx];
  const below = window.filter(v => v < val).length;
  return (below / window.length) * 100;
}

// FIX: Proper Wilder ATR (EMA-based, not SMA)
function calcATR(candles, len) {
  if (candles.length < len + 1) return 0;
  // True ranges
  const tr = candles.map((c, i) => {
    if (i === 0) return c.high - c.low;
    return Math.max(c.high - c.low, Math.abs(c.high - candles[i-1].close), Math.abs(c.low - candles[i-1].close));
  });
  // Seed with SMA of first `len` bars
  let atr = tr.slice(0, len).reduce((a, b) => a + b, 0) / len;
  for (let i = len; i < tr.length; i++) {
    atr = (atr * (len - 1) + tr[i]) / len; // Wilder smoothing
  }
  return atr;
}

// Spike ATR: average of worst N% single-bar moves (for Jump/Boom/Crash SL clearance)
function calcSpikeATR(candleArr, lookback) {
  if (!candleArr || candleArr.length < 10) return 0;
  const recent = candleArr.slice(-Math.min(lookback, candleArr.length));
  const barMoves = recent.map(c => c.high - c.low);
  barMoves.sort((a, b) => b - a);
  // Take average of top 10% worst bars
  const topN = Math.max(1, Math.floor(barMoves.length * 0.1));
  const sum = barMoves.slice(0, topN).reduce((a, b) => a + b, 0);
  return sum / topN;
}


function formatVol(v) {
  const n = Number(v) || 0;
  if (n >= 1e6) return sf(n/1e6,1)+'M';
  if (n >= 1e3) return sf(n/1e3,0)+'K';
  return Math.floor(n).toString();
}

// Safe toFixed — never throws. Returns '—' for null/undefined/NaN/Infinity
function sf(val, dp) {
  if (val === null || val === undefined || isNaN(Number(val)) || !isFinite(Number(val))) return '—';
  return Number(val).toFixed(dp === undefined ? 2 : dp);
}
// Safe number — returns fallback if invalid
function sn(val, fallback) {
  const n = Number(val);
  return (val === null || val === undefined || isNaN(n) || !isFinite(n)) ? (fallback || 0) : n;
}

// FIX: determine correct decimal places for symbol (accepts optional param for scanner)
function getDP(sym) {
  const s = sym || currentSymbol;
  if (s.includes('R_10') || s.includes('1HZ10V') || s.includes('1HZ25V') || s.includes('1HZ50V') || s.includes('1HZ75V')) return 3;
  if (s.includes('STPRNG')) return 1;
  return 2;
}

// ── MT5 Symbol Specifications ─────────────────────────────────
// Digits = decimal places on MT5
// tickSize = minimum price increment (prices must be multiples of this)
// minStopPts = minimum distance in POINTS between entry and SL/TP
//   (MT5 "freeze level" + spread buffer — conservative values)
// Points on MT5 Deriv = 1 unit of the last decimal place
// e.g. Vol 75 has 2 digits → 1 point = 0.01
function getSymbolMT5Spec(sym) {
  const s = sym || currentSymbol;
  const specs = {
    // Volatility Indices
    'R_10':      { digits: 3, tickSize: 0.001, minStopPts: 1   },
    'R_25':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'R_50':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'R_75':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'R_100':     { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    // 1-second Volatility
    '1HZ10V':    { digits: 3, tickSize: 0.001, minStopPts: 1   },
    '1HZ25V':    { digits: 3, tickSize: 0.001, minStopPts: 1   },
    '1HZ50V':    { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    '1HZ75V':    { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    '1HZ100V':   { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    // Boom & Crash
    'BOOM1000':  { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'BOOM500':   { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'BOOM300':   { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'CRASH1000': { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'CRASH500':  { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'CRASH300':  { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    // Step Index
    'STPRNG':    { digits: 1, tickSize: 0.10,  minStopPts: 10  },
    // Range Break
    'RNGBR100':  { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'RNGBR200':  { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    // Drift Switch
    'DSW10':     { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    // Jump Indices
    'JD10':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'JD25':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'JD50':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'JD75':      { digits: 2, tickSize: 0.01,  minStopPts: 1   },
    'JD100':     { digits: 2, tickSize: 0.01,  minStopPts: 1   },
  };
  return specs[s] || { digits: 2, tickSize: 0.01, minStopPts: 1 };
}

// Round a price to the symbol's tick size (MT5-safe value)
function roundToTick(price, sym) {
  const spec = getSymbolMT5Spec(sym);
  const tick = spec.tickSize;
  // Round to nearest tick then fix floating point drift
  return parseFloat((Math.round(price / tick) * tick).toFixed(spec.digits));
}

// Ensure SL is at least minStopPts away from entry on correct side
// Returns adjusted SL that MT5 will accept
function enforceMT5StopDistance(entry, sl, tp, dir, sym) {
  const spec  = getSymbolMT5Spec(sym);
  const tick  = spec.tickSize;
  const minD  = spec.minStopPts * tick;  // minimum distance in price units
  const isBull = dir === 'LONG';

  // Round entry, sl, tp to tick size
  let e = roundToTick(entry, sym);
  let s = roundToTick(sl, sym);
  let t = roundToTick(tp, sym);

  // Enforce SL is on correct side with minimum distance
  if (isBull) {
    const maxSL = e - minD;
    if (s >= e)           s = roundToTick(e - minD * 2, sym);  // SL above entry — push below
    else if (e - s < minD) s = roundToTick(e - minD * 2, sym); // too close — push further
    if (s > maxSL)        s = roundToTick(maxSL - tick, sym);
  } else {
    const minSL = e + minD;
    if (s <= e)            s = roundToTick(e + minD * 2, sym);
    else if (s - e < minD) s = roundToTick(e + minD * 2, sym);
    if (s < minSL)         s = roundToTick(minSL + tick, sym);
  }

  // Enforce TP is on correct side with minimum distance
  if (isBull) {
    if (t <= e)            t = roundToTick(e + minD * 2, sym);
    else if (t - e < minD) t = roundToTick(e + minD * 2, sym);
  } else {
    if (t >= e)            t = roundToTick(e - minD * 2, sym);
    else if (e - t < minD) t = roundToTick(e - minD * 2, sym);
  }

  return { entry: e, sl: s, tp: t };
}

function _extractOBsOnly(candleArr, symId) {
  if (!candleArr || candleArr.length < 50) return [];
  const n = candleArr.length;
  const closes = candleArr.map(c => c.close);
  const highs  = candleArr.map(c => c.high);
  const lows   = candleArr.map(c => c.low);
  const opens  = candleArr.map(c => c.open);
  const vols   = candleArr.map(c => c.volume);
  const changes = closes.map((c, i) => i > 0 ? c - closes[i-1] : 0);
  const avgChange = sma(changes, 50);
  const stdChange = stdev(changes, 50);
  const barRanges = candleArr.map(c => c.high - c.low);
  const spikeFlags = barRanges.map((r, i) => {
    if (i < 20) return false;
    const avg = barRanges.slice(i-20, i).reduce((a,b) => a+b, 0) / 20;
    return r > avg * 3.0;
  });
  const pLen = 3;
  const pivotHighs = [], pivotLows = [];
  for (let i = pLen; i < n - pLen; i++) {
    let isH = true, isL = true;
    for (let j = i-pLen; j <= i+pLen; j++) {
      if (j === i) continue;
      if (highs[j] >= highs[i]) isH = false;
      if (lows[j]  <= lows[i])  isL = false;
    }
    if (isH && !spikeFlags[i]) pivotHighs.push({ idx: i, val: highs[i] });
    if (isL && !spikeFlags[i]) pivotLows.push({ idx: i, val: lows[i] });
  }
  const msbEvents = [];
  let lastPH = null, lastPL = null;
  for (let i = 1; i < n; i++) {
    const newPH = pivotHighs.find(p => p.idx === i - pLen);
    const newPL = pivotLows.find(p => p.idx === i - pLen);
    if (newPH) lastPH = newPH;
    if (newPL) lastPL = newPL;
    if (!lastPH || !lastPL) continue;
    const mZ = stdChange[i] !== 0 ? (changes[i] - avgChange[i]) / stdChange[i] : 0;
    if (closes[i] > lastPH.val && closes[i-1] <= lastPH.val && mZ > 0.3 && !spikeFlags[i])
      msbEvents.push({ idx: i, dir: 'bull' });
    if (closes[i] < lastPL.val && closes[i-1] >= lastPL.val && mZ < -0.3 && !spikeFlags[i])
      msbEvents.push({ idx: i, dir: 'bear' });
  }
  const obs = [];
  for (const msb of msbEvents) {
    const isBull = msb.dir === 'bull';
    let obIdx = -1;
    for (let k = 1; k <= 15; k++) {
      const ci = msb.idx - k;
      if (ci < 0) break;
      if ((isBull && closes[ci] < opens[ci]) || (!isBull && closes[ci] > opens[ci])) { obIdx = ci; break; }
    }
    if (obIdx < 0) continue;
    const obTop = highs[obIdx], obBot = lows[obIdx];
    if (obs.some(o => obTop <= o.top && obTop >= o.bottom)) continue;
    let mitigated = false;
    for (let j = obIdx+1; j < n; j++) {
      if (isBull ? lows[j] < obBot : highs[j] > obTop) { mitigated = true; break; }
    }
    if (!mitigated) obs.push({ top: obTop, bottom: obBot, isBull, score: 50 });
  }
  return obs.slice(-16);
}

  const _volRankCache = new Float32Array(n);
  { const _sorted = vols.slice().sort((a,b) => a-b);

    for (let k = 1; k <= CFG.obLookback; k++) {

    nearestRes   = srResistance[0] || null;
    if (nearestSup && nearestRes) {
      const _sd = closes[n-1] - nearestSup.price;
      const _rd = nearestRes.price - closes[n-1];
      if      (_sd <= atr * 1.2) srZone = 'AT SUPPORT';
      else if (_rd <= atr * 1.2) srZone = 'AT RESIST';
      else                        srZone = 'MID RANGE';
    }
  }

  currentSymbol = savedSym; // restore before returning
  return {
    symId, rsi, spikeAtr, candleArr,
    ema20, ema50, ema200, emaTrend,
    activeFVGs, recentSweeps,
    momentumZ, volPctRank, volZScore, atr, atrPct,
    msbBull, msbBear, recentBull, recentBear,
    totalBullMSBs: msbBull.length, totalBearMSBs: msbBear.length,
    activeOBs: activeOBsFinal,
    buyVol: buyVolSum, sellVol: sellVolSum,
    recentSwings, avgSwingPct, minSwingPct, maxSwingPct,
    fsDir, fsTarget, fsFromPrice, fsFromIdx,
    currentPrice: closes[n-1],
    trendStrength, n,
    srLevels, srSupport, srResistance, nearestSup, nearestRes, srZone,
    spikeFlags,
    spikeCount: spikeFlags.filter(Boolean).length,
    spikeEvents, recentSpikeEvents,
    candlePatterns: detectCandlePatterns(candleArr),
    trendLines: calcTrendLines(candleArr, pivotHighs, pivotLows, atr),
  };
}

function runAnalysis(barClose = false) {
  if (candles.length < 50) return;
  _lastBarClose = barClose;
  const result = analyseCandles(candles, currentSymbol);
  if (!result) return;
  analysisResult = result;
  obArray = result.activeOBs; // keep global obArray in sync for chart overlays

  // ── CONFIRMATION LOCK ──────────────────────────────────────
  const r2 = analysisResult;
  const currentBias = r2.recentBull > r2.recentBear ? 'bull' : 'bear'; // FIX: strict majority, ties = bear (no trade bias)
  const activeOBsSorted = r2.activeOBs.slice().sort((a,b) => a.idx - b.idx);
  const obFingerprint = currentBias + '|' + activeOBsSorted.map(o =>
    o.idx + ':' + sf(o.top,2) + ':' + sf(o.bottom,2)
  ).join(',');

  const structureChanged = obFingerprint !== _lockedOBFingerprint || currentBias !== _lockedBias;
  // Always recalc trade — never lock it to old state on live data
  const shouldRecalcTrade = true;

  if (shouldRecalcTrade) {
    _lockedOBFingerprint = obFingerprint;
    _lockedBias = currentBias;
    _lockedTrade = null; // force recalc
    // Flash badge to show recalculation happening
    const b = document.getElementById('tradeLockBadge');
    if (b) {
      b.textContent = 'UPDATING...';
      b.style.background = 'rgba(255,165,0,0.1)';
      b.style.borderColor = 'rgba(255,165,0,0.3)';
      b.style.color = 'var(--warn)';
    }
  }
  // ────────────────────────────────────────────────────────────

  if (barClose) updateDashboard(); // dashboard only on bar close
  updateSLTP(shouldRecalcTrade);
  if (barClose) updateSparkline();
  // Overlays + panels only on bar close
  if (barClose) {
    drawChartOverlays();
    updateHTFBias();
    updateSRPanel();
  }
}

function calcTrendLines(candleArr, pivotHighs, pivotLows, atr) {
  if (!candleArr || candleArr.length < 20) return [];
  const n = candleArr.length;
  const tol = atr * 0.4;
  const lines = [];
  function fitLine(pivots, isSupport) {
    for (let ai = 0; ai < pivots.length - 1; ai++) {
      for (let bi = ai + 1; bi < pivots.length; bi++) {
        const p1 = pivots[ai], p2 = pivots[bi];
        if (p2.idx - p1.idx < 5) continue;
        const slope = (p2.val - p1.val) / (p2.idx - p1.idx);
        const intcp = p1.val - slope * p1.idx;
        const anglePct = Math.abs(slope) / (p1.val || 1) * 100;
        if (anglePct < 0.002 || anglePct > 0.5) continue;
        if (isSupport  && slope < -0.0001) continue;
        if (!isSupport && slope >  0.0001) continue;
        const touchPivots = pivots.filter(p => Math.abs(p.val - (slope * p.idx + intcp)) <= tol);
        if (touchPivots.length < 2) continue;
        const currentY  = slope * (n - 1) + intcp;
        const lastPrice = candleArr[n - 1].close;
        if (Math.abs(currentY - lastPrice) > lastPrice * 0.08) continue;
        const mostRecent = Math.max(...touchPivots.map(p => p.idx));
        const ageBars    = n - 1 - mostRecent;
        lines.push({ slope, intcp, currentY, isSupport, ageBars,
          touches: touchPivots.length, touchIdxs: touchPivots.map(p => p.idx),
          score: touchPivots.length * 20 + Math.max(0, 30 - ageBars) });
      }
    }
  }
  fitLine(pivotLows.filter(p => p.idx >= n - 80), true);
  fitLine(pivotHighs.filter(p => p.idx >= n - 80), false);
  const deduped = [];
  for (const ln of lines.sort((a,b) => b.score - a.score)) {
    const dup = deduped.some(d => d.isSupport === ln.isSupport &&
      Math.abs(d.currentY - ln.currentY) < atr * 1.5 && Math.abs(d.slope - ln.slope) < 0.001);
    if (!dup) deduped.push(ln);
    if (deduped.length >= 6) break;
  }
  return deduped;
}

function detectCandlePatterns(candleArr) {
  if (!candleArr || candleArr.length < 5) return [];
  const n   = candleArr.length;
  const pats = [];

  function c(i)    { return candleArr[n - 1 - i]; }   // 0=current,1=prev,...
  function body(i) { return Math.abs(c(i).close - c(i).open); }
  function range(i){ return c(i).high - c(i).low; }
  function bull(i) { return c(i).close > c(i).open; }
  function topWick(i) { return c(i).high - Math.max(c(i).open, c(i).close); }
  function botWick(i) { return Math.min(c(i).open, c(i).close) - c(i).low; }
  function isStar(i)  { return body(i) <= range(i) * 0.1; }  // doji-like

  const add = (name, dir, strength, i) =>
    pats.push({ name, dir, strength, idx: n - 1 - i, barTime: c(i).time });

  // ── 1. Bullish Engulfing ──────────────────────────────────
  if (!bull(1) && bull(0) && c(0).open < c(1).close && c(0).close > c(1).open
      && body(0) > body(1) * 1.2)
    add('Engulfing', 'bull', 3, 0);

  // ── 2. Bearish Engulfing ──────────────────────────────────
  if (bull(1) && !bull(0) && c(0).open > c(1).close && c(0).close < c(1).open
      && body(0) > body(1) * 1.2)
    add('Engulfing', 'bear', 3, 0);

  // ── 3. Hammer (bull reversal at bottom) ──────────────────
  if (botWick(0) >= body(0) * 2.0 && topWick(0) <= body(0) * 0.5 && range(0) > 0)
    add('Hammer', 'bull', 2, 0);

  // ── 4. Shooting Star (bear reversal at top) ──────────────
  if (topWick(0) >= body(0) * 2.0 && botWick(0) <= body(0) * 0.5 && range(0) > 0)
    add('Shooting Star', 'bear', 2, 0);

  // ── 5. Inverted Hammer (bull — after downtrend) ──────────
  if (!bull(1) && topWick(0) >= body(0) * 2.0 && botWick(0) <= body(0) * 0.5)
    add('Inverted Hammer', 'bull', 2, 0);

  // ── 6. Hanging Man (bear — after uptrend) ────────────────
  if (bull(1) && botWick(0) >= body(0) * 2.0 && topWick(0) <= body(0) * 0.5)
    add('Hanging Man', 'bear', 2, 0);

  // ── 7. Doji (indecision) ─────────────────────────────────
  if (body(0) <= range(0) * 0.08 && range(0) > 0)
    add('Doji', 'neutral', 1, 0);

  // ── 8. Bullish Harami ────────────────────────────────────
  if (!bull(1) && bull(0) && c(0).open > c(1).close && c(0).close < c(1).open
      && body(0) < body(1) * 0.5)
    add('Harami', 'bull', 2, 0);

  // ── 9. Bearish Harami ────────────────────────────────────
  if (bull(1) && !bull(0) && c(0).open < c(1).close && c(0).close > c(1).open
      && body(0) < body(1) * 0.5)
    add('Harami', 'bear', 2, 0);

  // ── 10. Tweezer Bottom (bull) ────────────────────────────
  if (!bull(1) && bull(0) && Math.abs(c(0).low - c(1).low) <= range(0) * 0.05)
    add('Tweezer Bottom', 'bull', 2, 0);

  // ── 11. Tweezer Top (bear) ───────────────────────────────
  if (bull(1) && !bull(0) && Math.abs(c(0).high - c(1).high) <= range(0) * 0.05)
    add('Tweezer Top', 'bear', 2, 0);

  // ── 12. Bullish Pinbar (long lower wick, small body at top) ─
  if (botWick(0) >= range(0) * 0.6 && body(0) <= range(0) * 0.25)
    add('Pinbar', 'bull', 2, 0);

  // ── 13. Bearish Pinbar (long upper wick, small body at bottom) ─
  if (topWick(0) >= range(0) * 0.6 && body(0) <= range(0) * 0.25)
    add('Pinbar', 'bear', 2, 0);

  // ── 14. Morning Star (3-bar bull reversal) ───────────────
  if (candleArr.length >= 3 && !bull(2) && isStar(1) && bull(0)
      && body(2) > 0 && c(0).close > (c(2).open + c(2).close) / 2)
    add('Morning Star', 'bull', 3, 0);

  // ── 15. Evening Star (3-bar bear reversal) ───────────────
  if (candleArr.length >= 3 && bull(2) && isStar(1) && !bull(0)
      && body(2) > 0 && c(0).close < (c(2).open + c(2).close) / 2)
    add('Evening Star', 'bear', 3, 0);

  // ── 16. Three White Soldiers ─────────────────────────────
  if (bull(0) && bull(1) && bull(2)
      && c(0).close > c(1).close && c(1).close > c(2).close
      && body(0) > 0 && body(1) > 0 && body(2) > 0
      && topWick(0) <= body(0) * 0.3 && topWick(1) <= body(1) * 0.3)
    add('3 White Soldiers', 'bull', 3, 0);

  // ── 17. Three Black Crows ────────────────────────────────
  if (!bull(0) && !bull(1) && !bull(2)
      && c(0).close < c(1).close && c(1).close < c(2).close
      && body(0) > 0 && body(1) > 0 && body(2) > 0
      && botWick(0) <= body(0) * 0.3 && botWick(1) <= body(1) * 0.3)
    add('3 Black Crows', 'bear', 3, 0);

  // ── 18. Marubozu Bull (full body, almost no wicks) ───────
  if (bull(0) && topWick(0) <= body(0)*0.05 && botWick(0) <= body(0)*0.05 && body(0) > 0)
    add('Marubozu', 'bull', 2, 0);

  // ── 19. Marubozu Bear ────────────────────────────────────
  if (!bull(0) && topWick(0) <= body(0)*0.05 && botWick(0) <= body(0)*0.05 && body(0) > 0)
    add('Marubozu', 'bear', 2, 0);

  // ── 20. Dark Cloud Cover (bear) ──────────────────────────
  if (bull(1) && !bull(0)
      && c(0).open > c(1).high
      && c(0).close < (c(1).open + c(1).close) / 2)
    add('Dark Cloud', 'bear', 2, 0);

  // ── 21. Piercing Line (bull) ─────────────────────────────
  if (!bull(1) && bull(0)
      && c(0).open < c(1).low
      && c(0).close > (c(1).open + c(1).close) / 2)
    add('Piercing Line', 'bull', 2, 0);

  return pats;
}

    div.className = 'swing-item';
    const dir = s.bullish ? '▲' : '▼';
    div.innerHTML = `<span style="color:var(--text-dim)">${dir} Bars ${s.fromIdx}-${s.toIdx}</span><span style="color:${s.bullish?'var(--bull)':'var(--bear)'}">${s.pct > 0?'+':''}${sf(s.pct,3)}%</span>`;
    swingListEl.appendChild(div);
  }
}

// ═══════════════════════════════════════════════════════════════
// HTF BIAS (Multi-Timeframe)
// Uses cached demo candles at 1H, 4H, 1D for structural bias
// When live, we can only check current TF — HTF is approximated
// ═══════════════════════════════════════════════════════════════
let _htfBiasLastUpdate = 0;
function updateHTFBias() {
  // Only recalculate HTF bias every 30 seconds
  const now = Date.now();
  if (now - _htfBiasLastUpdate < 30000) return;
  _htfBiasLastUpdate = now;
  const htfTFs = [{ id: '1h', tf: 3600 }, { id: '4h', tf: 14400 }, { id: '1d', tf: 86400 }];
  for (const { id, tf } of htfTFs) {
    const key = currentSymbol + tf;
    // When live and this TF matches the chart TF, use real candles
    if (isConnected && tf === currentTF && candles.length >= 50) {
      _scanCandleCache[key] = candles;
    }
    // Use live scanner candles if available
    if (_liveScanResults[key] && _liveScanResults[key].length >= 50) {
      _scanCandleCache[key] = _liveScanResults[key];
    }
    // No live HTF data yet — skip this TF
    const htfCandles = _scanCandleCache[key];
    if (!htfCandles || htfCandles.length < 50) continue;
    const closes = htfCandles.map(c => c.close);
    const ema20v  = calcEMA(closes, 20);
    const ema50v  = calcEMA(closes, 50);
    const n = closes.length;
    const isBull = ema20v[n-1] > ema50v[n-1] && closes[n-1] > ema50v[n-1];
    const isBear = ema20v[n-1] < ema50v[n-1] && closes[n-1] < ema50v[n-1];
    const elTxt = document.getElementById('htf-' + id);
    const elBar = document.getElementById('htf-' + id + '-bar');
    if (elTxt) {
      elTxt.textContent = isBull ? 'BULL ▲' : isBear ? 'BEAR ▼' : 'MIX ●';
      elTxt.className   = 'htf-' + (isBull ? 'bull' : isBear ? 'bear' : 'neu');
    }
    if (elBar) {
      const pct = isBull ? 75 : isBear ? 25 : 50;
      elBar.style.width      = pct + '%';
      elBar.style.background = isBull ? 'var(--bull)' : isBear ? 'var(--bear)' : 'var(--neutral)';
    }
  }
  // Alignment badge
  const h1El  = document.getElementById('htf-1h');
  const h4El  = document.getElementById('htf-4h');
  const hdEl  = document.getElementById('htf-1d');
  const alignEl = document.getElementById('htfAlignment');
  if (h1El && h4El && hdEl && alignEl) {
    const bulls = [h1El, h4El, hdEl].filter(e => e.textContent.includes('BULL')).length;
    const bears = [h1El, h4El, hdEl].filter(e => e.textContent.includes('BEAR')).length;
    if (bulls === 3) { alignEl.textContent = '★ FULL BULL'; alignEl.className = 'stat-val bull'; }
    else if (bears === 3) { alignEl.textContent = '★ FULL BEAR'; alignEl.className = 'stat-val bear'; }
    else if (bulls === 2) { alignEl.textContent = 'BULL LEAN'; alignEl.className = 'stat-val bull'; }
    else if (bears === 2) { alignEl.textContent = 'BEAR LEAN'; alignEl.className = 'stat-val bear'; }
    else { alignEl.textContent = 'MIXED'; alignEl.className = 'stat-val neutral'; }
  }
}

// ═══════════════════════════════════════════════════════════════
// PARTIAL TP LEVELS
// TP1 = 1:1 RR (reduce risk), TP2 = setup target, TP3 = extended
// Break-even trigger at TP1
// ═══════════════════════════════════════════════════════════════
function updatePartialTPs(t) {
  const el = document.getElementById('partialTPContent');
  if (!el) return;
  // Reject blocked trade objects — they have no sl/tp/risk values
  if (!t || t.blocked || !t.sl || !t.tp || !t.risk || !t.rr) { el.innerHTML = '<div class="sltp-no-trade" style="font-size:9px">No active setup</div>'; return; }
  const dp   = getDP();
  const isBull = t.dir === 'LONG';
  const risk   = t.risk;
  const tp1    = isBull ? t.entry + risk * 1.0 : t.entry - risk * 1.0;
  const tp2    = t.tp;
  const tp3    = isBull ? t.entry + risk * (t.rr * 1.5) : t.entry - risk * (t.rr * 1.5);
  const be     = isBull ? t.entry + risk * 0.3 : t.entry - risk * 0.3;  // move SL to BE after this

  el.innerHTML =
    '<div class="tp-levels-wrap">' +
    '<div class="tp-level-row be-row"><span style="color:var(--cyan);font-size:9px">BE TRIGGER</span><span style="color:var(--cyan)">' + sf(be,dp) + '</span><span style="color:var(--text-dim);font-size:8px">→ move SL to entry</span></div>' +
    '<div class="tp-level-row tp1-row"><span style="color:var(--bull);font-size:9px">TP1 (1:1)</span><span style="color:var(--bull)">' + sf(tp1,dp) + '</span><span style="color:var(--text-dim);font-size:8px">close 33%</span></div>' +
    '<div class="tp-level-row tp2-row"><span style="color:var(--bull);font-size:9px">TP2 (' + sf(t.rr,1) + ':1)</span><span style="color:var(--bull)">' + sf(tp2,dp) + '</span><span style="color:var(--text-dim);font-size:8px">close 50%</span></div>' +
    '<div class="tp-level-row tp3-row"><span style="color:var(--bull);font-size:9px">TP3 EXT</span><span style="color:var(--bull)">' + sf(tp3,dp) + '</span><span style="color:var(--text-dim);font-size:8px">trail rest</span></div>' +
    '</div>' +
    '<div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)">Trailing ATR stop: ' + sf(t.risk * 0.8, dp) + ' pts from price</div>';

  // Draw partial TP price lines on chart
  for (const l of _partialTPLines) { try { candleSeries.removePriceLine(l); } catch(e){} }
  _partialTPLines = [];
  if (OV.sltp) {
    _partialTPLines.push(candleSeries.createPriceLine({ price: tp1, color: '#00e5a066', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'TP1' }));
    _partialTPLines.push(candleSeries.createPriceLine({ price: tp3, color: '#00e5a044', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'TP3' }));
    _partialTPLines.push(candleSeries.createPriceLine({ price: be,  color: '#00b4d855', lineWidth: 1, lineStyle: 1, axisLabelVisible: true, title: 'BE' }));
  }
}

function updateRiskDisplay() {
  const balance    = parseFloat(document.getElementById('accountBalance')?.value) || 1000;
  const riskPctRaw = parseFloat(document.getElementById('riskPct')?.value) || 1.0;
  const riskPct    = Math.min(riskPctRaw, CFG.maxRiskPct);
  const dollarRisk = balance * (riskPct / 100);
  const drEl = document.getElementById('dollarRisk');
  if (drEl) { drEl.textContent = '$' + sf(dollarRisk, 2); drEl.style.color = riskPct > 1.5 ? 'var(--warn)' : 'var(--bear)'; }
  const ddEl = document.getElementById('ddWarn');
  const maxLosses  = dollarRisk > 0 ? Math.floor((balance * 0.1) / dollarRisk) : 0;
  if (ddEl) ddEl.textContent = maxLosses + ' losses = 10% drawdown';
}

// CHART OVERLAYS
// ═══════════════════════════════════════════════════════════════
function drawChartOverlays() {
  if (!chart || !candleSeries) return;
  for (const p of obBoxes)   { try { candleSeries.removePriceLine(p); } catch(e){} }
  for (const p of msbLines)  { try { candleSeries.removePriceLine(p); } catch(e){} }
  obBoxes = []; msbLines = [];

  const r = analysisResult;
  if (!r.n) return;
  const dp = getDP();

  for (const ob of obArray.slice(-CFG.maxOBs)) {
    if (ob.mitigated) continue;
    const col = ob.isHPZ ? (ob.isBull ? '#1de9b6' : '#ff5252') : (ob.isBull ? '#00e5a0' : '#ff3d5a');
    obBoxes.push(candleSeries.createPriceLine({ price: ob.top,    color: col+'cc', lineWidth:1, lineStyle:2, axisLabelVisible:false, title:'' }));
    obBoxes.push(candleSeries.createPriceLine({ price: ob.bottom, color: col+'88', lineWidth:1, lineStyle:2, axisLabelVisible:false, title:'' }));
    obBoxes.push(candleSeries.createPriceLine({
      price: ob.poc, color: col, lineWidth:1, lineStyle:3, axisLabelVisible:true,
      title: (ob.isHPZ?'★':'') + sf(ob.score,0) + '% ' + (ob.isBull?'B-OB':'S-OB'),
    }));
  }

  for (const msb of [...r.msbBull, ...r.msbBear].slice(-15)) {
    const col = msb.dir === 'bull' ? '#00e5a066' : '#ff3d5a66';
    msbLines.push(candleSeries.createPriceLine({ price: msb.level, color: col, lineWidth:1, lineStyle:0, axisLabelVisible:false, title: msb.type+(msb.dir==='bull'?' ▲':' ▼') }));
  }

  const markers = [];
  for (const msb of [...r.msbBull, ...r.msbBear]) {
    markers.push({
      time: candles[msb.idx].time,
      position: msb.dir === 'bull' ? 'belowBar' : 'aboveBar',
      color: msb.dir === 'bull' ? (msb.volConfirmed!==false?'#00e5a0':'#00e5a066') : (msb.volConfirmed!==false?'#ff3d5a':'#ff3d5a66'),
      shape: msb.dir === 'bull' ? 'arrowUp' : 'arrowDown',
      text: msb.type + (msb.dir === 'bull' ? ' ▲' : ' ▼') + (msb.volConfirmed===false?' (low vol)':''), size: 1,
    });
  }
  if (r.fsTarget && r.n) {
    markers.push({
      time: candles[r.n-1].time,
      position: r.fsDir === 'bull' ? 'belowBar' : 'aboveBar',
      color: r.fsDir === 'bull' ? '#00e5a0' : '#f97316',
      shape: r.fsDir === 'bull' ? 'arrowUp' : 'arrowDown',
      text: `FS ${r.fsDir==='bull'?'▲+':'▼-'}${sf(r.avgSwingPct,2)}% → ${sf(r.fsTarget,dp)}`,
      size: 2,
    });
  }
  for (const ob of obArray.filter(o => o.isHPZ && !o.mitigated)) {
    markers.push({
      time: candles[ob.idx].time,
      position: ob.isBull ? 'belowBar' : 'aboveBar',
      color: ob.isBull ? '#1de9b6' : '#ff5252',
      shape: 'circle', text: '★HPZ', size: 1,
    });
  }
  markers.sort((a, b) => a.time - b.time);
  // Note: setMarkers called once after all markers (including entry signal) are added below

  if (r.fsTarget) {
    const fsLine = candleSeries.createPriceLine({
      price: r.fsTarget,
      color: r.fsDir === 'bull' ? '#00e5a066' : '#f9731666',
      lineWidth: 1, lineStyle: 2, axisLabelVisible: true,
      title: `FS TARGET ${r.fsDir==='bull'?'▲':'▼'} ${sf(r.fsTarget,dp)}`,
    });
    obBoxes.push(fsLine);
  }

  // ── ENTRY SIGNAL — big arrow when all gates pass ──────────
  if (_lockedTrade && !_lockedTrade.blocked && _lockedTrade.sl && _lockedTrade.tp) {
    const t  = _lockedTrade;
    const isBull = t.dir === 'LONG';
    const lastC  = candles[candles.length - 1];
    if (lastC) {
      markers.push({
        time:     lastC.time,
        position: isBull ? 'belowBar' : 'aboveBar',
        color:    isBull ? '#00e5a0' : '#ff3d5a',
        shape:    isBull ? 'arrowUp' : 'arrowDown',
        text:     (isBull ? '▲ LONG' : '▼ SHORT') + ' ' + sf(t.confluence,0) + '%',
        size:     3,
      });
    }
    // Draw SL zone as a filled band on chart
    obBoxes.push(candleSeries.createPriceLine({ price: t.sl, color: '#ff3d5acc', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: '⚡SL ' + sf(t.sl,dp) }));
    obBoxes.push(candleSeries.createPriceLine({ price: t.tp, color: '#00e5a0cc', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: '✓TP ' + sf(t.tp,dp) }));
  }
  // ── H&S necklines on chart ──────────────────────────────
  if (r && r.hsPatterns && OV.sltp) {
    for (const p of r.hsPatterns) {
      const col = p.dir === 'bull' ? '#00e5a066' : '#ff3d5a66';
      const lbl = (p.type === 'IHS' ? 'IHS' : 'H&S') + ' neck' + (p.broken ? ' ✓BRK' : '');
      try {
        obBoxes.push(candleSeries.createPriceLine({
          price: p.neckline, color: col, lineWidth: 1, lineStyle: 2,
          axisLabelVisible: true, title: lbl,
        }));
      } catch(e) {}
    }
  }

  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
}


// ═══════════════════════════════════════════════════════════════
// ★★★ REBUILT SL/TP ENGINE v26 — SPIKE-AWARE PER-SYMBOL ★★★
// Root cause of SL hits: generic ATR was too tight for Jump/Boom.
// Now uses per-symbol profile with spike clearance built in.
// ═══════════════════════════════════════════════════════════════
function calcSLTP(r) {
  const price   = r.currentPrice;
  const atr     = r.atr;
  const active  = r.activeOBs || [];
  const profile = getSymbolProfile(r.symId);

  if (!price || !atr || atr <= 0) return null;

  // ══════════════════════════════════════════════════════════
  // THE 5-GATE ENTRY SYSTEM
  // Gates 1-4 are HARD gates — all must pass for a trade.
  // Gate 5 is a WARNING only — shown but doesn't block.
  // This ensures trades show regularly while keeping quality.
  // ══════════════════════════════════════════════════════════

  // FIX: strict majority required — ties (0 vs 0 or equal) are NO TRADE
  const isBullBias = r.recentBull > r.recentBear;
  const isBull     = isBullBias;
  const dir        = isBull ? 'LONG' : 'SHORT';
  const failReasons = [];
  const warnReasons = [];

  // ── GATE 1: EMA trend alignment + EMA200 price-side hard block ──
  // G1a: EMA20 vs EMA50 must agree with bias (short-term trend)
  const ema20val  = r.ema20  ? r.ema20[r.n - 1]  : null;
  const ema50val  = r.ema50  ? r.ema50[r.n - 1]  : null;
  const ema200val = r.ema200 ? r.ema200[r.n - 1] : null;
  const emaShortAligned = ema20val && ema50val
    ? (isBull ? ema20val > ema50val : ema20val < ema50val)
    : true;
  if (!emaShortAligned) {
    failReasons.push('GATE1: EMA 20 vs 50 not aligned with bias');
  }
  // G1b: Price must be on the correct side of EMA200 — HARD block
  // This is the main fix for wrong-way signals in downtrends:
  // if price < EMA200 we are in macro downtrend → no longs
  // if price > EMA200 we are in macro uptrend → no shorts
  if (ema200val) {
    const priceAbove200 = price > ema200val;
    if (isBull && !priceAbove200) {
      failReasons.push('GATE1: Price below EMA200 — macro downtrend, no longs');
    } else if (!isBull && priceAbove200) {
      failReasons.push('GATE1: Price above EMA200 — macro uptrend, no shorts');
    }
  }
  // G1c: Full EMA stack alignment is a strong bonus note
  if (r.emaTrend === 'mixed') {
    warnReasons.push('NOTE: EMA 200 mixed — partial trend alignment');
  }

  // ── GATE 2: Bias + Future Swing agree ────────────────────
  if (profile.trendBias === 'bull' && !isBullBias) {
    failReasons.push('GATE2: Boom requires BULL bias');
  } else if (profile.trendBias === 'bear' && isBullBias) {
    failReasons.push('GATE2: Crash requires BEAR bias');
  } else if (r.fsDir && r.fsDir !== (isBull ? 'bull' : 'bear')) {
    // FS conflict is a HARD BLOCK — trading against projected swing reduces quality
    failReasons.push('GATE2: Future Swing is ' + r.fsDir + ' — conflicts with ' + (isBull?'bull':'bear') + ' bias');
  }

  // ── GATE 3: Price near aligned OB OR strong S/R ──────────
  const alignedOBs = active.filter(o => isBull ? o.isBull : !o.isBull);
  const nearOB = alignedOBs.find(o => price <= o.top + atr * 3 && price >= o.bottom - atr * 3); // widened 2→3 ATR for earlier proximity detection
  const insideOB = alignedOBs.find(o => price <= o.top && price >= o.bottom);
  const srLevels = r.srLevels || [];
  const nearSR = srLevels.find(s =>
    s.strong && Math.abs(s.price - price) <= atr * 2.0 && (isBull ? s.isSupport : !s.isSupport)
  ); // widened 1.5→2.0 ATR for earlier S/R proximity
  const atSRLevel = !!nearSR;
  const _tls   = r.trendLines || [];
  const _nearTL = _tls.find(tl => Math.abs(tl.currentY - price) <= atr * 1.2 && (isBull ? tl.isSupport : !tl.isSupport));
  const atTrendLine = !!_nearTL;
  if (!nearOB && !atSRLevel) {
    if (alignedOBs.length === 0) {
      warnReasons.push('NOTE G3: No ' + (isBull?'bull':'bear') + ' OB or S/R yet');
    } else {
      const nearest = isBull
        ? alignedOBs.sort((a,b) => b.top - a.top)[0]
        : alignedOBs.sort((a,b) => a.bottom - b.bottom)[0];
      const dist = isBull ? sf(price - nearest.top, 2) : sf(nearest.bottom - price, 2);
      failReasons.push('GATE3: Price too far from OB/S/R (' + dist + ' pts)');
    }
  } else if (atTrendLine && !insideOB && !atSRLevel) {
    warnReasons.push('NOTE G3: At trend line ' + (_nearTL.isSupport?'support':'resist') + ' ×' + _nearTL.touches + ' touches');
  } else if (atSRLevel && !insideOB) {
    warnReasons.push('NOTE: At S/R ×' + nearSR.touches + ' — ' + (nearSR.isSupport?'support':'resist') + ' confluence');
  } else if (!insideOB) {
    warnReasons.push('NOTE: Approaching OB — wait for touch');
  }


  // ── BREAK & RETEST CHECK ─────────────────────────────────
  // Verify price has actually touched the zone and started to reverse
  // (at least 0.5 ATR bounce from zone edge) — prevents entries on
  // first approach before any confirmation of zone respect.
  let zoneRetestConfirmed = false;
  const candlesForRetest = r.candleArr || [];
  const nRt = candlesForRetest.length;
  if (nearOB && nRt >= 3) {
    const zoneTop = nearOB.top;
    const zoneBot = nearOB.bottom;
    // Look at last 5 bars for a touch + bounce
    for (let ri = Math.max(0, nRt - 6); ri < nRt - 1; ri++) {
      const c = candlesForRetest[ri];
      const touched = isBull ? (c.low <= zoneTop && c.low >= zoneBot - atr * 0.5)
                              : (c.high >= zoneBot && c.high <= zoneTop + atr * 0.5);
      if (touched) {
        const nextClose = candlesForRetest[ri + 1] ? candlesForRetest[ri + 1].close : price;
        const bounced = isBull ? nextClose > c.low + atr * 0.5 : nextClose < c.high - atr * 0.5;
        if (bounced) { zoneRetestConfirmed = true; break; }
      }
    }
  } else if (atSRLevel && nRt >= 3) {
    const srPrice = nearSR ? nearSR.price : 0;
    for (let ri = Math.max(0, nRt - 6); ri < nRt - 1; ri++) {
      const c = candlesForRetest[ri];
      const touched = Math.abs((isBull ? c.low : c.high) - srPrice) <= atr * 0.6;
      if (touched) {
        const nextClose = candlesForRetest[ri + 1] ? candlesForRetest[ri + 1].close : price;
        const bounced = isBull ? nextClose > srPrice + atr * 0.4 : nextClose < srPrice - atr * 0.4;
        if (bounced) { zoneRetestConfirmed = true; break; }
      }
    }
  } else if (!nearOB && !atSRLevel) {
    zoneRetestConfirmed = true; // no zone — don't double-block
  } else {
    zoneRetestConfirmed = true; // if first approach, allow but warn
    warnReasons.push('NOTE: Zone not yet retested — wait for bounce confirmation');
  }

  // ── Zone retest gate: enforce the bounce confirmation ────
  // zoneRetestConfirmed was computed above but never enforced — fix that.
  // Only block if we are specifically near an OB/SR (otherwise zoneRetestConfirmed=true)
  if (!zoneRetestConfirmed && (nearOB || atSRLevel)) {
    failReasons.push('GATE3b: Zone not confirmed — price must touch & bounce from OB/S/R first');
  }

  // ── GATE 4: Minimum bias strength ────────────────────────
  // Raised from 50% to 55% — requires clear directional majority
  const biasTotal    = (r.recentBull + r.recentBear) || 1;
  const biasStrength = Math.max(r.recentBull, r.recentBear) / biasTotal;
  if (biasStrength < 0.55) {
    failReasons.push('GATE4: Bias too weak (' + sf(biasStrength*100,0) + '%) — need 55%+');
  }

  // ── GATE 5: Momentum (WARNING only — not a hard block) ────
  const momentumOk = isBull ? sn(r.momentumZ) > -2.0 : sn(r.momentumZ) < 2.0;
  if (!momentumOk) {
    warnReasons.push('WARN G5: Momentum Z-Score weak (' + sf(r.momentumZ,2) + ') — counter-momentum entry');
  }


  // ── GATE 6: HTF Bias alignment — HARD block if ANY confirmed HTF opposes ──
  // FIX: was "both 1H+4H" — too lenient. One clear HTF opposing = block.
  // Reason: a downtrend on 1H while buying 5m is the main cause of bad longs.
  // Logic: check 1H, 4H, 1D. If any one is clearly opposite → hard block.
  // "Clearly" = EMA20 < EMA50 AND price < EMA50 (not just mixed).
  (function() {
    const htfTFs = [3600, 14400, 86400]; // 1H, 4H, 1D
    let opposingCount = 0, checkedCount = 0;
    for (const tf of htfTFs) {
      const key = (r.symId || currentSymbol) + tf;
      const htfC = _scanCandleCache[key];
      if (!htfC || htfC.length < 50) continue;
      checkedCount++;
      const htfCloses = htfC.map(c => c.close);
      const e20 = calcEMA(htfCloses, 20);
      const e50 = calcEMA(htfCloses, 50);
      const nn  = htfCloses.length - 1;
      // Require BOTH EMA stack AND price-side confirmation for "clear" trend
      const htfBull = e20[nn] > e50[nn] && htfCloses[nn] > e50[nn];
      const htfBear = e20[nn] < e50[nn] && htfCloses[nn] < e50[nn];
      if (isBull && htfBear) opposingCount++;
      if (!isBull && htfBull) opposingCount++;
    }
    // Block if ANY single confirmed HTF opposes (was: require both)
    if (opposingCount >= 1) {
      const tfNames = ['1H','4H','1D'];
      failReasons.push('GATE6: HTF structure opposes — no ' + (isBull?'long':'short') + ' against higher-TF trend');
    }
  })();

  // ── CANDLE PATTERN CONFIRMATION ──────────────────────────────
  // Strength-3 opposing pattern = HARD BLOCK (reversal confirmed against trade)
  // Strength-2 opposing = WARNING only
  // Confirming pattern = NOTE (bonus confluence, no block)
  if (r.candlePatterns && r.candlePatterns.length > 0) {
    const _cp    = r.candlePatterns.filter(p => p.dir === (isBull ? 'bull' : 'bear')).sort((a,b)=>b.strength-a.strength)[0];
    const _cpOpp = r.candlePatterns.filter(p => p.dir !== 'neutral' && p.dir !== (isBull ? 'bull' : 'bear')).sort((a,b)=>b.strength-a.strength)[0];
    if (_cpOpp && _cpOpp.strength >= 3) {
      // FIX: strength-3 reversal against direction is a hard block
      failReasons.push('GATE-PAT: ' + _cpOpp.name + ' (str ' + _cpOpp.strength + ') opposes direction — reversal signal');
    } else if (_cpOpp && _cpOpp.strength >= 2) {
      warnReasons.push('WARN: ' + _cpOpp.name + ' opposes trade direction — caution');
    }
    if (_cp && _cp.strength >= 2) {
      warnReasons.push('NOTE: ' + _cp.name + ' confirmed (' + (isBull?'bull':'bear') + ') ' + '★'.repeat(_cp.strength));
    } else if (!_cp) {
      warnReasons.push('NOTE: No confirming pattern on current bar');
    }
  }

  // ── GATE 7: Spike-and-Continue ─────────────────────────
  if (profile && profile.waitSpike) {
    const _g7spk = (r.recentSpikeEvents || []);
    const _g7aligned = _g7spk.find(s => s.dir === (isBull ? 'bull' : 'bear') && s.ageBars <= 10);
    if (_g7aligned) {
      warnReasons.push('NOTE G7: Spike-and-continue confirmed ' + _g7aligned.ageBars + 'b ago');
    } else if (!_g7spk.find(s => s.ageBars <= 20)) {
      warnReasons.push('WARN G7: No spike yet on ' + (r.symId||'') + ' — wait for liquidity hunt');
    } else {
      warnReasons.push('WARN G7: Spike does not align — wait for ' + (isBull?'bull':'bear') + ' spike-continue');
    }
  }

  // ── RESULT ────────────────────────────────────────────────
  if (failReasons.length > 0) {
    return { blocked: true, failReasons, warnReasons, dir, isBull };
  }

  // All hard gates passed — proceed to SL/TP calculation

  // Spike-aware distances
  const spikeAtr = r.spikeAtr || atr * 2;
  const spikeGuardDist = spikeAtr * profile.spikeGuard;
  const minSlDist = Math.max(atr * 0.5, price * (profile.minSlPct / 100));
  const maxSlDist = price * (profile.maxSlPct / 100);

  let sl = null, slSources = [];

  // A0: Spike-extreme SL
  if (sl === null && profile && profile.waitSpike && r.recentSpikeEvents) {
    const _spkSL = r.recentSpikeEvents.filter(s => s.dir===(isBull?'bull':'bear') && s.ageBars<=8)
      .sort((a,b)=>a.ageBars-b.ageBars)[0];
    if (_spkSL) {
      const _spkCand = isBull ? _spkSL.spikeLow - atr*0.2 : _spkSL.spikeHigh + atr*0.2;
      const _spkDist = Math.abs(price - _spkCand);
      if (_spkDist >= minSlDist && _spkDist <= maxSlDist && (isBull ? _spkCand < price : _spkCand > price)) {
        sl = _spkCand; slSources = ['SPIKE-EXT'];
      }
    }
  }

  // A0b: Trend line SL
  if (sl === null && atTrendLine && _nearTL) {
    const _tlc = isBull ? _nearTL.currentY - atr*0.25 : _nearTL.currentY + atr*0.25;
    const _tld = Math.abs(price - _tlc);
    if (_tld >= minSlDist && _tld <= maxSlDist && (isBull ? _tlc < price : _tlc > price))
      { sl = _tlc; slSources = ['TREND-LINE']; }
  }
  // A1: S/R structural SL — place beyond nearest strong S/R
  const srLevs = r.srLevels || [];
  if (isBull) {
    const supBelow = srLevs.filter(s => s.isSupport && s.strong && s.price < price && (price - s.price) <= atr * profile.slAtrMult * 1.5).sort((a,b) => b.price - a.price);
    if (supBelow.length > 0) {
      const cand = supBelow[0].price - atr * 0.3 - spikeGuardDist * 0.5;
      const dist = price - cand;
      if (dist >= minSlDist && dist <= maxSlDist) { sl = cand; slSources = ['SR+SPIKE']; }
    }
  } else {
    const resAbove = srLevs.filter(s => !s.isSupport && s.strong && s.price > price && (s.price - price) <= atr * profile.slAtrMult * 1.5).sort((a,b) => a.price - b.price);
    if (resAbove.length > 0) {
      const cand = resAbove[0].price + atr * 0.3 + spikeGuardDist * 0.5;
      const dist = cand - price;
      if (dist >= minSlDist && dist <= maxSlDist) { sl = cand; slSources = ['SR+SPIKE']; }
    }
  }

  // A2: OB structural SL — place BEYOND full OB + spike guard
  // IMPORTANT: only use OBs that are within 2x ATR of current price
  // (distant OBs produce insane SL distances)
  if (isBull) {
    const bullOBs = active
      .filter(o => o.isBull && o.top < price && (price - o.top) <= atr * 3)
      .sort((a,b) => b.top - a.top);
    if (bullOBs.length > 0) {
      const ob = bullOBs[0];
      const extra = (profile.type === 'jump' || profile.type === 'boom' || profile.type === 'crash')
        ? spikeGuardDist + atr * 0.3 : atr * 0.3;
      const candidate = ob.bottom - extra;
      const dist = price - candidate;
      if (dist >= minSlDist && dist <= maxSlDist) { sl = candidate; slSources = ['OB+SPIKE']; }
    }
  } else {
    const bearOBs = active
      .filter(o => !o.isBull && o.bottom > price && (o.bottom - price) <= atr * 3)
      .sort((a,b) => a.bottom - b.bottom);
    if (bearOBs.length > 0) {
      const ob = bearOBs[0];
      const extra = (profile.type === 'jump' || profile.type === 'boom' || profile.type === 'crash')
        ? spikeGuardDist + atr * 0.3 : atr * 0.3;
      const candidate = ob.top + extra;
      const dist = candidate - price;
      if (dist >= minSlDist && dist <= maxSlDist) { sl = candidate; slSources = ['OB+SPIKE']; }
    }
  }

  // B: Swing pivot SL
  if (sl === null && r.fsFromPrice) {
    const pivotDist = Math.abs(price - r.fsFromPrice);
    if (pivotDist <= maxSlDist) {
      const extra = (profile.type === 'jump') ? spikeGuardDist : atr * 0.3;
      const candidate = isBull
        ? Math.min(r.fsFromPrice, price) - extra
        : Math.max(r.fsFromPrice, price) + extra;
      const dist = Math.abs(price - candidate);
      if (dist >= minSlDist && dist <= maxSlDist && (isBull ? candidate < price : candidate > price)) {
        sl = candidate; slSources = ['SWING+SPIKE'];
      }
    }
  }

  // C: Profile ATR fallback (uses profile multiplier not generic 1.2)
  if (sl === null) {
    const atrDist = Math.min(atr * profile.slAtrMult + spikeGuardDist, maxSlDist);
    sl = isBull ? price - atrDist : price + atrDist;
    slSources = ['ATR×' + sf(profile.slAtrMult,1)];
  }

  // Enforce minimum
  if (Math.abs(price - sl) < minSlDist) sl = isBull ? price - minSlDist : price + minSlDist;
  if (isBull && sl >= price)  sl = price - minSlDist;
  if (!isBull && sl <= price) sl = price + minSlDist;

  const risk = Math.abs(price - sl);
  if (risk <= 0) return null;

  // TP calculation — max distance capped tightly by profile
  const maxTpDist = Math.min(price * 0.08, atr * profile.tpAtrMult * 2.5);
  let tp = null, tpSources = [];

  // TP-A1: Snap to nearest strong S/R on reward side
  if (tp === null) {
    const srLevTP = r.srLevels || [];
    if (isBull) {
      const resAbove = srLevTP.filter(s => !s.isSupport && s.strong && s.price > price).sort((a,b) => a.price - b.price);
      if (resAbove.length > 0) {
        const dist = resAbove[0].price - price;
        if (dist / risk >= CFG.minRR && dist <= maxTpDist) { tp = resAbove[0].price; tpSources = ['SR×' + resAbove[0].touches]; }
      }
    } else {
      const supBelow = srLevTP.filter(s => s.isSupport && s.strong && s.price < price).sort((a,b) => b.price - a.price);
      if (supBelow.length > 0) {
        const dist = price - supBelow[0].price;
        if (dist / risk >= CFG.minRR && dist <= maxTpDist) { tp = supBelow[0].price; tpSources = ['SR×' + supBelow[0].touches]; }
      }
    }
  }

  if (r.fsTarget && r.fsDir === (isBull ? 'bull' : 'bear')) {
    const onSide = isBull ? r.fsTarget > price : r.fsTarget < price;
    const dist = Math.abs(r.fsTarget - price);
    if (onSide && dist / risk >= CFG.minRR && dist <= maxTpDist) { tp = r.fsTarget; tpSources = ['SWING']; }
  }
  if (tp === null && r.avgSwingPct > 0.01) {
    const proj = isBull ? price * (1 + r.avgSwingPct / 100) : price * (1 - r.avgSwingPct / 100);
    const dist = Math.abs(proj - price);
    if ((isBull ? proj > price : proj < price) && dist / risk >= CFG.minRR && dist <= maxTpDist) { tp = proj; tpSources = ['PROJ']; }
  }
  if (tp === null) {
    if (isBull) {
      const res = active.filter(o => !o.isBull && o.bottom > price).sort((a,b) => a.bottom - b.bottom);
      if (res.length > 0 && (res[0].bottom - price) / risk >= CFG.minRR) { tp = res[0].bottom; tpSources = ['NEXT-OB']; }
    } else {
      const sup = active.filter(o => o.isBull && o.top < price).sort((a,b) => b.top - a.top);
      if (sup.length > 0 && (price - sup[0].top) / risk >= CFG.minRR) { tp = sup[0].top; tpSources = ['NEXT-OB']; }
    }
  }
  if (tp === null) {
    tp = isBull ? price + Math.min(atr * profile.tpAtrMult, maxTpDist) : price - Math.min(atr * profile.tpAtrMult, maxTpDist);
    tpSources = ['ATR×' + sf(profile.tpAtrMult,1)];
  }

  const minTP = isBull ? price + risk * CFG.minRR : price - risk * CFG.minRR;
  if (isBull  && tp < minTP) { tp = minTP; tpSources = ['MIN-RR']; }
  if (!isBull && tp > minTP) { tp = minTP; tpSources = ['MIN-RR']; }

  const reward = Math.abs(tp - price);
  const rr     = reward / risk;
  if (rr < CFG.minRR) return null;

  // Confluence scoring
  const bestOB = slSources[0] && slSources[0].startsWith('OB')
    ? (isBull ? active.filter(o => o.isBull  && o.top    < price).sort((a,b) => b.top    - a.top)[0]
             : active.filter(o => !o.isBull && o.bottom > price).sort((a,b) => a.bottom - b.bottom)[0])
    : null;

  const srUsedSL = slSources[0] === 'SR+SPIKE';
  const srUsedTP = tpSources[0] && tpSources[0].startsWith('SR');
  const srTouches = srUsedTP ? parseInt((tpSources[0]||'').replace('SR×','')) || 0
    : srUsedSL ? ((r.srLevels||[]).find(s => s.isSupport===isBull && s.strong)||{}).touches||0 : 0;
  const biasTotalConf = (r.recentBull + r.recentBear) || 1;
  const biasScore   = Math.round((isBull ? r.recentBull : r.recentBear) / biasTotalConf * 20);
  const obScore2    = bestOB ? Math.round(20 * bestOB.score / 100) : 0;
  const srScore     = (srUsedSL || srUsedTP) ? Math.min(15, (srTouches||2) * 3) : 0;
  const slScore     = (risk <= atr * profile.slAtrMult + spikeGuardDist + 0.001) ? 12 : 0;
  const swingScore  = (tpSources[0] === 'SWING' || tpSources[0] === 'PROJ') ? 18 : 0;
  const rrScore     = Math.min(18, Math.round((rr / 3) * 18));
  const fsBonus     = (r.fsDir === (isBull ? 'bull' : 'bear')) ? 8 : 0;
  const ema200Bonus = (ema200val && (isBull ? price > ema200val : price < ema200val)) ? 6 : 0;
  const emaBonus    = (r.emaTrend === (isBull ? 'bull' : 'bear')) ? 8 : 0;
  const sweepBonus  = (r.recentSweeps && r.recentSweeps.some(s => s.dir === (isBull ? 'bull' : 'bear'))) ? 5 : 0;
  const profileBonus = profile.trendBias === (isBull ? 'bull' : 'bear') ? 8 : 0;
  const mtfBonus    = (bestOB && bestOB.mtfStack) ? 15 : 0;
  const spikeBonus  = (profile && profile.waitSpike && r.recentSpikeEvents &&
    r.recentSpikeEvents.find(s => s.dir===(isBull?'bull':'bear') && s.ageBars<=10)) ? 12 : 0;
  const tlBonus     = (atTrendLine && _nearTL) ? Math.min(12, _nearTL.touches * 4) : 0;
  // Pattern bonus: strength-weighted, max 15pts
  const _pats = r.candlePatterns || [];
  const _alignedPats = _pats.filter(p => p.dir === (isBull ? 'bull' : 'bear'));
  const _topPat = _alignedPats.sort((a,b) => b.strength - a.strength)[0];
  const patBonus = _topPat ? Math.min(15, _topPat.strength * 5) : 0;
  const confluence  = Math.min(100, obScore2 + srScore + slScore + swingScore + biasScore + rrScore + fsBonus + emaBonus + ema200Bonus + sweepBonus + profileBonus + mtfBonus + spikeBonus + patBonus + tlBonus);

  const components = {
    ob:    { active: !!bestOB,            label: 'OB',    score: bestOB ? bestOB.score : 0, isHPZ: bestOB ? bestOB.isHPZ : false },
    sr:    { active: srUsedSL||srUsedTP,  label: 'S/R',   score: srScore > 0 ? Math.round(srScore/15*100) : 0, touches: srTouches },
    atr:   { active: true,                label: 'ATR',   score: slScore > 0 ? 100 : 50 },
    swing: { active: tpSources[0] === 'SWING' || tpSources[0] === 'PROJ', label: 'SWING', score: Math.min(100, rr / 3 * 100) },
  };

  const basis = 'SL:' + slSources.join('+') + ' | TP:' + tpSources.join('+') + ' | ' + profile.type.toUpperCase();

  const balance       = parseFloat(document.getElementById('accountBalance')?.value) || 1000;
  const riskPctRaw    = parseFloat(document.getElementById('riskPct')?.value) || 1.0;
  const riskPctCapped = Math.min(riskPctRaw, CFG.maxRiskPct);
  const dollarRisk    = balance * (riskPctCapped / 100);
  const slDistance    = Math.abs(price - sl);
  const units         = slDistance > 0 ? dollarRisk / slDistance : 0;
  const potentialProfit = units * reward;
  const maxConsecLosses = dollarRisk > 0 ? Math.floor((balance * 0.1) / dollarRisk) : 0;

  // ── Sanity check before MT5 rounding ────────────────────────
  // Catch obviously wrong SL/TP (NaN, Infinity, wrong side)
  if (!isFinite(sl) || !isFinite(tp) || isNaN(sl) || isNaN(tp)) return null;
  if (isBull && sl >= price) return null;  // SL above entry on LONG
  if (!isBull && sl <= price) return null; // SL below entry on SHORT
  if (isBull && tp <= price) return null;  // TP below entry on LONG
  if (!isBull && tp >= price) return null; // TP above entry on SHORT

  // ── MT5-safe rounding: enforce tick size + minimum stop distance ──
  const _symId = r.symId || currentSymbol;
  const _mt5   = enforceMT5StopDistance(price, sl, tp, dir, _symId);
  const _entry = _mt5.entry;
  const _sl    = _mt5.sl;
  const _tp    = _mt5.tp;
  // Recompute risk/reward/rr from rounded values (may differ slightly)
  const _risk   = Math.abs(_entry - _sl);
  const _reward = Math.abs(_tp - _entry);
  const _rr     = _risk > 0 ? _reward / _risk : 0;
  // Warn if rounding pushed RR below minimum
  if (_rr < CFG.minRR) warnReasons.push('NOTE: MT5 rounding reduced RR to ' + sf(_rr,2) + ':1');

  return {
    dir, entry: _entry, sl: _sl, tp: _tp, rr: _rr, risk: _risk, reward: _reward,
    basis, components, confluence,
    slSources, tpSources,
    obScore: bestOB ? bestOB.score : null,
    isHPZ: bestOB ? bestOB.isHPZ : false,
    dollarRisk, units, potentialProfit,
    riskPct: riskPctCapped, balance, maxConsecLosses,
    profileType: profile.type, spikeAtr,
    warnReasons, insideOB: !!insideOB, atSRLevel: !!atSRLevel,
    atTrendLine: !!atTrendLine, nearTL: _nearTL || null,
    bestPattern: _topPat || null, patBonus,
    mt5: { entry: _entry, sl: _sl, tp: _tp, digits: getSymbolMT5Spec(_symId).digits },
  };
}

function updateSLTP(forceRecalc = true) {
  // Never generate trade signals from demo/fake candles — live connection required
  if (!isConnected) { _lockedTrade = null; return; }
  const r = analysisResult;
  if (!r || !r.n || !r.currentPrice) return;
  const dp = getDP();
  const container = document.getElementById('sltpContent');
  if (!forceRecalc && _lockedTrade !== null) return;

  for (const l of sltpLines) { try { candleSeries.removePriceLine(l); } catch(e){} }
  sltpLines = [];

  // Consecutive loss lockout — block all trade signals
  if (_tradeLocked) {
    container.innerHTML = '<div style="font-family:var(--font-mono);font-size:9px;background:rgba(255,61,90,0.08);border:1px solid rgba(255,61,90,0.3);border-radius:1px;padding:12px;text-align:center;color:var(--bear)">⛔ TRADING PAUSED<br><span style="font-size:8px;color:var(--text-dim);display:block;margin-top:4px">3 consecutive losses — cooling off period.<br>Click RESET in the banner to resume.</span></div>';
    _lockedTrade = null;
    return;
  }
  const t = calcSLTP(r);
  _lockedTrade = t;

  // Update risk display DOM (only here, not inside calcSLTP)
  if (t) {
    const drEl = document.getElementById('dollarRisk');
    if (drEl) { drEl.textContent = '$' + sf(t.dollarRisk,2); drEl.style.color = t.riskPct > 1.5 ? 'var(--warn)' : 'var(--bear)'; }
    const ddEl = document.getElementById('ddWarn');
    if (ddEl) ddEl.textContent = (t.maxConsecLosses !== undefined ? t.maxConsecLosses : '?') + ' losses = 10% drawdown';
  }
  updatePartialTPs(t);
  if (t && forceRecalc) {
    fireSetupAlert(t, currentSymbol);
    // Only pop checklist on bar close, not every recalc
    if (!t.blocked && !_tradeLocked && _lastBarClose) showChecklistForSetup(t);
  }
  // Loss lockout UI update
  const banner = document.getElementById('loss-lockout-banner');
  if (banner) banner.classList.toggle('active', _tradeLocked);

  const badge = document.getElementById('tradeLockBadge');
  if (badge) {
    if (t && !t.blocked) {
      const idealEntry = t.insideOB || t.atSRLevel;
      badge.textContent = t.insideOB ? '✓ IDEAL OB ENTRY' : t.atSRLevel ? '✓ AT S/R LEVEL' : '✓ APPROACHING ZONE';
      badge.style.background = idealEntry ? 'rgba(0,229,160,0.15)' : 'rgba(255,165,0,0.1)';
      badge.style.borderColor = idealEntry ? 'rgba(0,229,160,0.4)' : 'rgba(255,165,0,0.3)';
      badge.style.color = idealEntry ? 'var(--bull)' : 'var(--warn)';
    } else {
      badge.textContent = t && t.blocked ? 'GATES FAILED' : 'NO SETUP';
      badge.style.background = 'rgba(255,61,90,0.1)';
      badge.style.borderColor = 'rgba(255,61,90,0.3)';
      badge.style.color = 'var(--bear)';
    }
  }

  // ── BLOCKED or NULL: show gate status ─────────────────────
  if (!t || t.blocked) {
    const isGatesFailed = t && t.blocked;
    const isRRFailed    = !t; // gates passed but SL/TP calc returned null
    const reasons = isGatesFailed ? t.failReasons : [];
    if (isRRFailed) {
      // Gates passed but no valid trade — show waiting state
      container.innerHTML =
        '<div style="font-family:var(--font-mono);font-size:9px;background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.25);border-radius:1px;padding:8px 10px;text-align:center;color:var(--warn)">✓ All gates passed<br><span style="font-size:8px;color:var(--text-dim);display:block;margin-top:4px">SL/TP not valid yet — wait for price<br>to touch the OB zone</span></div>' +
        '<div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-align:center;margin-top:8px;padding:4px">Try switching to a different timeframe<br>or wait for the next MSB</div>';
      updatePartialTPs(null);
      return;
    }
    const dirLabel = t ? (t.isBull ? '▲ LONG' : '▼ SHORT') : '—';
    const dirCol   = t ? (t.isBull ? 'var(--bull)' : 'var(--bear)') : 'var(--neutral)';

    // Gate checklist — show all 5 gates with pass/fail
    const gateNames = [
      'GATE 1 — EMA 20/50 + price vs EMA200',
      'GATE 2 — Bias + Future Swing agree',
      'GATE 3 — Price near OB/S/R',
      'GATE 3b— Zone touch & bounce confirmed',
      'GATE 4 — Bias strength 55%+',
      'GATE 5 — Momentum Z-Score',
      'GATE 6 — HTF 1H/4H/1D alignment',
      'GATE PAT— No str-3 reversal pattern',
    ];
    const gateKeys = ['GATE1','GATE2','GATE3','GATE3b','GATE4','GATE5','GATE6','GATE-PAT'];
    const gateRows = gateNames.map((g, i) => {
      const key = gateKeys[i] || ('GATE' + (i+1));
      const failed  = reasons.some(r => r.startsWith(key + ':') || r.startsWith(key + ' '));
      const warned  = (t && t.warnReasons || []).some(w => w.includes('G' + (i+1)));
      const reason  = reasons.find(r => r.startsWith(key + ':') || r.startsWith(key + ' '));
      const shortReason = reason ? reason.replace(/^GATE\d+: /, '') : '';
      const color   = failed ? 'var(--bear)' : warned ? 'var(--warn)' : 'var(--bull)';
      const label   = failed ? 'FAIL' : warned ? 'WARN' : 'PASS';
      const icon    = failed ? '✗' : warned ? '⚠' : '✓';
      return '<div style="display:flex;flex-direction:column;padding:3px 0;border-bottom:1px solid var(--border)">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-family:var(--font-mono);font-size:8px;color:' + color + '">' + icon + ' ' + g + '</span>' +
          '<span style="font-family:var(--font-mono);font-size:8px;font-weight:700;color:' + color + '">' + label + '</span>' +
        '</div>' +
        (failed && shortReason ? '<div style="font-family:var(--font-mono);font-size:7px;color:var(--warn);padding-top:1px;padding-left:10px">' + shortReason + '</div>' : '') +
      '</div>';
    }).join('');

    const passCount = gateNames.filter((g, i) => {
      const key = gateKeys[i] || ('GATE' + (i+1));
      return !reasons.some(r => r.startsWith(key + ':') || r.startsWith(key + ' '));
    }).length;

    container.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:4px 6px;background:rgba(255,61,90,0.06);border:1px solid rgba(255,61,90,0.2);border-radius:1px">' +

let _srPanelLastZone = null, _srPanelLastLen = 0;
function updateSRPanel() {
  const r = analysisResult;
  if (!r || !r.srLevels) return;
  // Skip if nothing changed
  if (r.srZone === _srPanelLastZone && r.srLevels.length === (_srPanelLastLen||0)) return;
  _srPanelLastZone = r.srZone; _srPanelLastLen = r.srLevels.length;
  const dp = getDP();
  setVal('srSupCount', (r.srSupport||[]).filter(s=>s.strong).length, 'bull');
  setVal('srResCount', (r.srResistance||[]).filter(s=>s.strong).length, 'bear');
  const nsEl = document.getElementById('srNearSup');
  if (nsEl && r.nearestSup) { nsEl.textContent = sf(r.nearestSup.price,dp) + ' ×' + r.nearestSup.touches; nsEl.className='stat-val bull'; }
  else if (nsEl) { nsEl.textContent='—'; nsEl.className='stat-val neutral'; }
  const nrEl = document.getElementById('srNearRes');
  if (nrEl && r.nearestRes) { nrEl.textContent = sf(r.nearestRes.price,dp) + ' ×' + r.nearestRes.touches; nrEl.className='stat-val bear'; }
  else if (nrEl) { nrEl.textContent='—'; nrEl.className='stat-val neutral'; }
  const zoneEl = document.getElementById('srZone');
  if (zoneEl) {
    zoneEl.textContent = r.srZone || '—';
    zoneEl.className = 'stat-val ' + (r.srZone==='AT SUPPORT'?'bull':r.srZone==='AT RESIST'?'bear':r.srZone==='MID RANGE'?'warn':'bright');
  }
  const listEl = document.getElementById('srList');
  if (!listEl) return;
  const all = [...(r.srLevels||[])].sort((a,b)=>b.price-a.price);
  listEl.innerHTML = all.slice(0,12).map(sr => {
    const cls = sr.isSupport ? 'sr-sup' : 'sr-res';
    const str = sr.strong ? ' sr-strong' : '';
    const col = sr.isSupport ? 'var(--bull)' : 'var(--bear)';
    const tag = (sr.isSupport?'SUP':'RES') + (sr.strong?'★':'');
    return '<div class="sr-item ' + cls + str + '">' +
      '<span style="color:' + col + ';font-size:9px">' + tag + '</span>' +
      '<span style="color:var(--text-bright)">' + sf(sr.price,dp) + '</span>' +
      '<span style="color:var(--text-dim);font-size:8px">' + sf(Math.abs(sr.price-r.currentPrice),dp) + 'pts</span>' +
      '<span class="sr-touch-badge">×' + sr.touches + '</span>' +
    '</div>';
  }).join('');
}

// SPARKLINE
// ═══════════════════════════════════════════════════════════════
function updateSparkline() {
  const canvas = document.getElementById('sparkCanvas');
  if (!canvas || candles.length < 10) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const pts = candles.slice(-80).map(c => c.close);
  const mn = Math.min(...pts), mx = Math.max(...pts);
  const range = mx - mn || 1;
  ctx.beginPath();
  pts.forEach((v, i) => {
    const x = (i / (pts.length - 1)) * w;
    const y = h - ((v - mn) / range) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  const last = candles[candles.length - 1];
  const prev = candles[candles.length - 2];
  ctx.strokeStyle = last && prev && last.close >= prev.close ? '#00e5a0' : '#ff3d5a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function setStatus(type, msg) {
  const el = document.getElementById('statusBadge');
  if (!el) return;
  el.textContent = msg;
  el.className = 'tb-status status-' + type;
}

function addAlert(msg, type) {
  const log = document.getElementById('alert-log');
  if (!log) return;
  const pill = document.createElement('div');
  pill.className = 'alert-pill alert-' + type + '-pill';
  pill.textContent = msg;
  log.prepend(pill);
  setTimeout(() => pill.remove(), 4100);
  const panel = document.getElementById('alertLogPanel');
  if (!panel) return;
  const entry = document.createElement('div');
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  entry.style.cssText = 'padding:2px 0;border-bottom:1px solid var(--border);';
  entry.innerHTML = '<span style="color:var(--text-dim)">[' + ts + ']</span> <span style="color:' + (type==='bull'?'var(--bull)':type==='bear'?'var(--bear)':'var(--neutral)') + '">' + msg + '</span>';
  if (panel.firstChild && panel.firstChild.textContent && panel.firstChild.textContent.includes('No alerts')) panel.innerHTML = '';
  panel.prepend(entry);
  if (panel.children.length > 20) panel.removeChild(panel.lastChild);
}

// ═══════════════════════════════════════════════════════════════
function onSymbolChange(val) {
  currentSymbol = val;
  obArray = []; _lockedTrade = null; _lockedOBFingerprint = ''; _lockedBias = null;
  _lastSetupDir = null; // reset so first signal on new symbol always fires
  // Clear TG cooldown for this symbol so new symbol alerts fire immediately
  Object.keys(_tgLastSent).filter(k => k.startsWith(val)).forEach(k => delete _tgLastSent[k]);
  // Clear 4H OB cache for old symbol
  if (typeof _scanCandleCache !== 'undefined') delete _scanCandleCache[val + '_htf4H_obs'];
  if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
    requestCandles();
  } else {
    loadDemoData();
  }
}

function onTFChange(val) {
  currentTF = parseInt(val);
  obArray = []; _lockedTrade = null; _lockedOBFingerprint = ''; _lockedBias = null;
  _lastSetupDir = null; // reset so first signal on new TF always fires
  // Clear TG cooldown for current symbol+newTF so alerts fire immediately
  const _newTF = parseInt(val);
  Object.keys(_tgLastSent).filter(k => k.includes(currentSymbol + _newTF)).forEach(k => delete _tgLastSent[k]);
  // Clear all caches so next load fetches fresh data for new TF
  Object.keys(_scanCandleCache).forEach(k => delete _scanCandleCache[k]);
  Object.keys(_liveScanResults).forEach(k => delete _liveScanResults[k]);
  _scanResults = [];
  if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
    requestCandles();
  } else {
    loadDemoData();
  }
}
