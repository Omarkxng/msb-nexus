// ═══════════════════════════════════════════════════════════════
// LIVE MULTI-TF SCANNER ENGINE v29
// When connected: fetches real candles via WebSocket for every
// symbol × timeframe combination, then runs full analysis.
// When demo: uses generated candles as before.
//
// Scan timeframes: matches current chart TF + one higher TF
// to give HTF context on each setup.
// ═══════════════════════════════════════════════════════════════

// Scan TF list — always scan these TFs regardless of chart TF
const SCAN_TFS = [60, 300, 900, 1800, 3600, 14400]; // 1m, 5m, 15m, 30m, 1h, 4h

let _liveScanResults = {};   // {sym+tf: candles[]} — live fetched candles
let _liveQueue       = [];   // queue of {sym, tf} to fetch live
let _liveQueueActive = false; // is queue currently running
let _liveScanWS      = null;  // dedicated WebSocket for scanner
let _liveScanInterval = null; // auto-refresh interval
let _liveScanSub     = null;  // current subscription id
let _liveScanProg    = 0;
let _liveScanTotal   = 0;
let _liveScanDone    = false;
let _scanTF          = 300;   // TF being scanned (set when scanner opens)

function analyseSymbol(sym, tf) {
  const key = sym + tf;
  const _savedSym = currentSymbol; // save so we can restore if analyseCandles throws
  // Use live candles if available (fetched by live scanner)
  if (_liveScanResults[key] && _liveScanResults[key].length >= 50) {
    _scanCandleCache[key] = _liveScanResults[key];
  }
  // Use main chart candles if this is the current symbol+tf
  if (isConnected && sym === currentSymbol && tf === currentTF && candles.length >= 50) {
    _scanCandleCache[key] = candles;
  }
  // No live data for this sym+tf — skip (never use demo candles for signals)
  const symCandles = _scanCandleCache[key];
  if (!symCandles || symCandles.length < 50) return null;
  let r;
  try { r = analyseCandles(symCandles, sym); } catch(e) { currentSymbol = _savedSym; return null; }
  currentSymbol = _savedSym; // always restore after analyseCandles
  if (!r) return null;
  const t = calcSLTP(r);
  const isBull = r.recentBull > r.recentBear; // FIX: strict majority only
  const lastMSB = isBull
    ? (r.msbBull.length ? r.msbBull[r.msbBull.length - 1] : null)
    : (r.msbBear.length ? r.msbBear[r.msbBear.length - 1] : null);
  const sigAgeBars = lastMSB ? (r.n - 1 - lastMSB.idx) : 999;
  const isLive = isConnected && !!(_liveScanResults[key] || (sym === currentSymbol && tf === currentTF));
  return {
    sym, name: (SCAN_SYMBOLS.find(s => s.id === sym) || { name: sym }).name,
    tf, price: r.currentPrice, t, bias: isBull ? 'bull' : 'bear',
    r, sigAgeBars, isLive,
  };
}

// ── LIVE WS SCANNER: fetch real candles for each sym×tf ────────
function startLiveScan() {
  const prog  = document.getElementById('scanProgress');
  const badge = document.getElementById('scannerModeBadge');
  const body  = document.getElementById('scannerBody');

  // Build queue: all symbols × SCAN_TFS
  _liveQueue = [];
  for (const s of SCAN_SYMBOLS) {
    for (const tf of SCAN_TFS) {
      _liveQueue.push({ sym: s.id, tf });
    }
  }
  _liveScanTotal   = _liveQueue.length;
  _liveScanProg    = 0;
  _liveScanResults = {};
  _liveScanDone    = false;
  _scanResults     = [];

  if (badge) { badge.textContent = '◉ LIVE SCAN'; badge.className = 'live-scan-badge lsb-live'; }
  if (body)  body.innerHTML = '<div class="scan-status">Fetching live candles for all symbols×TFs…<br><span style="font-size:8px;color:var(--text-dim)">This takes ~30 seconds on first run</span></div>';
  if (prog)  prog.textContent = '0/' + _liveScanTotal;

  // Use dedicated WebSocket so main chart stays live
  if (_liveScanWS) { try { _liveScanWS.close(); } catch(e){} }
  const appId = (document.getElementById('appIdInput')?.value || '').trim() || '1089';
  _liveScanWS = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=' + appId);

  _liveScanWS.onopen = () => {
    _liveQueueActive = true;
    _pumpLiveQueue();
  };

  _liveScanWS.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.error) {
        // Symbol not available — skip and continue
        _liveScanProg++;
        _updateLiveScanProgress();
        setTimeout(_pumpLiveQueue, 120);
        return;
      }
      if (data.msg_type === 'candles' && data.candles) {
        // Store candles
        const req  = _liveQueue[_liveScanProg - 1] || {};
        const key  = (data.echo_req ? data.echo_req.ticks_history : '') + (data.echo_req ? data.echo_req.granularity : '');
        const sym  = data.echo_req ? data.echo_req.ticks_history : req.sym;
        const tf   = data.echo_req ? data.echo_req.granularity   : req.tf;
        const storeKey = sym + tf;
        _liveScanResults[storeKey] = data.candles.map(c => ({
          time:   c.epoch,
          open:   parseFloat(c.open),
          high:   parseFloat(c.high),
          low:    parseFloat(c.low),
          close:  parseFloat(c.close),
          volume: Math.round(Math.abs(parseFloat(c.close) - parseFloat(c.open)) / parseFloat(c.close) * 100000) + 100,
        }));
        _updateLiveScanProgress();
        setTimeout(_pumpLiveQueue, 120); // throttle — prevents Deriv rate-limit drops
      }
    } catch(err) { setTimeout(_pumpLiveQueue, 120); }
  };

  _liveScanWS.onerror = () => {
    // Fall back to demo scan
    if (document.getElementById('scannerModeBadge')) {
      document.getElementById('scannerModeBadge').textContent = 'DEMO DATA';
      document.getElementById('scannerModeBadge').className = 'live-scan-badge lsb-demo';
    }
    runDemoScan();
  };

  _liveScanWS.onclose = () => {
    _liveQueueActive = false;
    if (!_liveScanDone) runDemoScan();
  };
}

function _pumpLiveQueue() {
  if (!_liveScanWS || _liveScanWS.readyState !== WebSocket.OPEN) return;
  if (_liveScanProg >= _liveScanTotal) {
    // All done — mark done FIRST before close to prevent onclose race
    _liveScanDone = true;
    _liveScanWS.close();
    _finishLiveScan();
    return;
  }
  const { sym, tf } = _liveQueue[_liveScanProg];
  _liveScanProg++;
  _liveScanWS.send(JSON.stringify({
    ticks_history: sym,
    adjust_start_time: 1,
    count: 500,
    end: 'latest',
    granularity: tf,
    style: 'candles',
  }));
}

function _updateLiveScanProgress() {
  const prog = document.getElementById('scanProgress');
  if (prog) prog.textContent = _liveScanProg + '/' + _liveScanTotal + ' live';
}

function _finishLiveScan() {
  const prog = document.getElementById('scanProgress');
  const _scanTime = new Date().toLocaleTimeString();
  if (prog) prog.textContent = 'Analysing ' + _liveScanTotal + ' datasets… @ ' + _scanTime;
  // Schedule next auto-refresh in 5 minutes
  clearTimeout(_liveScanInterval);
  if (isConnected) {
    _liveScanInterval = setTimeout(() => { if (isConnected) startLiveScan(); }, 5 * 60 * 1000);
  }
  // FIX: build _scanResults FIRST, then send TG — the old 500ms timeout ran after
  // the 100ms block cleared _scanResults, so TG was always reading an empty array.
  setTimeout(() => {
    _scanResults = [];
    for (const s of SCAN_SYMBOLS) {
      for (const tf of SCAN_TFS) {
        try {
          const result = analyseSymbol(s.id, tf);
          if (result) _scanResults.push(result);
        } catch(e) { console.warn('scan err', s.id, tf, e); }
      }
    }
    // TG alerts ONLY for live-candle results — never demo fallback (wrong price range)
    for (const item of _scanResults) {
      if (item.isLive && item.t && !item.t.blocked && item.t.confluence >= 70)
        maybeSendTG(item.t, item.sym, item.tf);
    }
    renderScanResults();
  }, 100);
}

async function runDemoScan() {
  const body = document.getElementById('scannerBody');
  const prog = document.getElementById('scanProgress');
  if (body) body.innerHTML = '<div class="scan-status">Scanning all symbols (demo)…</div>';
  _scanResults = [];
  const tfsToScan = SCAN_TFS;
  const total = SCAN_SYMBOLS.length * tfsToScan.length;
  let done = 0;
  for (const s of SCAN_SYMBOLS) {
    for (const tf of tfsToScan) {
      done++;
      if (prog) prog.textContent = done + '/' + total + ' — ' + s.name + ' ' + tfLabel(tf);
      if (done % 5 === 0) await new Promise(r => setTimeout(r, 0)); // yield every 5
      try {
        const result = analyseSymbol(s.id, tf);
        if (result) _scanResults.push(result);
      } catch(e) { console.warn('scan error', s.id, e); }
    }
  }
  if (prog) prog.textContent = _scanResults.length + ' setups found';
  // Update scanner button badge
  const _scanBtn = document.getElementById('scannerBtn');
  if (_scanBtn && _scanResults.length > 0) {
    const _validCount = _scanResults.filter(i => i.t && !i.t.blocked && i.t.confluence >= 60).length;
    _scanBtn.textContent = '⊞ SCAN ' + (_validCount > 0 ? '(' + _validCount + ')' : '');
  }
  // Update scanner button badge with valid setup count
  const _scanBtn2 = document.getElementById('scannerBtn');
  if (_scanBtn2) {
    const _vc = _scanResults.filter(i => i.t && !i.t.blocked && i.t.confluence >= 60).length;
    _scanBtn2.textContent = '⊞ SCAN' + (_vc > 0 ? ' (' + _vc + ')' : '');
  }
  // Demo scan: DO NOT send TG alerts — candles are generated (wrong prices)
  renderScanResults();
}

async function runScanner() {
  const badge = document.getElementById('scannerModeBadge');
  _scanResults = [];
  if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
    // Live mode — fetch real candles via dedicated WS
    startLiveScan();
  } else {
    // Demo mode
    if (badge) { badge.textContent = 'DEMO DATA'; badge.className = 'live-scan-badge lsb-demo'; }
    runDemoScan();
  }
}

function renderScanResults() {
  const body = document.getElementById('scannerBody');
  if (!body) return;
  if (_scanResults.length === 0) {
    body.innerHTML = '<div class="scan-status">No results — press RESCAN</div>';
    return;
  }

  function isValidSetup(item) {
    const t = item.t, res = item.r;
    // If calcSLTP returned blocked or null — not valid
    if (!t || t.blocked) return false;
    // Must have actual SL/TP numbers
    if (!t.sl || !t.tp || !t.rr) return false;
    // Confluence minimum — lowered from 70% to 60% to show more setups
    if (t.confluence < 60) return false;
    // RR must meet minimum
    if (t.rr < CFG.minRR) return false;
    // PROXIMITY check: price near aligned OB OR near strong S/R
    const isBull = t.dir === 'LONG';
    const alignedOBs = (res.activeOBs || []).filter(o => isBull ? o.isBull : !o.isBull);
    const atr = res.atr || 1;
    const price = item.price;
    const nearOB = alignedOBs.find(o =>
      price <= o.top + atr * 3 && price >= o.bottom - atr * 3
    );
    const nearSR = (res.srLevels || []).find(s =>
      s.strong && Math.abs(s.price - price) <= atr * 2 && (isBull ? s.isSupport : !s.isSupport)
    );
    if (!nearOB && !nearSR) return false;
    return true;
  }

  const validSetups = _scanResults.filter(isValidSetup);
  // Apply TF filter
  const tfFiltered = _scanTFFilter === 0 ? validSetups : validSetups.filter(item => item.tf === _scanTFFilter);
  let sorted = [...tfFiltered];
  if (_scanSortMode === 'confluence') sorted.sort((a,b) => (b.t&&b.t.confluence||0) - (a.t&&a.t.confluence||0));
  else if (_scanSortMode === 'rr')    sorted.sort((a,b) => (b.t&&b.t.rr||0) - (a.t&&a.t.rr||0));
  else if (_scanSortMode === 'dir')   sorted.sort((a,b) => (b.bias==='bull'?1:0) - (a.bias==='bull'?1:0));
  else                                sorted.sort((a,b) => a.sym.localeCompare(b.sym));

  const skipped = _scanResults.length - validSetups.length;
  const prog = document.getElementById('scanProgress');
  if (prog) prog.textContent = tfFiltered.length + ' setups | ' + skipped + ' filtered | ' + _scanResults.length + ' scanned';

  if (sorted.length === 0) {
    body.innerHTML = '<div class="scan-status" style="color:var(--warn)">No READY setups' + (_scanTFFilter ? ' on ' + tfLabel(_scanTFFilter) : '') + '<br><span style="font-size:8px;color:var(--text-dim)">Need: All Gates Pass | Confluence 60%+ | RR ' + CFG.minRR + ':1+ | Price within 3× ATR of OB</span></div>';
    return;
  }

  const dp = r => getDP(r.sym);
  body.innerHTML = sorted.map(function(item) {
    const t = item.t;
    if (!t) return '';
    const isBull   = t.dir === 'LONG';
    const dirCol   = isBull ? 'var(--bull)' : 'var(--bear)';
    const confCol  = t.confluence >= 70 ? '#00e5a0' : t.confluence >= 45 ? 'var(--warn)' : 'var(--bear)';
    const rrCol    = t.rr >= 2.5 ? 'var(--bull)' : 'var(--warn)';
    const cardCls  = isBull ? 'bull-card' : 'bear-card';
    const hpz      = t.isHPZ ? '<span class="scan-hpz">★HPZ</span>' : '';
    const idealBdg = item.r && item.r.activeOBs && item.r.activeOBs.some(o => {
      const iB = t.dir === 'LONG';
      return (iB ? o.isBull : !o.isBull) && item.price <= o.top && item.price >= o.bottom;
    }) ? '<span style="font-family:var(--font-mono);font-size:7px;padding:1px 3px;background:rgba(0,229,160,0.3);color:#fff;border-radius:1px;font-weight:bold">★IDEAL</span>' : '';
    const liveBdg  = item.isLive ? '<span style="font-family:var(--font-mono);font-size:7px;padding:1px 3px;background:rgba(0,229,160,0.2);color:var(--bull);border:1px solid rgba(0,229,160,0.4);border-radius:1px">◉LIVE</span>' : '';
    const tfBdg    = '<span style="font-family:var(--font-mono);font-size:7px;padding:1px 4px;background:rgba(0,180,216,0.15);color:var(--cyan);border-radius:1px">' + tfLabel(item.tf) + '</span>';
    const ageBdg   = (item.sigAgeBars !== undefined && item.sigAgeBars < 999) ? '<span class="age-badge">' + item.sigAgeBars + 'b ago</span>' : '';
    const emaBdg   = item.r.emaTrend === (isBull ? 'bull' : 'bear') ? '<span style="font-family:var(--font-mono);font-size:7px;padding:1px 3px;background:rgba(0,180,216,0.15);color:var(--cyan);border-radius:1px">EMA✓</span>' : '';
    const swpBdg   = item.r.recentSweeps && item.r.recentSweeps.length ? '<span class="sweep-tag">⚡' + item.r.recentSweeps.length + '</span>' : '';
    const src      = (t.slSources||[]).join('+') + '→' + (t.tpSources||[]).join('+');
    return '<div class="scan-card ' + cardCls + '" onclick="switchToSymbol(\'' + item.sym + '\',' + item.tf + ')">' +
      '<div class="scan-card-header"><span class="scan-symbol">' + item.name + ' ' + hpz + ' ' + idealBdg + ' ' + liveBdg + ' ' + tfBdg + '</span>' +
      '<span class="scan-dir" style="color:' + dirCol + '">' + (isBull?'▲':'▼') + ' ' + t.dir + '</span></div>' +
      '<div style="display:flex;gap:3px;margin-bottom:3px">' + ageBdg + emaBdg + swpBdg + '</div>' +
      '<div class="scan-conf-bar"><div class="scan-conf-fill" style="width:' + t.confluence + '%;background:' + confCol + '"></div></div>' +
      '<div class="scan-price-row"><span class="scan-label">ENTRY</span><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-bright)">' + sf(t.entry,dp(item)) + '</span></div>' +
      '<div class="scan-price-row"><span class="scan-label">SL</span><span style="font-family:var(--font-mono);font-size:9px;color:var(--bear)">' + sf(t.sl,dp(item)) + '</span>' +
      '<span style="font-family:var(--font-mono);font-size:9px;color:var(--bull)">' + sf(t.tp,dp(item)) + '</span><span class="scan-label">TP</span></div>' +
      '<div class="scan-price-row" style="margin-top:3px"><span class="scan-label">RR</span>' +
      '<span style="font-family:var(--font-mono);font-size:9px;color:' + rrCol + '">' + sf(t.rr,2) + ':1</span>' +
      '<span style="font-family:var(--font-mono);font-size:8px;color:' + confCol + '">' + (t.confluence||0) + '% conf</span></div>' +
      '<div style="font-family:var(--font-mono);font-size:7px;color:var(--text-dim);margin-top:3px;border-top:1px solid var(--border);padding-top:3px">' + src + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function switchToSymbol(sym, tf) {
  // ── Set symbol ──
  currentSymbol = sym;
  document.getElementById('symbolSelect').value = sym;

  // ── Set TF from scanner card ──
  if (tf && tf !== currentTF) {
    currentTF = tf;
    const tfSel = document.getElementById('tfSelect');
    if (tfSel) tfSel.value = String(tf);
    // Clear HTF cache entries for old TF to avoid stale bias
    Object.keys(_scanCandleCache).filter(k => k.includes('_htf4H')).forEach(k => delete _scanCandleCache[k]);
  }

  // ── Reset state ──
  obArray = []; _lockedTrade = null; _lockedOBFingerprint = ''; _lockedBias = null; _lastSetupDir = null;
  Object.keys(_scanCandleCache).forEach(k => { if (k !== sym + currentTF) delete _scanCandleCache[k]; });

  // ── Close scanner ──
  _scannerOpen = false;
  const scanEl = document.getElementById('scanner-overlay');
  const scanBtn = document.getElementById('scannerBtn');
  if (scanEl) scanEl.classList.remove('open');
  if (scanBtn) scanBtn.classList.remove('active');

  // ── Load data ──
  if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
    // Live — currentTF already updated, requestCandles uses it
    if (ws._subId) { try { ws.send(JSON.stringify({ forget: ws._subId })); } catch(e){} }
    requestCandles();
    addAlert('Live → ' + sym + ' ' + tfLabel(currentTF), 'bull');
    return;
  }

  // Not connected — use live scanner cache if available, else show waiting state
  const key = sym + currentTF;
  if (_liveScanResults[key] && _liveScanResults[key].length >= 50) {
    _scanCandleCache[key] = _liveScanResults[key];
    candles = _scanCandleCache[key];
    setTimeout(() => {
      if (chart && chart._resize) chart._resize();
      renderChart();
      runAnalysis(true);
      addAlert('→ ' + sym + ' ' + tfLabel(currentTF), 'bull');
    }, 60);
  } else {
    candles = [];
    addAlert('Connect to Deriv for live data — ' + sym, 'bear');
  }
}

let _notifEnabled = false;
let _soundEnabled = false;
let _lastSetupDir = null;

function toggleNotifications() {
  if (!_notifEnabled) {
    if (!('Notification' in window)) { addAlert('Notifications not supported in this browser', 'bear'); return; }
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        _notifEnabled = true;
        const btn = document.getElementById('notifBtn');
        if (btn) { btn.textContent = '🔔 ALERTS ON'; btn.classList.add('active'); }
        addAlert('Push notifications enabled', 'bull');
      } else {
        addAlert('Notification permission denied', 'bear');
      }
    });
  } else {
    _notifEnabled = false;
    const btn = document.getElementById('notifBtn');
    if (btn) { btn.textContent = '🔔 ALERTS'; btn.classList.remove('active'); }
    addAlert('Push notifications disabled', 'mit');
  }
}

function toggleSound() {
  _soundEnabled = !_soundEnabled;
  const btn = document.getElementById('soundBtn');
  if (btn) {
    btn.textContent = _soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND';
    if (_soundEnabled) btn.classList.add('active'); else btn.classList.remove('active');
  }
  if (_soundEnabled) playAlertTone(880, 0.1); // test beep
}

function playAlertTone(freq, vol) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function fireSetupAlert(t, sym) {
  if (!t || t.blocked || !t.rr) return;
  const dir = t.dir;
  if (dir === _lastSetupDir) return; // don't repeat same direction
  _lastSetupDir = dir;
  const msg = '🎯 ' + sym + ' ' + dir + ' setup — RR ' + sf(t.rr,2) + ':1 | Conf ' + t.confluence + '%';
  addAlert(msg, t.dir === 'LONG' ? 'bull' : 'bear');
  if (_soundEnabled) playAlertTone(t.dir === 'LONG' ? 660 : 440, 0.15);
  if (_notifEnabled && document.hidden) {
    try { new Notification('MSB·OB·FS ULTRA', { body: msg, icon: '' }); } catch(e) {}
  }
  // Try TG on current TF — if TF is below threshold (1m/5m/10m/2m) it will skip
  maybeSendTG(t, sym, currentTF);
  // Also try on the next higher supported TF if current is too low
  const _supportedTFs = [900, 1800, 3600, 14400];
  if (!_supportedTFs.includes(currentTF)) {
    // Show in-app notice so user knows TF is too low for TG
    if (_tgEnabled) addAlert('ℹ️ Switch to 15m+ for TG alerts on this setup', 'mit');
  }
}

document.addEventListener('keydown', e => {
  // Ignore if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  switch (e.key.toLowerCase()) {
    case 'r': loadFreshData(); break;                    // R = regenerate demo data
    case 't': runAnalysis(true); addAlert('Analysis re-triggered', 'bull'); break; // T = retrigger
    case 'l': if (isConnected) { startLiveScan(); addAlert('Live scan started', 'bull'); } break; // L = live scan
    case 's': toggleScanner(); break;                    // S = toggle scanner
    case 'c': toggleConnect(); break;                    // C = connect/disconnect
    case ' ': toggleSettings(); e.preventDefault(); break; // Space = settings
    case 'escape':
      if (_scannerOpen) toggleScanner();
      if (settingsOpen) toggleSettings();
      break;
  }
});

// TRADE JOURNAL
// ═══════════════════════════════════════════════════════════════
let _journalOpen = false;
let _journal = [];
try { _journal = JSON.parse(localStorage.getItem('msb_journal') || '[]'); } catch(e) { _journal = []; }

function toggleJournal() {
  _journalOpen = !_journalOpen;
  const el = document.getElementById('journal-drawer');
  if (el) el.classList.toggle('open', _journalOpen);
  if (_journalOpen) renderJournal();
}

function logTrade(t, sym, tf) {
  if (!t || t.blocked) return;
  const dp = getDP(sym);
  const entry = {
    id: Date.now(),
    time: new Date().toISOString().slice(0,16).replace('T',' '),
    sym: sym || currentSymbol,
    tf: tfLabel(tf || currentTF),
    dir: t.dir,
    entry: sf(t.entry, dp),
    sl: sf(t.sl, dp),
    tp: sf(t.tp, dp),
    rr: sf(t.rr, 2),
    conf: t.confluence || 0,
    outcome: 'OPEN',
  };
  _journal.unshift(entry);
  if (_journal.length > 100) _journal.pop();
  try { localStorage.setItem('msb_journal', JSON.stringify(_journal)); } catch(e) {}
  if (_journalOpen) renderJournal();
}

function setTradeOutcome(id, outcome) {
  const entry = _journal.find(j => j.id === id);
  if (entry) {
    entry.outcome = outcome;
    try { localStorage.setItem('msb_journal', JSON.stringify(_journal)); } catch(e) {}
    // Update consecutive loss tracker
    if (outcome === 'LOSS') {
      _consecLosses++;
      try { localStorage.setItem('msb_consec_losses', _consecLosses); } catch(e) {}
      if (_consecLosses >= 3) {
        _tradeLocked = true;
        try { localStorage.setItem('msb_trade_locked', '1'); } catch(e) {}
        const banner = document.getElementById('loss-lockout-banner');
        if (banner) banner.classList.add('active');
        addAlert('⛔ 3 consecutive losses — trading PAUSED', 'bear');
      }
    } else if (outcome === 'WIN') {
      _consecLosses = 0;
      _tradeLocked = false;
      try { localStorage.setItem('msb_consec_losses', '0'); localStorage.setItem('msb_trade_locked', '0'); } catch(e) {}
      const _banner = document.getElementById('loss-lockout-banner');
      if (_banner) _banner.classList.remove('active');
    }
    renderJournal();
  }
}

function resetLossLock() {
  _consecLosses = 0;
  _tradeLocked = false;
  try { localStorage.setItem('msb_consec_losses', '0'); localStorage.setItem('msb_trade_locked', '0'); } catch(e) {}
  const banner = document.getElementById('loss-lockout-banner');
  if (banner) banner.classList.remove('active');
  addAlert('Loss lockout reset — trading resumed', 'bull');
}

function clearJournal() {
  if (!confirm('Clear all journal entries?')) return;
  _journal = [];
  try { localStorage.removeItem('msb_journal'); } catch(e) {}
  renderJournal();
}

function exportJournalCSV() {
  const headers = 'Time,Symbol,TF,Direction,Entry,SL,TP,RR,Confluence,Outcome';
  const rows = _journal.map(j =>
    [j.time,j.sym,j.tf,j.dir,j.entry,j.sl,j.tp,j.rr,j.conf+'%',j.outcome].join(',')
  );
  const csv = headers + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'msb_journal_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function renderJournal() {
  const body = document.getElementById('journalBody');
  const stats = document.getElementById('journalStats');
  if (!body) return;
  if (_journal.length === 0) {
    body.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-dim);padding:16px">No trades logged yet</td></tr>';
    if (stats) stats.innerHTML = '';
    return;
  }
  const wins   = _journal.filter(j => j.outcome === 'WIN').length;
  const losses = _journal.filter(j => j.outcome === 'LOSS').length;
  const open   = _journal.filter(j => j.outcome === 'OPEN').length;
  const wr     = (wins + losses) > 0 ? Math.round(wins / (wins + losses) * 100) : 0;
  if (stats) {
    stats.innerHTML =
      '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:4px 8px;text-align:center"><div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim)">TRADES</div><div style="font-family:var(--font-mono);font-size:13px;color:var(--text-bright)">' + _journal.length + '</div></div>' +
      '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:4px 8px;text-align:center"><div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim)">WIN RATE</div><div style="font-family:var(--font-mono);font-size:13px;color:' + (wr>=55?'var(--bull)':wr>=45?'var(--warn)':'var(--bear)') + '">' + wr + '%</div></div>' +
      '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:4px 8px;text-align:center"><div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim)">CONSEC LOSS</div><div style="font-family:var(--font-mono);font-size:13px;color:' + (_consecLosses>=2?'var(--bear)':'var(--text-bright)') + '">' + _consecLosses + '</div></div>' +
      '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:4px 8px;text-align:center"><div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim)">OPEN</div><div style="font-family:var(--font-mono);font-size:13px;color:var(--warn)">' + open + '</div></div>';
  }
  body.innerHTML = _journal.map(j => {
    const cls = j.outcome === 'WIN' ? 'outcome-win' : j.outcome === 'LOSS' ? 'outcome-loss' : 'outcome-open';
    const dirCol = j.dir === 'LONG' ? 'var(--bull)' : 'var(--bear)';
    return '<tr>' +
      '<td style="color:var(--text-dim)">' + j.time + '</td>' +
      '<td style="color:var(--text-bright)">' + j.sym + '</td>' +
      '<td>' + j.tf + '</td>' +
      '<td style="color:' + dirCol + '">' + j.dir + '</td>' +
      '<td>' + j.entry + '</td>' +
      '<td style="color:var(--bear)">' + j.sl + '</td>' +
      '<td style="color:var(--bull)">' + j.tp + '</td>' +
      '<td>' + j.rr + ':1</td>' +
      '<td>' + j.conf + '%</td>' +
      '<td class="' + cls + '">' +
        (j.outcome === 'OPEN'
          ? '<button onclick="setTradeOutcome(' + j.id + ',\'WIN\')" style="background:rgba(0,229,160,0.15);border:1px solid rgba(0,229,160,0.3);color:var(--bull);font-family:var(--font-mono);font-size:8px;cursor:pointer;padding:1px 5px;margin-right:3px">W</button>' +
            '<button onclick="setTradeOutcome(' + j.id + ',\'LOSS\')" style="background:rgba(255,61,90,0.15);border:1px solid rgba(255,61,90,0.3);color:var(--bear);font-family:var(--font-mono);font-size:8px;cursor:pointer;padding:1px 5px">L</button>'
          : j.outcome)
        + '</td>' +
    '</tr>';
  }).join('');
}

function toggleTG() {
  _tgEnabled = !_tgEnabled;
  const btn = document.getElementById('tgBtn');
  if (btn) { btn.textContent = _tgEnabled ? '\u2708 TG ON' : '\u2708 TG OFF'; btn.className = 'tg-badge ' + (_tgEnabled ? 'tg-on' : 'tg-off'); }
  addAlert('Telegram ' + (_tgEnabled ? 'ENABLED' : 'DISABLED'), _tgEnabled ? 'bull' : 'mit');
}

async function sendTG(text) {
  if (!_tgEnabled) return;
  const token  = _getTGToken();
  const chatId = _getTGChatId();
  if (!token || !chatId) { addAlert('TG: No token/chat ID set in Settings', 'bear'); return; }
  const url = 'https://api.telegram.org/bot' + token + '/sendMessage';
  try {
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'HTML' }),
    }).then(r => r.json()).then(d => {
      if (!d.ok) addAlert('TG error: ' + (d.description || 'unknown'), 'bear');
    }).catch(() => {});
  } catch (e) {
    addAlert('TG: Failed to send (' + e.message + ')', 'bear');
  }
}

function buildTGMsg(t, sym, tf) {
  if (!t || t.blocked || !t.sl || !t.tp) return null;
  const dp   = getSymbolMT5Spec(sym).digits;
  const dir  = t.dir === 'LONG' ? '\uD83D\uDFE2 LONG' : '\uD83D\uDD34 SHORT';
  const conf = t.confluence || 0;
  // Grade — thresholds reflect the TF tier that was cleared
  const gradeThresh = (tf === 900)   ? [95, 92, 88]
                    : (tf === 1800)  ? [93, 90, 85]
                    : (tf === 3600)  ? [90, 85, 80]
                    : /* 4H */        [88, 82, 75];
  const gr = conf >= gradeThresh[0] ? '\u2B50\u2B50\u2B50\u2B50 S-TIER'
           : conf >= gradeThresh[1] ? '\u2B50\u2B50\u2B50 A+'
           : conf >= gradeThresh[2] ? '\u2B50\u2B50 A'
           : '\u2B50 B';
  // TF tier badge
  const tfTier = (tf === 900)  ? '\uD83D\uDD36 15M ELITE'
               : (tf === 1800) ? '\uD83D\uDD37 30M PRIME'
               : (tf === 3600) ? '\uD83D\uDFE1 1H PRIME'
               : '\uD83D\uDFE0 4H MACRO';
  const zone = t.insideOB ? '\uD83D\uDCE6 Inside OB' : '\uD83D\uDCCA At S/R';
  const sizeLine = (t.units && t.dollarRisk) ? ('\n\uD83D\uDCB0 Size: <b>' + (sn(t.units)<0.01?sf(t.units,4):sf(t.units,2)) + ' units</b>  Risk: <b>$' + sf(t.dollarRisk,2) + '</b>  Pot. profit: <b>$' + sf(t.potentialProfit,2) + '</b>') : '';
  const hpz  = t.isHPZ ? '\n\u2605 <b>HIGH PROBABILITY ZONE</b>' : '';
  const mtf  = (t.components && t.components.ob && t.components.ob.mtfStack) ? '\n\u229E <b>MTF 4H OB STACK</b>' : '';
  const pat = t.bestPattern
    ? ('\n\u270f ' + '\u2605'.repeat(t.bestPattern.strength) + ' <b>' + t.bestPattern.name + '</b> (' + t.bestPattern.dir + ')')
    : '';
  const spk = (t.warnReasons && t.warnReasons.find(w => w.includes('SPIKE') && w.toLowerCase().includes('confirm')))
    ? '\n\u26a1 <b>SPIKE-AND-CONTINUE confirmed</b>'
    : '';
  const tln = (t.atTrendLine && t.nearTL)
    ? ('\n\ud83d\udcd0 <b>Trend line ' + (t.nearTL.isSupport?'support':'resist') + ' x' + t.nearTL.touches + ' touches</b>')
    : '';
  const isBull = t.dir === 'LONG';
  const risk = Math.abs(t.entry - t.sl);
  const tp1  = isBull ? t.entry + risk * 1.0 : t.entry - risk * 1.0;
  const tp2  = t.tp;
  const tp3  = isBull ? t.entry + risk * (t.rr * 1.5) : t.entry - risk * (t.rr * 1.5);
  const beMoveAt = isBull ? t.entry + risk * 0.3 : t.entry - risk * 0.3;
  // Only show confirmed positive notes — filter out any caution language
  const noteLines = (t.warnReasons || [])
    .filter(w => w.startsWith('NOTE') && !w.includes('wait') && !w.includes('No ') && !w.includes('Approaching'))
    .map(w => '\u2139 ' + w.replace(/^NOTE ?G?\d*: ?/, ''))
    .join('\n');
  // Use MT5-rounded values if available, else raw
  const _mt5e = (t.mt5 && t.mt5.entry) ? sf(t.mt5.entry, dp) : sf(t.entry, dp);
  const _mt5s = (t.mt5 && t.mt5.sl)    ? sf(t.mt5.sl,    dp) : sf(t.sl,    dp);
  const _mt5t = (t.mt5 && t.mt5.tp)    ? sf(t.mt5.tp,    dp) : sf(t.tp,    dp);

  return '<b>\uD83C\uDFAF ' + sym + ' ' + tfLabel(tf) + '</b>  ' + dir + '  ' + tfTier + '\n' +
    gr + '  Conf: <b>' + conf + '%</b>  RR: <b>' + sf(t.rr,2) + ':1</b>\n' +
    '\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n' +
    '\uD83D\uDCCD Entry: <b>' + _mt5e + '</b>  <i>(market order)</i>\n' +
    '\uD83D\uDED1 SL:    <b>' + _mt5s + '</b>  <i>(' + (t.slSources||[]).join('+') + ')</i>\n' +
    '\u2705 TP1:   <b>' + sf(roundToTick(tp1,sym),dp) + '</b>  <i>(1:1 — close 33%)</i>\n' +
    '\u27a1 BE @:   <b>' + sf(roundToTick(beMoveAt,sym),dp) + '</b>  <i>(move SL to entry: ' + _mt5e + ')</i>\n' +
    '\u2705 TP2:   <b>' + _mt5t + '</b>  <i>(full TP · RR ' + sf(t.rr,1) + ':1 — close 50%)</i>\n' +
    '\u2705 TP3:   <b>' + sf(roundToTick(tp3,sym),dp) + '</b>  <i>(EXT — trail rest)</i>\n' +
    zone + sizeLine + hpz + mtf + pat + spk + tln +
    (noteLines ? '\n' + noteLines : '') + '\n' +
    '\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n' +
    '\u23f0 ' + new Date().toLocaleTimeString() + '  |  \uD83E\uDD16 MSB·OB·FS ULTRA v36.6';
}

function maybeSendTG(t, sym, tf) {
  if (!t || t.blocked || !_tgEnabled) return;
  // Never alert from demo data — live connection mandatory
  if (!isConnected) return;
  // Candles must have been live-fetched — checked by caller (item.isLive) but double-guard here
  const _liveKey = sym + tf;
  if (!_liveScanResults[_liveKey] && !(sym === currentSymbol && tf === currentTF && candles.length >= 50)) return;

  // ── QUALITY GATE: Tiered rules by timeframe ──────────────
  // 1m and 5m are excluded entirely — too noisy for alerts
  if (tf !== 900 && tf !== 1800 && tf !== 3600 && tf !== 14400) return;

  // Block only on genuine WARN-level reasons (not NOTE informational messages)
  // NOTE messages like 'Approaching OB' are informational and must NOT block alerts
  const hasWarn = (t.warnReasons || []).some(w =>
    w.startsWith('WARN')
  );
  if (hasWarn) return;

  const conf = t.confluence || 0;
  const rr   = t.rr || 0;
  const hasPremiumZone = t.isHPZ || (t.components && t.components.ob && t.components.ob.mtfStack);

  if (tf === 3600 || tf === 14400) {
    // ── 1H / 4H: balanced quality rules ──────────────────
    if (conf < 70) return;
    if (rr < 1.5) return;
    if (!t.insideOB && !t.atSRLevel) return;

  } else if (tf === 1800) {
    // ── 30M: quality rules ────────────────────────────────
    if (conf < 72) return;
    if (rr < 1.8) return;
    if (!t.insideOB && !t.atSRLevel) return;

  } else if (tf === 900) {
    // ── 15M: strict rules ─────────────────────────────────
    if (conf < 78) return;
    if (rr < 2.0) return;
    if (!t.insideOB && !t.atSRLevel) return;
    // Need at least HPZ OR MTF stack (not both mandatory)
    const hasMtfStack = t.components && t.components.ob && t.components.ob.mtfStack;
    if (!t.isHPZ && !hasMtfStack) return;
  }

  // ── Cooldown check ───────────────────────────────────────
  const key = sym + tf + t.dir;
  const now = Date.now();
  if (_tgLastSent[key] && now - _tgLastSent[key] < TG_COOLDOWN) return;
  _tgLastSent[key] = now;

  const msg = buildTGMsg(t, sym, tf);
  if (msg) {
    sendTG(msg);
    addAlert('✈ TG sent: ' + sym + ' ' + tfLabel(tf) + ' ' + t.dir + ' ' + t.confluence + '%', t.dir==='LONG'?'bull':'bear');
  }
}

// ═══════════════════════════════════════════════════════════════
// CONTINUOUS SCAN
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// CONTINUOUS AUTO-SCAN — Web Worker (off main thread, zero lag)
// ═══════════════════════════════════════════════════════════════
let _cscanWorker = null;

// ═══════════════════════════════════════════════════════════════
// CONTINUOUS SCANNER — main-thread chunked (no Web Worker / no CSP issues)
// Processes one symbol×TF per setTimeout tick → zero UI blocking
// ═══════════════════════════════════════════════════════════════
function _runCScanChunked() {
  if (!_cscanRunning) return;
  const prog = document.getElementById('scanProgress');
  const pairs = [];
  for (const s of SCAN_SYMBOLS) {
    for (const tf of SCAN_TFS) {
      pairs.push({ sym: s.id, name: s.name, tf });
    }
  }
  const total = pairs.length;
  let idx = 0;
  const results = [];

  function processNext() {
    if (!_cscanRunning) return;
    if (idx >= total) {
      if (prog) prog.textContent = 'AUTO done ' + new Date().toLocaleTimeString() + ' (' + results.length + ' setups)';
      _lastScanTime = Date.now(); // keepalive stamp

      // Build live key set — only fire TG for real candle data
      const _liveKeys = new Set();
      for (const s of SCAN_SYMBOLS) {
        for (const tf of SCAN_TFS) {
          const key = s.id + tf;
          if (_liveScanResults[key] && _liveScanResults[key].length >= 50) _liveKeys.add(key);
          if (isConnected && s.id === currentSymbol && tf === currentTF && candles.length >= 50) _liveKeys.add(key);
        }
      }

      for (const item of results) {
        item.warnReasons = item.warnReasons || [];
        item.bestPattern = item.bestPattern || null;
        item.atTrendLine = item.atTrendLine || false;
        item.nearTL      = item.nearTL      || null;
        item.components  = item.components  || { ob: { mtfStack: item.mtfStack || false } };
        if (_liveKeys.has(item.sym + item.tf)) {
          maybeSendTG(item, item.sym, item.tf);
        }
        addAlert('\uD83C\uDFAF ' + item.sym + ' ' + tfLabel(item.tf) + ' ' + item.dir + ' ' + item.confluence + '% conf', item.dir === 'LONG' ? 'bull' : 'bear');
      }

      // Schedule next full cycle
      _lastScanTime = Date.now();
      if (_cscanRunning) _cscanTimer = setTimeout(_runCScanChunked, CSCAN_MS);
      return;
    }

    const { sym, name, tf } = pairs[idx++];
    if (prog && idx % 10 === 0) prog.textContent = 'AUTO ' + idx + '/' + total;

    try {
      const key = sym + tf;
      if (_liveScanResults[key] && _liveScanResults[key].length >= 50) {
        _scanCandleCache[key] = _liveScanResults[key];
      } else if (isConnected && sym === currentSymbol && tf === currentTF && candles.length >= 50) {
        _scanCandleCache[key] = candles;
      }
      const cArr = _scanCandleCache[key]; // live data only — no demo fallback
      if (cArr && cArr.length >= 50) {
        const _savedSym = currentSymbol;
        currentSymbol = sym;
        let r;
        try { r = analyseCandles(cArr, sym); } catch(e) { r = null; }
        currentSymbol = _savedSym;
        if (r) {
          const t = calcSLTP(r);
          if (t && !t.blocked && t.confluence >= 70 && t.rr >= CFG.minRR) {
            results.push({
              sym, name, tf,
              dir: t.dir, entry: t.entry, sl: t.sl, tp: t.tp,
              rr: t.rr, confluence: t.confluence,
              insideOB: t.insideOB, atSRLevel: t.atSRLevel,
              slSources: t.slSources, tpSources: t.tpSources,
              isHPZ: t.isHPZ, mtfStack: t.components && t.components.ob && t.components.ob.mtfStack,
              warnReasons: t.warnReasons || [], blocked: false,
            });
          }
        }
      }
    } catch(e) { /* skip */ }

    setTimeout(processNext, 0);
  }

  if (prog) prog.textContent = 'AUTO scanning…';
  setTimeout(processNext, 0);
}

function _buildCScanWorker() { return null; } // stub — blob workers CSP-blocked

// ═══════════════════════════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════════════════════════
let _hmOpen = false;
function toggleHeatmap() {
  _hmOpen = !_hmOpen;
  const el = document.getElementById('heatmap-overlay');
  const btn = document.getElementById('hmBtn');
  if (el) el.style.display = _hmOpen ? 'flex' : 'none';
  if (btn) btn.classList.toggle('active', _hmOpen);
  if (_hmOpen) runHeatmap();
}

function runHeatmap() {
  const grid = document.getElementById('hmGrid');
  const prog = document.getElementById('hmProg');
  if (!grid) return;
  const tfs = SCAN_TFS;
  const tfLbls = tfs.map(t => tfLabel(t));
  // Header row
  let header = '<div class="heatmap-hdr"></div>' + tfLbls.map(l => '<div class="heatmap-hdr">' + l + '</div>').join('');
  const res = {};
  const total = SCAN_SYMBOLS.length;
  let symIdx = 0;

  function renderGrid() {
    let out = header;
    for (const s of SCAN_SYMBOLS) {
      out += '<div class="heatmap-sym">' + s.name + '</div>';
      for (const tf of tfs) {
        const r = res[s.id+'_'+tf];
        if (!r || r.blocked || !r.conf) {
          out += '<div class="heatmap-cell hm-none" onclick="switchToSymbol(\'' + s.id + '\',' + tf + ')">—</div>';
          continue;
        }
        const bull = r.dir === 'LONG';
        const cls = bull ? (r.conf>=75?'hm-high':r.conf>=55?'hm-med':'hm-low') : (r.conf>=75?'hm-b-high':r.conf>=55?'hm-b-med':'hm-b-low');
        out += '<div class="heatmap-cell ' + cls + '" onclick="switchToSymbol(\'' + s.id + '\',' + tf + ')" title="RR:' + sf(r.rr,1) + '">' + (bull?'\u25b2':'\u25bc') + ' ' + r.conf + '%</div>';
      }
    }
    grid.innerHTML = out;
  }

  // Process one symbol per idle frame — zero main-thread blocking
  function processNextSymbol() {
    if (symIdx >= SCAN_SYMBOLS.length) {
      renderGrid();
      if (prog) prog.textContent = 'Done ' + new Date().toLocaleTimeString();
      return;
    }
    const s = SCAN_SYMBOLS[symIdx++];
    if (prog) prog.textContent = symIdx + '/' + total + ' ' + s.name;
    for (const tf of tfs) {
      try {
        const key = s.id + tf;
        const c = _scanCandleCache[key]; // live data only — no demo fallback
        if (!c || c.length < 50) { res[s.id+'_'+tf] = null; continue; }
        const rr = analyseCandles(c, s.id);
        if (!rr) { res[s.id+'_'+tf] = null; continue; }
        const t = calcSLTP(rr);
        res[s.id+'_'+tf] = t ? { conf: t.confluence||0, dir: t.dir, rr: t.rr, blocked: t.blocked } : null;
      } catch(e) { res[s.id+'_'+tf] = null; }
    }
    // Yield to browser between each symbol — use rIC for true idle scheduling
    if (typeof requestIdleCallback !== 'undefined') {
      requestIdleCallback(processNextSymbol, { timeout: 200 });
    } else {
      setTimeout(processNextSymbol, 0);
    }
  }

  grid.innerHTML = header + '<div class="scan-status" style="grid-column:1/-1">Scanning...</div>';
  processNextSymbol();
}

// ═══════════════════════════════════════════════════════════════
// P&L TRACKER
// ═══════════════════════════════════════════════════════════════
function openTrade(t, sym) {
  if (!t || t.blocked) return;
  // Always recompute units from current DOM balance/risk (worker may have used different values)
  const _bal   = parseFloat(document.getElementById('accountBalance')?.value) || 1000;
  const _rPct  = Math.min(parseFloat(document.getElementById('riskPct')?.value) || 1.0, CFG.maxRiskPct);
  const _dRisk = _bal * (_rPct / 100);
  const _units = t.risk > 0 ? _dRisk / t.risk : 0;
  _openTrades.push({ id: Date.now(), sym, dir: t.dir, entry: t.entry, sl: t.sl, tp: t.tp, risk: t.risk, units: _units, time: new Date().toLocaleTimeString() });
  refreshPnL();
}

function refreshPnL() {
  const el = document.getElementById('pnlContent');
  if (!el) return;
  if (!_openTrades.length) { el.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:8px">No open trades</div>'; return; }
  const cur = candles.length ? candles[candles.length-1].close : 0;
  if (!cur) { el.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:8px">Waiting for price data...</div>'; return; }
  const dp  = getDP();
  el.innerHTML = _openTrades.map((tr) => {
    const bull = tr.dir === 'LONG';
    const fpts = bull ? cur - tr.entry : tr.entry - cur;
    const fdol = tr.units > 0 ? fpts * tr.units : 0;
    const col  = fpts >= 0 ? 'var(--bull)' : 'var(--bear)';
    const cls  = fpts >= 0 ? 'pnl-profit' : 'pnl-loss';
    const be   = bull ? cur >= tr.entry + tr.risk * 0.3 : cur <= tr.entry - tr.risk * 0.3;
    return '<div class="pnl-card ' + cls + '">' +
      '<div style="display:flex;justify-content:space-between">' +
        '<span style="color:' + (bull?'var(--bull)':'var(--bear)') + '">' + tr.sym + ' ' + (bull?'▲':'▼') + ' ' + tr.time + '</span>' +
        '<button onclick="closeTrade(\'' + tr.id + '\')" style="background:none;border:none;color:var(--text-dim);cursor:pointer">✕</button>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:2px">' +
        '<span style="color:var(--text-dim)">Float</span>' +
        '<span style="color:' + col + '">' + (fpts>=0?'+':'') + sf(fpts,dp) + 'pts  $' + (fdol>=0?'+':'') + sf(fdol,2) + '</span>' +
      '</div>' +
      (be ? '<div style="color:var(--cyan);font-size:8px;margin-top:2px">⟳ Move SL to BE now</div>' : '') +
    '</div>';
  }).join('');
}

function closeTrade(id) {
  _openTrades = _openTrades.filter(t => String(t.id) !== String(id));
  refreshPnL();
}

// ═══════════════════════════════════════════════════════════════
// SCANNER KEEPALIVE — restart immediately on tab focus/visibility
// Browsers throttle/freeze setTimeout in background tabs.
// On return: clear any stale timer and kick a new cycle instantly.
// ═══════════════════════════════════════════════════════════════
let _lastScanTime = 0;

function _scanKeepalive() {
  if (!_cscanRunning) return;
  const now = Date.now();
  // If more than CSCAN_MS has passed since last scan completed, run now
  if (now - _lastScanTime >= CSCAN_MS) {
    clearTimeout(_cscanTimer);
    _cscanTimer = null;
    _runCScanChunked();
  }
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) _scanKeepalive();
});

window.addEventListener('focus', () => {
  _scanKeepalive();
});

// Stamp hidden time so keepalive fires immediately on return
document.addEventListener('visibilitychange', () => {
  if (document.hidden) _lastScanTime = Date.now() - CSCAN_MS + 5000;
});

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  loadAccountSettings();
  // Restore loss lockout state
  if (_tradeLocked) {
    const banner = document.getElementById('loss-lockout-banner');
    if (banner) banner.classList.add('active');
  }
  // Wait for next animation frame so the browser has painted the layout
  // and all flex/grid dimensions are available
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      initChart();
      if (chart && chart._resize) chart._resize();
      setTimeout(() => {
        if (chart && chart._resize) chart._resize();
        loadDemoData();
        // Auto-start continuous scanner — runs every cycle without user action
        if (!_cscanRunning) {
          _cscanRunning = true;
          const btn = document.getElementById('csBtn');
          if (btn) { btn.textContent = '\u27f3 SCANNING'; btn.className = 'cs-badge cs-on'; }
          _lastScanTime = 0;
          _runCScanWorker();
        }
      }, 150);
    });
  });
});

  }
  if (bel) {
    bel.textContent = bias === 'bull' ? '▲ LONG' : bias === 'bear' ? '▼ SHORT' : 'NEUTRAL';
    bel.className   = 'mob-bias-badge ' + (bias || '');
  }
}

// ── Chart tab: draw from main candles array ──
function mobDrawChart() {
  if (_mobActiveTab !== 'chart') return;
  const canvas = document.getElementById('mob-chart-canvas');
  if (!canvas || !candles || candles.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const bars = candles.slice(-120); // last 120 bars
  const highs  = bars.map(b => b.high);
  const lows   = bars.map(b => b.low);
  const hi = Math.max(...highs);
  const lo = Math.min(...lows);
  const range = hi - lo || 1;

  const pad = { t: 20, b: 30, l: 6, r: 48 };
  const cw = (W - pad.l - pad.r) / bars.length;
  const ch = H - pad.t - pad.b;

  const yOf = v => pad.t + ch - ((v - lo) / range) * ch;
  const xOf = i => pad.l + i * cw;

  // Background
  ctx.fillStyle = 'rgba(5,10,14,0)';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(15,37,53,0.8)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const v = hi - (range / 4) * i;
    ctx.fillStyle = 'rgba(74,98,114,0.8)';
    ctx.font = '9px Share Tech Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText(v.toFixed(getDP(currentSymbol)), W - pad.r + 4, y + 3);
  }

  // Candles
  bars.forEach((b, i) => {
    const bull = b.close >= b.open;
    const x = xOf(i) + cw * 0.1;
    const bw = Math.max(1, cw * 0.8);
    const cy1 = yOf(Math.max(b.open, b.close));
    const cy2 = yOf(Math.min(b.open, b.close));
    const bh  = Math.max(1, cy2 - cy1);
    ctx.fillStyle = bull ? 'rgba(0,229,160,0.85)' : 'rgba(255,61,90,0.85)';
    ctx.fillRect(x, cy1, bw, bh);
    // Wick
    ctx.strokeStyle = bull ? 'rgba(0,229,160,0.6)' : 'rgba(255,61,90,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + bw / 2, yOf(b.high));
    ctx.lineTo(x + bw / 2, yOf(b.low));
    ctx.stroke();
  });

  // Last price line
  if (bars.length > 0) {
    const lp = bars[bars.length - 1].close;
    const ly = yOf(lp);
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = 'rgba(0,229,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, ly); ctx.lineTo(W - pad.r, ly); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'var(--cyan)';
    ctx.font = 'bold 10px Share Tech Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText(lp.toFixed(getDP(currentSymbol)), W - pad.r + 4, ly + 3);
  }
}

// ── Signal tab ──
function mobUpdateSignal() {
  if (_mobActiveTab !== 'signal') return;
  const noEl   = document.getElementById('mob-no-signal');
  const cardEl = document.getElementById('mob-signal-card');
  if (!noEl || !cardEl) return;

  const r = (typeof lastAnalysis !== 'undefined') ? lastAnalysis : null;
  const t = r ? calcSLTP(r) : null;
  const dp = getDP(currentSymbol);

  if (!r || !t) {
    noEl.style.display   = 'block';
    cardEl.style.display = 'none';
    noEl.textContent = isConnected ? 'Analysing…' : 'Connect to load signal';
    return;
  }

  noEl.style.display   = 'none';
  cardEl.style.display = 'block';

  if (t.blocked) {
    const reasons = (t.failReasons || []).map(f =>
      '<div class="mob-gate-item fail">✕ ' + f + '</div>'
    ).join('');
    const warns = (t.warnReasons || []).filter(w => w.startsWith('WARN')).map(w =>
      '<div class="mob-gate-item warn">⚠ ' + w + '</div>'
    ).join('');
    cardEl.innerHTML = `
      <div class="mob-signal-card blocked">
        <div class="mob-card-header">
          <div class="mob-dir-label blocked">NO TRADE</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">${currentSymbol} ${tfLabel(currentTF)}</div>
        </div>
        <div class="mob-gates-list">${reasons}${warns}</div>
      </div>`;
    // clear badge
    const badge = document.getElementById('mob-signal-badge');
    if (badge) { badge.textContent = ''; badge.classList.remove('show'); }
    return;
  }

  const isBull = t.dir === 'LONG';
  const cls    = isBull ? 'bull' : 'bear';
  const warns  = (t.warnReasons || []).filter(w => w.startsWith('WARN')).map(w =>
    '<div class="mob-gate-item warn">⚠ ' + w + '</div>'
  ).join('');
  const notes  = (t.warnReasons || []).filter(w => w.startsWith('NOTE')).map(w =>
    '<div class="mob-gate-item pass">· ' + w.replace('NOTE: ','').replace('NOTE ','') + '</div>'
  ).join('');

  cardEl.innerHTML = `
    <div class="mob-signal-card ${cls}">
      <div class="mob-card-header">
        <div class="mob-dir-label ${cls}">${isBull ? '▲ LONG' : '▼ SHORT'}</div>
        <div class="mob-conf-ring">${t.confluence}%</div>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-bottom:10px">${currentSymbol} · ${tfLabel(currentTF)}</div>
      <div class="mob-sltp-grid">
        <div class="mob-sltp-cell">
          <div class="mob-sltp-cell-label">ENTRY</div>
          <div class="mob-sltp-cell-val">${t.entry.toFixed(dp)}</div>
        </div>
        <div class="mob-sltp-cell">
          <div class="mob-sltp-cell-label">SL</div>
          <div class="mob-sltp-cell-val sl">${t.sl.toFixed(dp)}</div>
        </div>
        <div class="mob-sltp-cell">
          <div class="mob-sltp-cell-label">TP</div>
          <div class="mob-sltp-cell-val tp">${t.tp.toFixed(dp)}</div>
        </div>
      </div>
      <div class="mob-rr-bar">
        <span>Risk: $${(t.dollarRisk||0).toFixed(2)}</span>
        <span class="mob-rr-val">${t.rr.toFixed(2)}:1 RR</span>
        <span>Profit: $${(t.potentialProfit||0).toFixed(2)}</span>
      </div>
      <div class="mob-gates-list">${warns}${notes}</div>
    </div>`;

  // Signal badge on tab
  const badge = document.getElementById('mob-signal-badge');
  if (badge && !t.blocked) {
    badge.textContent = isBull ? '▲' : '▼';
    badge.style.background = isBull ? 'var(--bull)' : 'var(--bear)';
    badge.classList.add('show');
  }
}

// ── Scanner tab ──
function mobUpdateScanner() {
  if (_mobActiveTab !== 'scanner') return;
  const el = document.getElementById('mob-scan-results');
  if (!el) return;

  const results = (typeof _scanResults !== 'undefined') ? _scanResults : [];
  const valid = results.filter(r => r.t && !r.t.blocked).sort((a,b) => (b.t.confluence||0) - (a.t.confluence||0));

  if (valid.length === 0) {
    el.innerHTML = '<div class="mob-no-signal">No setups found — run scan</div>';
    const badge = document.getElementById('mob-scan-badge');
    if (badge) { badge.textContent = ''; badge.classList.remove('show'); }
    return;
  }

  el.innerHTML = valid.map(item => {
    const isBull = item.t.dir === 'LONG';
    const cls = isBull ? 'bull' : 'bear';
    const dp = getDP(item.sym);
    return `<div class="mob-scan-item ${cls}" onclick="onSymbolChange('${item.sym}');document.getElementById('mob-symbol-select').value='${item.sym}';mobSwitchTab('signal')">
      <div class="mob-scan-left">
        <div class="mob-scan-sym">${item.name}</div>
        <div class="mob-scan-sub">${tfLabel(item.tf)} · ${item.t.entry ? item.t.entry.toFixed(dp) : '—'}</div>
      </div>
      <div class="mob-scan-right">
        <div class="mob-scan-conf">${item.t.confluence}%</div>
        <div class="mob-scan-dir ${cls}">${isBull ? '▲ LONG' : '▼ SHORT'}</div>
      </div>
    </div>`;
  }).join('');

  const badge = document.getElementById('mob-scan-badge');
  if (badge) {
    badge.textContent = String(valid.length);
    badge.style.background = 'var(--accent)';
    badge.classList.add('show');
  }
}

// ── Patch runAnalysis to update mobile UI ──
const _origRunAnalysis = (typeof runAnalysis === 'function') ? runAnalysis : null;
// Hook into the ohlc / candle update to refresh mobile
function _mobAfterAnalysis() {
  // price
  if (candles && candles.length > 1) {
    const last = candles[candles.length - 1];
    const prev = candles[0];
    const chg = prev.close > 0 ? ((last.close - prev.close) / prev.close * 100) : 0;
    const bias = (typeof lastAnalysis !== 'undefined' && lastAnalysis)
      ? (lastAnalysis.recentBull > lastAnalysis.recentBear ? 'bull' : lastAnalysis.recentBull < lastAnalysis.recentBear ? 'bear' : '')
      : '';
    mobUpdatePrice(last.close, chg, bias);
  }
  mobUpdateStatus();
  if (_mobActiveTab === 'chart')   mobDrawChart();
  if (_mobActiveTab === 'signal')  mobUpdateSignal();
  if (_mobActiveTab === 'scanner') mobUpdateScanner();
}

// Poll every 2s to keep mobile in sync with background processing
setInterval(_mobAfterAnalysis, 2000);

// Init on load
window.addEventListener('load', () => {
  setTimeout(() => {
    mobSyncSelects();
    // Restore TG fields if set
    const tok = sessionStorage.getItem('msb_tg_token');
    const cid = sessionStorage.getItem('msb_tg_chatid');
    const tidEl = document.getElementById('mob-tg-token');
    const cidEl = document.getElementById('mob-tg-chatid');
    if (tidEl && tok) tidEl.placeholder = '••••••• (set)';
    if (cidEl && cid) cidEl.value = cid;
    // Restore balance/risk
    const bal = document.getElementById('accountBalance');
    const rsk = document.getElementById('riskPct');
    const mbal = document.getElementById('mob-balance');
    const mrsk = document.getElementById('mob-risk');
    if (bal && mbal) mbal.value = bal.value;
    if (rsk && mrsk) mrsk.value = rsk.value;
    mobDrawChart();
  }, 500);
});

// Redraw chart on orientation change
window.addEventListener('resize', () => {
  if (_mobActiveTab === 'chart') mobDrawChart();
});
</script>
