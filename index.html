<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSB · OB · FUTURE SWING — ULTRA v36.6</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bull: #00e5a0;
  --bear: #ff3d5a;
  --hpz-bull: #1de9b6;
  --hpz-bear: #ff5252;
  --neutral: #607d8b;
  --bg-deep: #050a0e;
  --bg-panel: #080f14;
  --bg-card: #0d1a22;
  --bg-card2: #0a151d;
  --border: #0f2535;
  --border-bright: #1a4060;
  --accent: #00b4d8;
  --accent2: #0077a8;
  --text: #c8dde8;
  --text-dim: #4a6272;
  --text-bright: #e8f4f8;
  --warn: #ffa500;
  --cyan: #00e5ff;
  --glow-bull: 0 0 12px rgba(0,229,160,0.4);
  --glow-bear: 0 0 12px rgba(255,61,90,0.4);
  --glow-cyan: 0 0 12px rgba(0,229,255,0.3);
  --font-mono: 'Share Tech Mono', monospace;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* ── MOBILE MENU BUTTON ── */
#mobile-menu-btn {
  display: none;
  background: none;
  border: 1px solid var(--border-bright);
  color: var(--accent);
  font-size: 16px;
  padding: 4px 8px;
  cursor: pointer;
  line-height: 1;
  border-radius: 2px;
  flex-shrink: 0;
}
#mobile-panels-overlay {
  display: none;
  position: fixed;
  inset: 50px 0 0 0;
  background: rgba(5,10,14,0.85);
  z-index: 300;
  backdrop-filter: blur(2px);
}
#mobile-panels-overlay.open { display: block; }
#mobile-panel-drawer {
  position: absolute;
  top: 0; left: 0;
  width: 300px;
  height: 100%;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-bright);
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
}
#mobile-panels-overlay.open #mobile-panel-drawer { transform: translateX(0); }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,180,216,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,180,216,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

#app {
  display: grid;
  grid-template-rows: 50px 1fr;
  grid-template-columns: 230px 1fr 290px;
  height: 100vh;
  position: relative;
  z-index: 1;
}

@media (max-width: 1100px) {
  .tb-group-label { display: none; }
}
@media (max-width: 900px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: 50px 1fr;
  }
  #left-panel, #right-panel {
    display: none !important;
  }
  #mobile-menu-btn { display: flex !important; align-items: center; }
  .tb-group { padding: 0 4px; gap: 2px; }
}
@media (max-width: 600px) {
  .overlay-bar { gap: 2px; padding: 3px 6px; }
  .ov-btn { font-size: 7px; padding: 2px 4px; }
}

/* TOPBAR */
#topbar {
  grid-column: 1 / -1;
  background: linear-gradient(90deg, #050a0e 0%, #080f14 50%, #050a0e 100%);
  border-bottom: 1px solid var(--border-bright);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

#topbar::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

/* Grouped button clusters in topbar */
.tb-group {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 0 6px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.tb-group-label {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-right: 3px;
  white-space: nowrap;
  text-transform: uppercase;
}

.logo {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--cyan);
  text-shadow: var(--glow-cyan);
  white-space: nowrap;
}
.logo span { color: var(--bull); }

.tb-controls { display: flex; align-items: center; gap: 8px; flex: 1; }

.tb-select {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 9px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.tb-select:hover { border-color: var(--accent); }

.tb-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 11px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  text-transform: uppercase;
}
.tb-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent); box-shadow: var(--glow-cyan); }
.tb-btn.active { background: var(--accent2); border-color: var(--cyan); color: var(--cyan); }

/* Live price ticker in topbar */
.price-ticker {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: bold;
  color: var(--text-bright);
  padding: 0 12px;
  border-left: 1px solid var(--border-bright);
  border-right: 1px solid var(--border-bright);
  letter-spacing: 1px;
}
.price-ticker .chg { font-size: 11px; }

.tb-status {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 2px;
  margin-left: auto;
}
.status-connecting { background: rgba(255,165,0,0.15); color: var(--warn); border: 1px solid rgba(255,165,0,0.3); }
.status-live { background: rgba(0,229,160,0.1); color: var(--bull); border: 1px solid rgba(0,229,160,0.3); animation: blink 2s infinite; }
.status-demo { background: rgba(0,180,216,0.1); color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
.status-error { background: rgba(255,61,90,0.1); color: var(--bear); border: 1px solid rgba(255,61,90,0.3); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* PANELS */
#left-panel, #right-panel {
  background: var(--bg-panel);
  overflow-y: auto;
  padding: 10px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-bright) transparent;
}
#left-panel { border-right: 1px solid var(--border); }
#right-panel { border-left: 1px solid var(--border); }

#chart-wrap { position: relative; background: var(--bg-deep); overflow: hidden; display: flex; flex-direction: column; }
#chart-inner-wrap { flex: 1; position: relative; min-height: 0; width: 100%; overflow: hidden; }
#chart { position: absolute; inset: 0; }

/* PANEL SECTIONS */
.panel-section { padding: 9px 13px; border-bottom: 1px solid var(--border); }

.panel-title {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-title::before { content: ''; width: 2px; height: 10px; background: var(--accent); box-shadow: var(--glow-cyan); }

.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 11px; }
.stat-label { color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }
.stat-val { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }

.bull { color: var(--bull); } .bear { color: var(--bear); } .neutral { color: var(--neutral); }
.cyan { color: var(--cyan); } .warn { color: var(--warn); } .bright { color: var(--text-bright); }

.bias-badge {
  width: 100%;
  text-align: center;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 2px;
  padding: 7px 6px;
  border-radius: 2px;
  margin: 6px 0;
  transition: all 0.4s;
}
.bias-bull { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.4); color: var(--bull); box-shadow: var(--glow-bull); }
.bias-bear { background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.4); color: var(--bear); box-shadow: var(--glow-bear); }
.bias-neutral { background: rgba(96,125,139,0.1); border: 1px solid rgba(96,125,139,0.4); color: var(--neutral); }

.score-bar-wrap { width: 100%; height: 6px; background: var(--bg-card); border-radius: 1px; overflow: hidden; margin: 4px 0; }
.score-bar-fill { height: 100%; border-radius: 1px; transition: width 0.5s ease; }

/* OB ITEMS */
.ob-item {
  background: var(--bg-card2);
  border-left: 2px solid var(--border-bright);
  padding: 5px 8px;
  margin: 3px 0;
  font-family: var(--font-mono);
  font-size: 11px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.ob-item:hover { background: var(--bg-card); border-left-color: var(--accent); }
.ob-item.bull-ob { border-left-color: rgba(0,229,160,0.5); }
.ob-item.bear-ob { border-left-color: rgba(255,61,90,0.5); }
.ob-item.hpz { border-left-color: var(--hpz-bull); box-shadow: inset 2px 0 8px rgba(29,233,182,0.1); animation: hpz-pulse 2s ease infinite; }
.ob-item.mitigated { opacity: 0.4; }
.ob-item-row { display: flex; justify-content: space-between; }
.ob-tag { display: inline-block; font-size: 8px; padding: 1px 4px; border-radius: 1px; letter-spacing: 1px; }
.tag-bull { background: rgba(0,229,160,0.2); color: var(--bull); }
.tag-bear { background: rgba(255,61,90,0.2); color: var(--bear); }
.tag-hpz { background: rgba(29,233,182,0.2); color: var(--hpz-bull); }
.tag-mit { background: rgba(96,125,139,0.2); color: var(--neutral); }

@keyframes hpz-pulse { 0%,100%{box-shadow:0 0 4px rgba(29,233,182,0.3)} 50%{box-shadow:0 0 12px rgba(29,233,182,0.7)} }

/* SWING ITEMS */
.swing-item { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; padding: 2px 0; }

/* ALERT LOG */
#alert-log {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 100;
  pointer-events: none;
  width: 360px;
}
.alert-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 14px;
  text-align: center;
  border-radius: 2px;
  letter-spacing: 1px;
  animation: alertIn 0.3s ease, alertOut 0.5s ease 3.5s forwards;
}
.alert-bull-pill { background: rgba(0,229,160,0.15); border: 1px solid var(--bull); color: var(--bull); }
.alert-bear-pill { background: rgba(255,61,90,0.15); border: 1px solid var(--bear); color: var(--bear); }
.alert-mit-pill  { background: rgba(96,125,139,0.15); border: 1px solid var(--neutral); color: var(--neutral); }
@keyframes alertIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes alertOut { from{opacity:1} to{opacity:0} }

/* VOLUME DELTA */
.vol-delta-bar { width: 100%; height: 8px; background: var(--bg-card); border-radius: 1px; overflow: hidden; position: relative; margin: 4px 0; }
.vol-delta-fill-buy { position: absolute; left: 50%; height: 100%; background: var(--bull); transition: width 0.5s; }
.vol-delta-fill-sell { position: absolute; right: 50%; height: 100%; background: var(--bear); transition: width 0.5s; }

/* SESSIONS */
.sess-toggle { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; }
.sess-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.toggle-switch { width: 28px; height: 14px; background: var(--bg-card); border: 1px solid var(--border-bright); border-radius: 7px; position: relative; cursor: pointer; transition: background 0.2s; }
.toggle-switch.on { background: var(--accent2); border-color: var(--accent); }
.toggle-knob { width: 10px; height: 10px; background: var(--text-dim); border-radius: 50%; position: absolute; top: 1px; left: 1px; transition: all 0.2s; }
.toggle-switch.on .toggle-knob { left: 15px; background: var(--cyan); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

/* LOADING */
#chart-loading {
  position: absolute; inset: 0; background: var(--bg-deep);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 10;
}
.loading-logo { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--cyan); letter-spacing: 4px; text-shadow: var(--glow-cyan); }
.loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-msg { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

/* SETTINGS DRAWER */
#settings-drawer {
  position: fixed; top: 50px; right: 0; width: 280px; height: calc(100vh - 50px);
  background: var(--bg-panel); border-left: 1px solid var(--border-bright);
  z-index: 500; transform: translateX(100%); transition: transform 0.3s ease; overflow-y: auto; padding: 12px;
}
#settings-drawer.open { transform: translateX(0); }
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; color: var(--text); }
.setting-input { background: var(--bg-card); border: 1px solid var(--border-bright); color: var(--text); font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; width: 70px; text-align: right; outline: none; }
.setting-input:focus { border-color: var(--accent); }

/* SPARKLINE */
.sparkline-canvas { width: 100%; height: 48px; display: block; }

.section-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-bright), transparent); margin: 6px 12px; }

/* SLTP CARDS */
.sltp-card {
  background: var(--bg-card2); border-radius: 2px; padding: 7px 9px; margin: 4px 0;
  font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--border); transition: all 0.3s;
}
.sltp-card.bull-card { border-left: 2px solid var(--bull); }
.sltp-card.bear-card { border-left: 2px solid var(--bear); }
.sltp-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
.sltp-label { color: var(--text-dim); font-size: 10px; letter-spacing: 1px; }
.sltp-val { font-size: 12px; font-weight: 700; }
.sltp-rr { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 1px; margin-top: 3px; letter-spacing: 1px; }
.rr-good { background: rgba(0,229,160,0.15); color: var(--bull); border:1px solid rgba(0,229,160,0.3); }
.rr-ok   { background: rgba(255,165,0,0.15);  color: var(--warn); border:1px solid rgba(255,165,0,0.3); }
.rr-bad  { background: rgba(255,61,90,0.15);   color: var(--bear); border:1px solid rgba(255,61,90,0.3); }
.sltp-method { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); text-align: center; padding: 3px 0 5px; letter-spacing: 1px; }
.sltp-selector { display: flex; gap: 4px; margin-bottom: 6px; }
.sltp-mode-btn { flex: 1; background: var(--bg-card); border: 1px solid var(--border-bright); color: var(--text-dim); font-family: var(--font-mono); font-size: 9px; padding: 3px 4px; cursor: pointer; letter-spacing: 1px; text-align: center; transition: all 0.2s; }
.sltp-mode-btn.active { background: var(--accent2); border-color: var(--accent); color: var(--cyan); }
.sltp-no-trade { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-align: center; padding: 10px 6px; border: 1px dashed var(--border-bright); border-radius: 2px; }

/* Enhanced risk meter bar */
.risk-meter { width: 100%; height: 4px; background: var(--bg-card); margin: 6px 0 2px; border-radius: 1px; overflow: hidden; }
.risk-meter-fill { height: 100%; border-radius: 1px; transition: width 0.5s, background 0.5s; }

/* Trade quality score */
.quality-score { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
.quality-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.quality-bar-wrap { flex: 1; height: 3px; background: var(--bg-card); border-radius: 1px; overflow: hidden; }
.quality-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.5s; }

.connect-form { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.connect-input { background: var(--bg-card); border: 1px solid var(--border-bright); color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 6px 10px; outline: none; width: 100%; }
.connect-input:focus { border-color: var(--accent); }
.connect-btn { background: linear-gradient(90deg, var(--accent2), #005f7a); border: 1px solid var(--accent); color: var(--cyan); font-family: var(--font-display); font-size: 11px; letter-spacing: 2px; padding: 9px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; width: 100%; }
.connect-btn:hover { background: var(--accent); color: #000; box-shadow: var(--glow-cyan); }
.demo-note { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); text-align: center; padding: 4px; border: 1px solid var(--border); background: var(--bg-card2); }

/* ATR info box */
.atr-info { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 2px; padding: 5px 8px; margin: 4px 0; font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
.atr-info span { color: var(--cyan); }

/* ── SCANNER OVERLAY ── */
#scanner-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg-deep);
  z-index: 50;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#scanner-overlay.open { display: flex; }
.scanner-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-bright);
  background: var(--bg-panel);
  flex-shrink: 0;
}
.scanner-title {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--cyan);
}
.scanner-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  align-content: start;
}
.scan-card {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.scan-card:hover { border-color: var(--accent); background: var(--bg-card); }
.scan-card.bull-card { border-left: 3px solid var(--bull); }
.scan-card.bear-card { border-left: 3px solid var(--bear); }
.scan-card.no-setup  { border-left: 3px solid var(--neutral); opacity: 0.5; }
.scan-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.scan-symbol { font-family: var(--font-display); font-size: 10px; letter-spacing: 2px; color: var(--text-bright); }
.scan-dir { font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
.scan-conf-bar { width: 100%; height: 3px; background: var(--bg-card); border-radius: 1px; overflow: hidden; margin: 4px 0; }
.scan-conf-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
.scan-price-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; margin: 2px 0; }
.scan-label { color: var(--text-dim); }
.scan-status { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-align: center; padding: 20px; }
.scan-rr-badge {
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 1px;
}
.scanner-progress {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  margin-left: auto;
}
.scan-sort-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 9px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.scan-sort-btn.active { background: var(--accent2); border-color: var(--accent); color: var(--cyan); }
.scan-hpz { font-family: var(--font-mono); font-size: 7px; padding: 1px 3px; background: rgba(29,233,182,0.2); color: var(--hpz-bull); border-radius: 1px; }

/* ── OVERLAY TOGGLES ── */
.overlay-bar { display: flex; gap: 4px; padding: 4px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.ov-btn { background: var(--bg-card); border: 1px solid var(--border-bright); color: var(--text-dim); font-family: var(--font-mono); font-size: 9px; padding: 3px 9px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; border-radius: 2px; }
.ov-btn.on { background: var(--accent2); border-color: var(--accent); color: var(--cyan); }
.ov-btn.on-bull { background: rgba(0,229,160,0.15); border-color: rgba(0,229,160,0.5); color: var(--bull); }
.ov-btn.on-bear { background: rgba(255,61,90,0.15); border-color: rgba(255,61,90,0.5); color: var(--bear); }
.ov-btn.on-warn { background: rgba(255,165,0,0.15); border-color: rgba(255,165,0,0.5); color: var(--warn); }

/* ── MINI TP/SL LEVELS in right panel ── */
.tp-levels-wrap { display: flex; flex-direction: column; gap: 3px; margin: 4px 0; }
.tp-level-row { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 10px; padding: 3px 6px; border-radius: 1px; }
.tp1-row { background: rgba(0,229,160,0.06); border: 1px solid rgba(0,229,160,0.2); }
.tp2-row { background: rgba(0,229,160,0.10); border: 1px solid rgba(0,229,160,0.35); }
.tp3-row { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.5); }
.be-row  { background: rgba(0,180,216,0.08); border: 1px solid rgba(0,180,216,0.3); }

/* ── LIVE SCANNER BADGE ── */
.live-scan-badge { font-family: var(--font-mono); font-size: 8px; padding: 2px 6px; border-radius: 1px; margin-left: 6px; }
.lsb-live { background: rgba(0,229,160,0.1); color: var(--bull); border: 1px solid rgba(0,229,160,0.3); }
.lsb-demo { background: rgba(0,180,216,0.1); color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }

/* ── HTF BIAS PANEL ── */
.htf-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; font-family: var(--font-mono); font-size: 10px; }
.htf-tf  { color: var(--text-dim); font-size: 9px; }
.htf-bull { color: var(--bull); } .htf-bear { color: var(--bear); } .htf-neu { color: var(--neutral); }

/* ── SIGNAL AGE ── */
.age-badge { font-family: var(--font-mono); font-size: 8px; padding: 1px 4px; border-radius: 1px; background: rgba(96,125,139,0.15); color: var(--text-dim); border: 1px solid var(--border); }

/* ── SWEEP LABEL ── */
.sweep-tag { font-family: var(--font-mono); font-size: 7px; padding: 1px 3px; border-radius: 1px; background: rgba(255,165,0,0.2); color: var(--warn); border: 1px solid rgba(255,165,0,0.4); }


/* ── S/R LEVELS ── */
.sr-item {
  background: var(--bg-card2);
  border-radius: 2px;
  padding: 4px 8px;
  margin: 2px 0;
  font-family: var(--font-mono);
  font-size: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 2px solid var(--border-bright);
}
.sr-item.sr-sup { border-left-color: rgba(0,229,160,0.6); }
.sr-item.sr-res { border-left-color: rgba(255,61,90,0.6); }
.sr-item.sr-strong { box-shadow: inset 0 0 8px rgba(0,180,216,0.06); }
.sr-touch-badge {
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 1px;
  background: rgba(0,180,216,0.15);
  color: var(--cyan);
  border: 1px solid rgba(0,180,216,0.3);
}

/* ── TRADE CHECKLIST POPUP ── */
#trade-checklist {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: 3px;
  z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#trade-checklist.open { display: flex; }
.checklist-header {
  background: linear-gradient(90deg, var(--bg-card), var(--bg-card2));
  border-bottom: 1px solid var(--border-bright);
  padding: 8px 12px;
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--cyan);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.checklist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.checklist-item:hover { background: var(--bg-card); }
.checklist-item.checked { opacity: 0.6; }
.checklist-box {
  width: 14px; height: 14px;
  border: 1px solid var(--border-bright);
  border-radius: 2px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  transition: all 0.15s;
}
.checklist-item.checked .checklist-box { background: var(--bull); border-color: var(--bull); color: #000; }
.checklist-text { font-family: var(--font-mono); font-size: 11px; color: var(--text); }
.checklist-confirm {
  padding: 8px 12px;
  background: rgba(0,229,160,0.05);
  display: flex;
  gap: 6px;
}
.checklist-confirm-btn {
  flex: 1; padding: 5px; font-family: var(--font-display);
  font-size: 9px; letter-spacing: 1px; cursor: pointer;
  border-radius: 1px; text-transform: uppercase; transition: all 0.2s;
}
.btn-take { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.4); color: var(--bull); }
.btn-take:hover { background: rgba(0,229,160,0.3); }
.btn-skip { background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.3); color: var(--bear); }
.btn-skip:hover { background: rgba(255,61,90,0.2); }

/* ── TRADE JOURNAL ── */
#journal-drawer {
  position: fixed; top: 50px; left: 0;
  width: 560px; height: calc(100vh - 50px);
  background: var(--bg-panel);
  border-right: 1px solid var(--border-bright);
  z-index: 500;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  padding: 12px;
}
#journal-drawer.open { transform: translateX(0); }
.journal-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 10px; }
.journal-table th { color: var(--text-dim); text-align: left; padding: 4px 7px; border-bottom: 1px solid var(--border-bright); font-size: 9px; letter-spacing: 1px; }
.journal-table td { padding: 4px 7px; border-bottom: 1px solid var(--border); }
.journal-table tr:hover td { background: var(--bg-card); }
.outcome-win  { color: var(--bull); font-weight: 700; }
.outcome-loss { color: var(--bear); font-weight: 700; }
.outcome-open { color: var(--warn); }

/* ── LOSS LOCKOUT BANNER ── */
#loss-lockout-banner {
  display: none;
  position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(255,61,90,0.15);
  border: 1px solid rgba(255,61,90,0.5);
  color: var(--bear);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 6px 16px;
  z-index: 150;
  letter-spacing: 1px;
  border-radius: 2px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
#loss-lockout-banner.active {
  display: block;
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── SPIKE MARKER ── */
.spike-warn { color: var(--warn); font-family: var(--font-mono); font-size: 9px; }

/* ── HEATMAP ── */
.heatmap-grid { display:grid; grid-template-columns:80px repeat(5,1fr); gap:2px; font-family:var(--font-mono); font-size:8px; padding:8px; }
.heatmap-hdr  { color:var(--text-dim); padding:4px 5px; text-align:center; letter-spacing:1px; font-size:9px; }
.heatmap-sym  { color:var(--text-bright); padding:3px 4px; font-size:10px; align-self:center; }
.heatmap-cell { padding:5px 4px; text-align:center; border-radius:2px; cursor:pointer; transition:all 0.2s; font-size:9px; border:1px solid transparent; }
.heatmap-cell:hover { border-color:var(--accent); transform:scale(1.05); }
.hm-none     { background:rgba(96,125,139,0.08); color:var(--text-dim); }
.hm-low      { background:rgba(255,165,0,0.10);  color:var(--warn); }
.hm-med      { background:rgba(0,229,160,0.12);  color:var(--bull); }
.hm-high     { background:rgba(0,229,160,0.28);  color:var(--bull); border-color:rgba(0,229,160,0.5)!important; }
.hm-b-low    { background:rgba(255,61,90,0.10);  color:var(--bear); }
.hm-b-med    { background:rgba(255,61,90,0.18);  color:var(--bear); }
.hm-b-high   { background:rgba(255,61,90,0.30);  color:var(--bear); border-color:rgba(255,61,90,0.5)!important; }
/* ── BADGES ── */
.tg-badge   { font-family:var(--font-mono); font-size:9px; padding:3px 8px; border-radius:1px; cursor:pointer; transition:all 0.2s; }
.tg-on      { background:rgba(0,229,160,0.1); color:var(--bull); border:1px solid rgba(0,229,160,0.3); }
.tg-off     { background:rgba(96,125,139,0.1); color:var(--text-dim); border:1px solid var(--border); }
.cs-badge   { font-family:var(--font-mono); font-size:9px; padding:3px 8px; border-radius:1px; cursor:pointer; }
.cs-on      { background:rgba(0,229,160,0.1); color:var(--bull); border:1px solid rgba(0,229,160,0.3); animation:blink 2s infinite; }
.cs-off     { background:rgba(96,125,139,0.1); color:var(--text-dim); border:1px solid var(--border); }
/* ── P&L TRACKER ── */
.pnl-card   { background:var(--bg-card2); border-radius:2px; padding:5px 8px; margin:3px 0; font-family:var(--font-mono); font-size:10px; border-left:3px solid var(--border-bright); }
.pnl-profit { border-left-color:var(--bull); }
.pnl-loss   { border-left-color:var(--bear); }

/* ── TRADE DIRECTION BADGE ── */
.trade-dir {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 3px;
  text-align: center;
  padding: 8px 6px;
  border-radius: 2px;
  margin: 6px 0;
}
.trade-long  { background: rgba(0,229,160,0.12); border: 1px solid rgba(0,229,160,0.4); color: var(--bull); text-shadow: 0 0 8px rgba(0,229,160,0.4); }
.trade-short { background: rgba(255,61,90,0.12);  border: 1px solid rgba(255,61,90,0.4);  color: var(--bear); text-shadow: 0 0 8px rgba(255,61,90,0.4); }

/* ═══════════════════════════════════════════
   MOBILE UI — shows on screens ≤ 768px
   Desktop #app is hidden; mobile shell takes over
═══════════════════════════════════════════ */
#mobile-shell {
  display: none;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  background: var(--bg-deep);
  position: fixed;
  inset: 0;
  z-index: 5000;
  font-family: var(--font-body);
}

/* ── Mobile topbar ── */
#mob-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  height: 48px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-bright);
  flex-shrink: 0;
  gap: 8px;
}
#mob-logo {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--cyan);
  text-shadow: var(--glow-cyan);
  white-space: nowrap;
}
#mob-logo span { color: var(--bull); }
#mob-symbol-select {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 6px;
  outline: none;
  max-width: 130px;
}
#mob-tf-select {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 6px;
  outline: none;
  width: 56px;
}
#mob-connect-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  cursor: pointer;
  white-space: nowrap;
}
#mob-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--neutral);
  flex-shrink: 0;
}
#mob-status-dot.live  { background: var(--bull); box-shadow: 0 0 6px var(--bull); }
#mob-status-dot.error { background: var(--bear); }

/* ── Mobile price bar ── */
#mob-price-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  background: var(--bg-card2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#mob-price {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
}
#mob-chg {
  font-family: var(--font-mono);
  font-size: 13px;
}
#mob-bias-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 2px;
  background: rgba(96,125,139,0.2);
  border: 1px solid rgba(96,125,139,0.4);
  color: var(--neutral);
}
#mob-bias-badge.bull { background: rgba(0,229,160,0.15); border-color: var(--bull); color: var(--bull); }
#mob-bias-badge.bear { background: rgba(255,61,90,0.15);  border-color: var(--bear); color: var(--bear); }

/* ── Tab content area ── */
#mob-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.mob-tab-pane {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.mob-tab-pane.active { display: block; }

/* ── Chart tab ── */
#mob-chart-wrap {
  width: 100%;
  height: 100%;
  position: relative;
}
#mob-chart-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Signal tab ── */
#mob-signal-pane {
  padding: 12px;
}
.mob-signal-card {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
}
.mob-signal-card.bull { border-left: 3px solid var(--bull); }
.mob-signal-card.bear { border-left: 3px solid var(--bear); }
.mob-signal-card.blocked { border-left: 3px solid var(--neutral); opacity: 0.7; }
.mob-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.mob-dir-label {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
}
.mob-dir-label.bull { color: var(--bull); text-shadow: var(--glow-bull); }
.mob-dir-label.bear { color: var(--bear); text-shadow: var(--glow-bear); }
.mob-dir-label.blocked { color: var(--neutral); }
.mob-conf-ring {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--cyan);
}
.mob-sltp-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.mob-sltp-cell {
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 6px;
  text-align: center;
}
.mob-sltp-cell-label {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.mob-sltp-cell-val {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-bright);
}
.mob-sltp-cell-val.sl { color: var(--bear); }
.mob-sltp-cell-val.tp { color: var(--bull); }
.mob-rr-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
}
.mob-rr-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
}
.mob-gates-list {
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.mob-gate-item {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 0;
  color: var(--text-dim);
  line-height: 1.4;
}
.mob-gate-item.fail { color: var(--bear); }
.mob-gate-item.warn { color: var(--warn); }
.mob-gate-item.pass { color: var(--bull); }
.mob-no-signal {
  text-align: center;
  padding: 40px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.mob-section-title {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 4px 0 8px;
}

/* ── Scanner tab ── */
#mob-scanner-pane {
  padding: 10px;
}
.mob-scan-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.mob-scan-btn {
  background: var(--accent2);
  border: 1px solid var(--accent);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1px;
}
#mob-scan-progress {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.mob-scan-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  active: background var(--bg-card2);
}
.mob-scan-item.bull { border-left: 2px solid var(--bull); }
.mob-scan-item.bear { border-left: 2px solid var(--bear); }
.mob-scan-left { display: flex; flex-direction: column; gap: 2px; }
.mob-scan-sym {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-bright);
}
.mob-scan-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.mob-scan-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.mob-scan-conf {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
}
.mob-scan-dir {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
}
.mob-scan-dir.bull { color: var(--bull); }
.mob-scan-dir.bear { color: var(--bear); }

/* ── Settings tab ── */
#mob-settings-pane {
  padding: 14px;
}
.mob-set-group {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 12px;
}
.mob-set-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.mob-set-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.mob-set-row:last-child { border-bottom: none; }
.mob-set-row label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text);
  flex: 1;
}
.mob-set-row input[type="text"],
.mob-set-row input[type="number"] {
  background: var(--bg-deep);
  border: 1px solid var(--border-bright);
  color: var(--text-bright);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  outline: none;
  width: 120px;
  text-align: right;
}
.mob-tg-btn {
  background: var(--bg-card2);
  border: 1px solid var(--accent);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  width: 100%;
  margin-top: 8px;
}
.mob-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.mob-toggle-row:last-child { border-bottom: none; }
.mob-toggle-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text);
}
.mob-toggle {
  width: 36px; height: 20px;
  background: var(--border-bright);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.mob-toggle.on { background: var(--bull); }
.mob-toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  top: 3px; left: 3px;
  transition: left 0.2s;
}
.mob-toggle.on::after { left: 19px; }

/* ── Bottom tab bar ── */
#mob-tabbar {
  display: flex;
  border-top: 1px solid var(--border-bright);
  background: var(--bg-panel);
  flex-shrink: 0;
  height: 56px;
}
.mob-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 1px;
  padding: 0;
  transition: color 0.15s;
  position: relative;
}
.mob-tab.active { color: var(--cyan); }
.mob-tab.active::after {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--cyan);
  box-shadow: var(--glow-cyan);
}
.mob-tab-icon { font-size: 18px; line-height: 1; }
.mob-badge {
  position: absolute;
  top: 4px; right: 18%;
  background: var(--bear);
  color: #fff;
  font-size: 7px;
  font-family: var(--font-mono);
  border-radius: 8px;
  padding: 0 4px;
  min-width: 14px;
  text-align: center;
  line-height: 14px;
  display: none;
}
.mob-badge.show { display: block; }

@media (max-width: 768px) {
  #app { display: none !important; }
  #mobile-panels-overlay { display: none !important; }
  #mobile-shell { display: flex !important; }
}

</head>

    <input class="setting-input" id="set_tgToken" type="password" placeholder="Bot token..." style="width:100%;text-align:left"
      oninput="try{sessionStorage.setItem('msb_tg_token',this.value)}catch(e){}">

    <span style="font-size:9px;color:var(--text-dim)">Chat ID</span>

      oninput="try{sessionStorage.setItem('msb_tg_chatid',this.value)}catch(e){}">

  <div style="font-family:var(--font-mono);font-size:8px;color:var(--text-dim);padding:4px 0;border:1px solid var(--border);background:var(--bg-card2);padding:5px 6px;margin-top:4px">Stored in session only — cleared on tab close</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SELF-CONTAINED CANVAS CHART ENGINE
// Mimics LightweightCharts API: createChart, addCandlestickSeries,
// createPriceLine, removePriceLine, setMarkers, setData, update
// Zero external dependencies.
// ═══════════════════════════════════════════════════════════════
window.LightweightCharts = (function() {

  function createChart(container, opts) {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:absolute;top:0;left:0;display:block;';
    container.style.position = 'relative';
    container.appendChild(canvas);

    const state = {
      canvas, dpr: window.devicePixelRatio || 1,
      W: 0, H: 0,
      candles: [], markers: [], priceLines: [],
      offsetX: 0, scale: 1,
      dragging: false, dragStartX: 0, dragStartOffset: 0,
      crossX: -1, crossY: -1,
    };

    function getSize() {
      // Try multiple methods — flex children can be tricky
      let w = container.clientWidth;
      let h = container.clientHeight;
      if (!w || !h) {
        const rect = container.getBoundingClientRect();
        w = rect.width;
        h = rect.height;
      }
      if (!w || !h) {
        // Last resort: walk up to find a parent with real dimensions
        let el = container.parentElement;
        while (el && (!w || !h)) {
          w = w || el.clientWidth;
          h = h || el.clientHeight;
          el = el.parentElement;
        }
      }
      return { w: Math.round(w || 800), h: Math.round(h || 500) };
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      state.dpr = dpr;
      const { w, h } = getSize();
      if (w < 10 || h < 10) return; // skip degenerate sizes
      state.W = w; state.H = h;
      canvas.width        = Math.round(w * dpr);
      canvas.height       = Math.round(h * dpr);
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      draw(state);
    }

    canvas.addEventListener('mousedown', e => {
      state.dragging = true;
      state.dragStartX = e.clientX;
      state.dragStartOffset = state.offsetX;
    });
    window.addEventListener('mouseup', () => { state.dragging = false; });
    let _rafPending = false;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      state.crossX = e.clientX - rect.left;
      state.crossY = e.clientY - rect.top;
      if (state.dragging) {
        const dx = e.clientX - state.dragStartX;
        state.offsetX = Math.max(0, state.dragStartOffset - Math.round(dx / bw(state)));
      }
      if (!_rafPending) { _rafPending = true; requestAnimationFrame(() => { _rafPending = false; draw(state); }); }
    });
    canvas.addEventListener('mouseleave', () => { state.crossX = -1; draw(state); });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      state.scale = Math.max(0.15, Math.min(12, state.scale * (e.deltaY > 0 ? 0.85 : 1.18)));
      draw(state);
    }, { passive: false });

    new ResizeObserver(resize).observe(container);
    // Fire at multiple delays — flex/grid layouts settle asynchronously
    setTimeout(resize, 0);
    setTimeout(resize, 50);
    setTimeout(resize, 200);
    setTimeout(resize, 600);

    const series = makeSeries(state);
    function forceResize() {
      const dpr = window.devicePixelRatio || 1;
      state.dpr = dpr;
      const { w, h } = getSize();
      if (w < 10 || h < 10) { setTimeout(forceResize, 100); return; }
      state.W = w; state.H = h;
      canvas.width        = Math.round(w * dpr);
      canvas.height       = Math.round(h * dpr);
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      draw(state);
    }

    return {
      addCandlestickSeries: () => series,
      applyOptions: () => {},
      timeScale: () => ({ fitContent: () => { state.offsetX = 0; state.scale = 1; draw(state); } }),
      _resize: forceResize,
    };
  }

  function makeSeries(state) {
    return {
      setData(data) { state.candles = data.slice(); state.offsetX = 0; state.scale = 1; draw(state); },
      update(bar) {
        const last = state.candles[state.candles.length - 1];
        if (last && last.time === bar.time) state.candles[state.candles.length - 1] = bar;
        else state.candles.push(bar);
        draw(state);
      },
      createPriceLine(o) {
        const pl = Object.assign({}, o, { _id: Math.random() });
        state.priceLines.push(pl); draw(state); return pl;
      },
      removePriceLine(pl) { state.priceLines = state.priceLines.filter(p => p !== pl); draw(state); },
      setMarkers(m) { state.markers = m.slice(); draw(state); },
    };
  }

  // bar width in CSS pixels
  function bw(state) {
    const PAXIS = 80;
    const chartW = (state.W || 800) - PAXIS;
    return Math.max(2, chartW / Math.round(100 / state.scale));
  }

  function visRange(state) {
    const PAXIS = 80;
    const chartW = (state.W || 800) - PAXIS;
    const b = bw(state);
    const vis = Math.ceil(chartW / b);
    const end   = Math.max(1, state.candles.length - state.offsetX);
    const start = Math.max(0, end - vis);
    return { start, end };
  }

  function pRange(state) {
    const { start, end } = visRange(state);
    const sl = state.candles.slice(start, end);
    if (!sl.length) return { lo: 0, hi: 1 };
    let lo = Infinity, hi = -Infinity;
    // ONLY use candle prices for Y range — price lines (TP/SL/OB/FVG) must NOT
    // distort the scale. A TP3 target 50% away would squash all candles.
    for (const c of sl) { if (c.low < lo) lo = c.low; if (c.high > hi) hi = c.high; }
    // Include price lines only if within 20% of candle range
    const candleRange = hi - lo;
    for (const pl of state.priceLines) {
      if (pl.price >= lo - candleRange * 0.2 && pl.price <= hi + candleRange * 0.2) {
        if (pl.price < lo) lo = pl.price;
        if (pl.price > hi) hi = pl.price;
      }
    }
    const pad = (hi - lo) * 0.08 || 1;
    return { lo: lo - pad, hi: hi + pad };
  }

  // price → canvas y in CSS pixels
  function py(p, lo, hi, H, PT, PB) {
    if (hi === lo) return H / 2;
    return PT + (1 - (p - lo) / (hi - lo)) * (H - PT - PB);
  }

  function draw(state) {
    const { canvas, dpr, W, H } = state;
    if (!W || !H || W < 10 || H < 10 || !canvas.width || !canvas.height) return;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Reserve space for volume bars at bottom if enabled
    const VOL_H = (typeof OV !== 'undefined' && OV.vol) ? Math.round(H * 0.12) : 0;
    const PAXIS = 80, PT = 30, PB = 20 + VOL_H;
    const chartW = W - PAXIS;

    ctx.fillStyle = '#050a0e';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#070d12';
    ctx.fillRect(chartW, 0, PAXIS, H);

    if (!state.candles.length) {
      ctx.fillStyle = '#2a4a5a'; ctx.font = '13px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Waiting for data...', chartW / 2, H / 2); return;
    }

    const { start, end } = visRange(state);
    const { lo, hi } = pRange(state);
    const b = bw(state);

    // ── Session shading ──
    if (typeof OV !== 'undefined' && OV.session && typeof SESSIONS !== 'undefined') {
      const sessColors = { london:'rgba(59,130,246,0.04)', ny:'rgba(249,115,22,0.04)', tokyo:'rgba(244,63,94,0.04)', sydney:'rgba(234,179,8,0.04)' };
      const slice2 = state.candles.slice(start, end);
      slice2.forEach((c, i) => {
        const h = new Date(c.time * 1000).getUTCHours();
        for (const [name, sess] of Object.entries(SESSIONS)) {
          if (!sess.enabled) continue;
          const inSess = sess.end > 24 ? (h >= sess.start || h < sess.end - 24) : (h >= sess.start && h < sess.end);
          if (inSess) {
            ctx.fillStyle = sessColors[name] || 'rgba(255,255,255,0.03)';
            ctx.fillRect(i * b, PT, b, H - PT - PB);
          }
        }
      });
    }

    // ── Grid ──
    ctx.strokeStyle = '#0c1e2c'; ctx.lineWidth = 0.5;
    ctx.fillStyle = '#3d5a6a';
    ctx.font = `${Math.round(10 * Math.min(1, W/900))}px monospace`;
    ctx.textAlign = 'right';
    const steps = 8;
    for (let i = 0; i <= steps; i++) {
      const y = PT + (i / steps) * (H - PT - PB - VOL_H);
      const p = hi - (i / steps) * (hi - lo);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke();
      ctx.fillText(p.toFixed(2), W - 3, y + 3);
    }
    ctx.strokeStyle = '#0f2535'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(chartW, 0); ctx.lineTo(chartW, H); ctx.stroke();

    // ── FVG Zones ──
    if (typeof OV !== 'undefined' && OV.fvg && typeof analysisResult !== 'undefined' && analysisResult.activeFVGs) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      for (const fvg of analysisResult.activeFVGs) {
        const yTop = py(fvg.top,    lo, hi, H, PT, PB);
        const yBot = py(fvg.bottom, lo, hi, H, PT, PB);
        const fvgH = Math.max(1, yBot - yTop);
        const col  = fvg.isBull ? 'rgba(0,229,160,0.07)' : 'rgba(255,61,90,0.07)';
        const bord = fvg.isBull ? 'rgba(0,229,160,0.3)' : 'rgba(255,61,90,0.3)';
        ctx.fillStyle = col;
        ctx.fillRect(0, yTop, chartW, fvgH);
        ctx.strokeStyle = bord; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(0, yTop); ctx.lineTo(chartW, yTop); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, yBot); ctx.lineTo(chartW, yBot); ctx.stroke();
        ctx.setLineDash([]);
        // Label
        ctx.fillStyle = bord; ctx.font = '7px monospace'; ctx.textAlign = 'left';
        ctx.fillText(fvg.isBull ? 'FVG▲' : 'FVG▼', 4, yTop - 1);
      }
      ctx.restore();
    }


        // -- Trend Lines --
    if (typeof OV !== 'undefined' && OV.tl && typeof analysisResult !== 'undefined' && analysisResult.trendLines) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT-2, chartW, H-PT-PB+4); ctx.clip();
      for (const tl of analysisResult.trendLines) {
        const _tlcol = tl.isSupport ? '#00e5a0' : '#ff3d5a';
        ctx.strokeStyle = _tlcol + (tl.touches >= 3 ? 'cc' : '77');
        ctx.lineWidth   = tl.touches >= 3 ? 1.5 : 1;
        ctx.setLineDash([6, 3]);
        ctx.beginPath();
        ctx.moveTo(0,      py(tl.slope * start + tl.intcp, lo, hi, H, PT, PB));
        ctx.lineTo(chartW, py(tl.slope * end   + tl.intcp, lo, hi, H, PT, PB));
        ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = _tlcol + '99';
        for (const idx of (tl.touchIdxs || [])) {
          if (idx < start || idx >= end) continue;
          const _tx = (idx - start) * b + b / 2;
          ctx.beginPath(); ctx.arc(Math.round(_tx), Math.round(py(tl.slope*idx+tl.intcp,lo,hi,H,PT,PB)), 3, 0, Math.PI*2); ctx.fill();
        }
        const _ly = py(tl.currentY, lo, hi, H, PT, PB);
        if (_ly > PT && _ly < H - PB) {
          ctx.fillStyle = _tlcol+'dd'; ctx.font='7px monospace'; ctx.textAlign='right';
          ctx.fillText((tl.isSupport?'TLS':'TLR')+'x'+tl.touches, chartW-2, _ly-2);
        }
      }
      ctx.restore();
    }

// ── S/R Level Bands ──
    if (typeof OV !== 'undefined' && OV.sr && typeof analysisResult !== 'undefined' && analysisResult.srLevels) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      const srBandH = (typeof analysisResult.atr !== 'undefined') ? analysisResult.atr * 0.5 : 0;
      for (const sr of analysisResult.srLevels) {
        const yMid = py(sr.price,           lo, hi, H, PT, PB);
        const yTop = py(sr.price + srBandH, lo, hi, H, PT, PB);
        const yBot = py(sr.price - srBandH, lo, hi, H, PT, PB);
        const zH   = Math.max(2, yBot - yTop);
        const col  = sr.isSupport ? '#00e5a0' : '#ff3d5a';
        const fillA = sr.strong ? '22' : '0d';
        const lineA = sr.strong ? 'cc' : '55';
        ctx.fillStyle = col + fillA;
        ctx.fillRect(0, yTop, chartW, zH);
        ctx.strokeStyle = col + lineA;
        ctx.lineWidth = sr.strong ? 1.5 : 0.8;
        ctx.setLineDash(sr.strong ? [] : [4, 4]);
        ctx.beginPath(); ctx.moveTo(0, Math.round(yMid)+0.5); ctx.lineTo(chartW, Math.round(yMid)+0.5); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = col + 'cc'; ctx.font = (sr.strong ? 'bold ' : '') + '8px monospace'; ctx.textAlign = 'left';
        ctx.fillText((sr.isSupport ? 'S' : 'R') + (sr.strong ? '★' : '') + '×' + sr.touches, 3, yMid - 2);
        const srDp = getDP(currentSymbol);
        ctx.fillStyle = col + 'dd';
        ctx.fillRect(chartW + 1, yMid - 8, PAXIS - 2, 13);
        ctx.fillStyle = '#000'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
        ctx.fillText(sr.price.toFixed(srDp), chartW + 3, yMid + 3);
      }
      ctx.restore();
    }


    // ── Spike-and-Continue markers ──
    if (typeof analysisResult !== 'undefined' && analysisResult.recentSpikeEvents) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT-2, chartW, H-PT-PB+4); ctx.clip();
      for (const spk of analysisResult.recentSpikeEvents) {
        if (spk.idx < start || spk.idx >= end) continue;
        const _scx = (spk.idx - start) * b + b / 2;
        const _isBullSpk = spk.dir === 'bull';
        const _slvl = _isBullSpk ? spk.spikeLow : spk.spikeHigh;
        const _ySlvl = py(_slvl, lo, hi, H, PT, PB);
        ctx.strokeStyle = '#ffa500aa'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(Math.max(0,_scx-b*2),_ySlvl); ctx.lineTo(Math.min(chartW,_scx+b*8),_ySlvl); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ffa500'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
        const _label = '\u26a1' + (_isBullSpk ? '\u25b2' : '\u25bc');
        ctx.fillText(_label, Math.round(_scx), _isBullSpk ? _ySlvl+14 : _ySlvl-6);
      }
      ctx.restore();
    }

    // ── Candle Pattern labels ──
    if (typeof analysisResult !== 'undefined' && analysisResult.candlePatterns) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT-2, chartW, H-PT-PB+4); ctx.clip();
      for (const pat of analysisResult.candlePatterns) {
        if (pat.idx < start || pat.idx >= end || pat.strength < 2) continue;
        const _pcx = (pat.idx - start) * b + b / 2;
        const _pc  = state.candles[pat.idx];
        if (!_pc) continue;
        const _pBull = pat.dir === 'bull';
        const _pCol  = _pBull ? '#00e5a0' : pat.dir === 'bear' ? '#ff3d5a' : '#ffa500';
        const _pY    = py(_pBull ? _pc.low : _pc.high, lo, hi, H, PT, PB) + (_pBull ? 16 : -8);
        ctx.fillStyle = _pCol + 'dd';
        ctx.font = 'bold ' + (pat.strength >= 3 ? '8' : '7') + 'px monospace';
        ctx.textAlign = 'center';
        // Short label
        const _lbl = pat.name.length > 8 ? pat.name.slice(0,8) : pat.name;
        ctx.fillText((_pBull ? '▲ ' : '▼ ') + _lbl, Math.round(_pcx), Math.round(_pY));
      }
      ctx.restore();
    }

    // ── Spike bar highlights ──
    if (typeof analysisResult !== 'undefined' && analysisResult.spikeFlags) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      const sf2 = analysisResult.spikeFlags;
      const slice3 = state.candles.slice(start, end);
      slice3.forEach((c, i) => {
        const globalIdx = start + i;
        if (!sf2[globalIdx]) return;
        const cx2 = i * b + b / 2;
        const hw2 = Math.max(1, b * 0.44);
        // Faint orange overlay on spike bars
        ctx.fillStyle = 'rgba(255,165,0,0.12)';
        ctx.fillRect(Math.round(cx2 - hw2), PT, Math.round(hw2 * 2), H - PT - PB);
        // ⚡ label at top
        ctx.fillStyle = '#ffa500cc'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText('⚡', Math.round(cx2), PT + 10);
      });
      ctx.restore();
    }

    // ── OB Filled Rectangles ──
    if (typeof OV !== 'undefined' && OV.ob && typeof obArray !== 'undefined') {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      for (const ob of obArray.slice(-CFG.maxOBs)) {
        if (ob.mitigated) continue;
        const obStartX = (ob.idx - start) * b;
        const yTop = py(ob.top,    lo, hi, H, PT, PB);
        const yBot = py(ob.bottom, lo, hi, H, PT, PB);
        const obH  = Math.max(1, yBot - yTop);
        const col  = ob.isHPZ ? (ob.isBull ? '#1de9b6' : '#ff5252') : (ob.isBull ? '#00e5a0' : '#ff3d5a');
        // Filled zone from OB bar to right edge
        ctx.fillStyle = col + (ob.isHPZ ? '18' : '0e');
        ctx.fillRect(Math.max(0, obStartX), yTop, chartW - Math.max(0, obStartX), obH);
        // Top border
        ctx.strokeStyle = col + (ob.isHPZ ? 'cc' : '88');
        ctx.lineWidth = ob.isHPZ ? 1.5 : 1;
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(Math.max(0, obStartX), yTop); ctx.lineTo(chartW, yTop); ctx.stroke();
        // Bottom border
        ctx.strokeStyle = col + '55';
        ctx.beginPath(); ctx.moveTo(Math.max(0, obStartX), yBot); ctx.lineTo(chartW, yBot); ctx.stroke();
        // POC line
        const yPoc = py(ob.poc, lo, hi, H, PT, PB);
        ctx.strokeStyle = col + '44'; ctx.lineWidth = 1; ctx.setLineDash([2,3]);
        ctx.beginPath(); ctx.moveTo(Math.max(0, obStartX), yPoc); ctx.lineTo(chartW, yPoc); ctx.stroke();
        ctx.setLineDash([]);
        // Score label at right edge
        ctx.fillStyle = col + 'cc'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'right';
        ctx.fillText((ob.isHPZ ? '★' : '') + sf(ob.score,0) + '%', chartW - 2, yTop + 9);
      }
      ctx.restore();
    }

    // ── EMA Lines ──
    if (typeof OV !== 'undefined' && OV.ema && typeof analysisResult !== 'undefined' && analysisResult.ema20) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      const emaLines = [
        { data: analysisResult.ema20,  color: '#00b4d8', label: 'E20' },
        { data: analysisResult.ema50,  color: '#ffa500', label: 'E50' },
        { data: analysisResult.ema200, color: '#ff3d5a', label: 'E200' },
      ];
      for (const el of emaLines) {
        if (!el.data || el.data.length < end) continue;
        ctx.strokeStyle = el.color + '99'; ctx.lineWidth = 1; ctx.setLineDash([]);
        ctx.beginPath();
        let first = true;
        for (let i = start; i < end; i++) {
          if (!el.data[i]) continue;
          const x = (i - start) * b + b / 2;
          const y = py(el.data[i], lo, hi, H, PT, PB);
          if (first) { ctx.moveTo(x, y); first = false; } else { ctx.lineTo(x, y); }
        }
        ctx.stroke();
        // Label at right edge
        const lastVal = el.data[end - 1];
        if (lastVal) {
          const ly = py(lastVal, lo, hi, H, PT, PB);
          ctx.fillStyle = el.color + 'cc'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
          ctx.fillText(el.label, chartW + 2, ly + 3);
        }
      }
      ctx.restore();
    }

    // ── Candles ──
    const slice = state.candles.slice(start, end);
    ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
    slice.forEach((c, i) => {
      const cx = i * b + b / 2;
      if (cx < -b || cx > chartW + b) return;
      const oY = py(c.open,  lo, hi, H, PT, PB);
      const cY = py(c.close, lo, hi, H, PT, PB);
      const hY = py(c.high,  lo, hi, H, PT, PB);
      const lY = py(c.low,   lo, hi, H, PT, PB);
      const bull = c.close >= c.open;
      const col  = bull ? '#00e5a0' : '#ff3d5a';
      const bdy  = Math.max(1, Math.abs(cY - oY));
      const hw   = Math.max(0.5, b * 0.42);
      ctx.strokeStyle = bull ? '#00d090' : '#e02040';
      ctx.lineWidth = Math.max(0.5, b * 0.08);
      ctx.beginPath();
      ctx.moveTo(Math.round(cx), Math.round(hY));
      ctx.lineTo(Math.round(cx), Math.round(Math.min(oY, cY)));
      ctx.moveTo(Math.round(cx), Math.round(Math.max(oY, cY)));
      ctx.lineTo(Math.round(cx), Math.round(lY));
      ctx.stroke();
      ctx.fillStyle = col;
      ctx.fillRect(Math.round(cx - hw), Math.round(Math.min(oY, cY)), Math.round(hw * 2), Math.round(bdy));
    });
    ctx.restore();

    // ── Volume Bars ──
    if (VOL_H > 0 && slice.length > 0) {
      const maxVol = Math.max(...slice.map(c => c.volume || 0)) || 1;
      const volY0 = H - VOL_H;
      ctx.save(); ctx.beginPath(); ctx.rect(0, volY0, chartW, VOL_H); ctx.clip();
      ctx.strokeStyle = '#0c1e2c'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, volY0); ctx.lineTo(chartW, volY0); ctx.stroke();
      slice.forEach((c, i) => {
        const cx = i * b + b / 2;
        const hw = Math.max(0.5, b * 0.4);
        const vh = ((c.volume || 0) / maxVol) * (VOL_H - 4);
        const bull = c.close >= c.open;
        ctx.fillStyle = bull ? '#00e5a033' : '#ff3d5a33';
        ctx.fillRect(Math.round(cx - hw), volY0 + (VOL_H - 4 - vh), Math.round(hw * 2), Math.max(1, vh));
      });
      ctx.restore();
    }

    // ── Liquidity Sweep markers ──
    if (typeof OV !== 'undefined' && OV.sweep && typeof analysisResult !== 'undefined' && analysisResult.recentSweeps) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, PT - 2, chartW, H - PT - PB + 4); ctx.clip();
      for (const sw of analysisResult.recentSweeps) {
        if (sw.idx < start || sw.idx >= end) continue;
        const cx = (sw.idx - start) * b + b / 2;
        const c  = state.candles[sw.idx];
        if (!c) continue;
        const above = sw.dir === 'bear';
        const sy = py(above ? c.high : c.low, lo, hi, H, PT, PB) + (above ? -15 : 15);
        ctx.fillStyle = '#ffa500cc'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
        ctx.fillText(above ? '⚡' : '⚡', Math.round(cx), Math.round(sy));
        ctx.fillStyle = '#ffa50066'; ctx.font = '7px monospace';
        ctx.fillText(above ? 'SWEEP' : 'SWEEP', Math.round(cx), Math.round(sy) + (above ? -5 : 9));
      }
      ctx.restore();
    }

    // ── Price lines (SL/TP/MSB/FS) ──
    if (!OV || OV.sltp || OV.msb) {
      ctx.save(); ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();
      for (const pl of state.priceLines) {
        const y = py(pl.price, lo, hi, H, PT, PB);
        if (y < -2 || y > H + 2) continue;
        const rawCol = pl.color || '#ffffff';
        const col = rawCol.length >= 8 ? rawCol.slice(0, 7) : rawCol;
        ctx.strokeStyle = col + 'cc'; ctx.lineWidth = pl.lineWidth || 1;
        ctx.setLineDash(pl.lineStyle === 2 ? [6, 4] : pl.lineStyle === 1 ? [3, 3] : []);
        ctx.beginPath(); ctx.moveTo(0, Math.round(y) + 0.5); ctx.lineTo(chartW, Math.round(y) + 0.5); ctx.stroke();
        ctx.setLineDash([]);
        if (pl.axisLabelVisible && pl.title) {
          ctx.font = 'bold 9px monospace';
          const lx = chartW + 1;
          ctx.fillStyle = col + 'dd';
          ctx.fillRect(lx, y - 9, PAXIS - 2, 14);
          ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left';
          ctx.fillText(pl.title, lx + 3, y + 3);
        }
      }
      ctx.restore();
    }

    // ── Markers ──
    for (const m of state.markers) {
      const ci = state.candles.findIndex(c => c.time === m.time);
      if (ci < start || ci >= end) continue;
      const cx = (ci - start) * b + b / 2;
      const c  = state.candles[ci];
      const above = m.position === 'aboveBar';
      const my = py(above ? c.high : c.low, lo, hi, H, PT, PB) + (above ? -11 : 11);
      ctx.fillStyle = m.color || '#fff';
      ctx.font = (m.size > 1 ? 'bold 9px' : '7px') + ' monospace'; ctx.textAlign = 'center';
      ctx.fillText(m.shape === 'arrowUp' ? '▲' : m.shape === 'arrowDown' ? '▼' : '●', Math.round(cx), Math.round(my));
    }

    // ── Crosshair ──
    if (state.crossX >= 0 && state.crossX <= chartW) {
      ctx.strokeStyle = '#2a5070'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(Math.round(state.crossX) + 0.5, 0); ctx.lineTo(Math.round(state.crossX) + 0.5, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, Math.round(state.crossY) + 0.5); ctx.lineTo(chartW, Math.round(state.crossY) + 0.5); ctx.stroke();
      ctx.setLineDash([]);
      const cdp = getDP(currentSymbol);
      const cp  = hi - ((state.crossY - PT) / (H - PT - PB) * (hi - lo));
      ctx.fillStyle = '#0d2030'; ctx.fillRect(chartW + 1, state.crossY - 9, PAXIS - 2, 14);
      ctx.fillStyle = '#00b4d8'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'right';
      ctx.fillText(cp.toFixed(cdp), W - 3, state.crossY + 3);
      const bi = start + Math.floor(state.crossX / b);
      if (bi >= 0 && bi < state.candles.length) {
        const bc  = state.candles[bi];
        const bull = bc.close >= bc.open;
        ctx.fillStyle = 'rgba(5,10,14,0.85)'; ctx.fillRect(0, 0, 400, 22);
        ctx.fillStyle = bull ? '#00e5a0' : '#ff3d5a'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
        const bdp = getDP(currentSymbol);
        ctx.fillText('O:' + bc.open.toFixed(bdp) + '  H:' + bc.high.toFixed(bdp) + '  L:' + bc.low.toFixed(bdp) + '  C:' + bc.close.toFixed(bdp), 6, 14);
      }
    }

    // ── Current price line ──
    if (state.candles.length) {
      const last = state.candles[state.candles.length - 1];
      const y    = py(last.close, lo, hi, H, PT, PB);
      if (y >= PT && y <= H - PB) {
        const bull = last.close >= last.open;
        ctx.strokeStyle = bull ? '#00e5a044' : '#ff3d5a44'; ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
        ctx.beginPath(); ctx.moveTo(0, Math.round(y) + 0.5); ctx.lineTo(chartW, Math.round(y) + 0.5); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = bull ? '#00e5a0' : '#ff3d5a';
        ctx.fillRect(chartW + 1, y - 9, PAXIS - 2, 14);
        ctx.fillStyle = '#000'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
        ctx.fillText(last.close.toFixed(getDP(currentSymbol)), chartW + 4, y + 3);
      }
    }
  }

  return { createChart };
})();

// ═══════════════════════════════════════════════════════════════
// PER-SYMBOL PROFILES — drives ALL SL/TP/entry decisions
// Each symbol has a distinct character that must be respected:
//
// Jump indices:  Random spike candles — SL MUST clear the spike ATR
//                not just normal ATR. Entry only on confirmed BOS+OB.
//                Never trade against trend on Jump.
//
// Boom/Crash:    Strong directional trend + infrequent spikes.
//                Wide SL beyond the trend channel. TP is large.
//                Boom = mostly uptrend, Crash = mostly downtrend.
//
// Volatility:    Classic range + trend. ATR-based SL is fine but
//                must be scaled by vol level. R_10 very tight,
//                R_100 needs much wider SL.
//
// Step:          Very small moves. Tightest SL, smallest TP.
// ═══════════════════════════════════════════════════════════════
function getSymbolProfile(sym) {
  const s = sym || currentSymbol;
  // type: 'jump' | 'boom' | 'crash' | 'vol' | 'step' | 'vol1s'
  // slAtrMult: base SL ATR multiplier for this symbol type
  // tpAtrMult: base TP ATR multiplier
  // spikeGuard: extra ATR added to SL to clear spike wicks
  // minSlPct:   minimum SL as % of price (floor — never tighter than this)
  // maxSlPct:   maximum SL as % of price (cap — never wider than this)
  // entryFilter: how strict confirmation must be before entry
  //   'strict' = needs OB + MSB + FS all aligned
  //   'normal' = OB + MSB
  //   'loose'  = MSB only
  const profiles = {
    // ── Jump Indices ──────────────────────────────────────────
    // Jump spikes are RANDOM and instant. SL must be wider than spike ATR.
    // A 1-bar spike on JD100 can be 300+ points. Use 3x ATR minimum.
    JD10:  { type:'jump', slAtrMult:3.5, tpAtrMult:5.0, spikeGuard:1.5, minSlPct:0.3, maxSlPct:4.0, entryFilter:'strict', trendBias: null },
    JD25:  { type:'jump', slAtrMult:3.5, tpAtrMult:5.0, spikeGuard:1.5, minSlPct:0.3, maxSlPct:4.0, entryFilter:'strict', trendBias: null },
    JD50:  { type:'jump', slAtrMult:3.0, tpAtrMult:4.5, spikeGuard:1.2, minSlPct:0.25,maxSlPct:3.5, entryFilter:'strict', trendBias: null },
    JD75:  { type:'jump', slAtrMult:3.0, tpAtrMult:4.5, spikeGuard:1.2, minSlPct:0.25,maxSlPct:3.5, entryFilter:'strict', trendBias: null },
    JD100: { type:'jump', slAtrMult:2.8, tpAtrMult:4.0, spikeGuard:1.0, minSlPct:0.2, maxSlPct:3.0, entryFilter:'strict', trendBias: null },
    // ── Boom indices ─────────────────────────────────────────
    // Boom trends UP with sudden DOWN spikes. Only trade LONG (with trend).
    // Short positions get destroyed by the uptrend between spikes.
    BOOM1000: { type:'boom', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bull', waitSpike: true },
    BOOM500:  { type:'boom', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bull', waitSpike: true },
    BOOM300:  { type:'boom', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bull', waitSpike: true },
    // ── Crash indices ────────────────────────────────────────
    // Crash trends DOWN with sudden UP spikes. Only trade SHORT (with trend).
    CRASH1000: { type:'crash', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bear', waitSpike: true },
    CRASH500:  { type:'crash', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bear', waitSpike: true },
    CRASH300:  { type:'crash', slAtrMult:2.5, tpAtrMult:6.0, spikeGuard:2.0, minSlPct:0.3, maxSlPct:5.0, entryFilter:'strict', trendBias:'bear', waitSpike: true },
    // ── Volatility indices ───────────────────────────────────
    R_10:  { type:'vol', slAtrMult:1.5, tpAtrMult:2.5, spikeGuard:0.2, minSlPct:0.04,maxSlPct:0.8,  entryFilter:'normal', trendBias: null },
    R_25:  { type:'vol', slAtrMult:1.5, tpAtrMult:2.5, spikeGuard:0.2, minSlPct:0.06,maxSlPct:0.9,  entryFilter:'normal', trendBias: null },
    R_50:  { type:'vol', slAtrMult:1.8, tpAtrMult:2.8, spikeGuard:0.5, minSlPct:0.10,maxSlPct:1.2,  entryFilter:'normal', trendBias: null, waitSpike: true },
    R_75:  { type:'vol', slAtrMult:2.0, tpAtrMult:3.0, spikeGuard:0.8, minSlPct:0.15,maxSlPct:1.5,  entryFilter:'normal', trendBias: null, waitSpike: true },
    R_100: { type:'vol', slAtrMult:2.0, tpAtrMult:3.0, spikeGuard:0.8, minSlPct:0.15,maxSlPct:1.5,  entryFilter:'normal', trendBias: null, waitSpike: true },
    // ── 1-second Volatility ──────────────────────────────────
    '1HZ10V':  { type:'vol1s', slAtrMult:2.0, tpAtrMult:3.5, spikeGuard:0.5, minSlPct:0.06,maxSlPct:2.0, entryFilter:'normal', trendBias: null },
    '1HZ25V':  { type:'vol1s', slAtrMult:2.0, tpAtrMult:3.5, spikeGuard:0.4, minSlPct:0.08,maxSlPct:2.0, entryFilter:'normal', trendBias: null },
    '1HZ50V':  { type:'vol1s', slAtrMult:1.8, tpAtrMult:3.2, spikeGuard:0.5, minSlPct:0.10,maxSlPct:2.5, entryFilter:'normal', trendBias: null },
    '1HZ75V':  { type:'vol1s', slAtrMult:1.8, tpAtrMult:3.0, spikeGuard:0.6, minSlPct:0.12,maxSlPct:2.5, entryFilter:'normal', trendBias: null },
    '1HZ100V': { type:'vol1s', slAtrMult:1.8, tpAtrMult:3.0, spikeGuard:0.6, minSlPct:0.15,maxSlPct:3.0, entryFilter:'normal', trendBias: null },
    // ── Step Index ───────────────────────────────────────────
    STPRNG:    { type:'step', slAtrMult:3.0, tpAtrMult:5.0, spikeGuard:0.0, minSlPct:0.03,maxSlPct:0.5, entryFilter:'loose', trendBias: null },
    // ── Range Break ──────────────────────────────────────────
    RNGBR100:  { type:'range', slAtrMult:2.0, tpAtrMult:4.0, spikeGuard:0.3, minSlPct:0.1, maxSlPct:2.0, entryFilter:'normal', trendBias: null },
    RNGBR200:  { type:'range', slAtrMult:2.0, tpAtrMult:4.0, spikeGuard:0.3, minSlPct:0.1, maxSlPct:2.0, entryFilter:'normal', trendBias: null },
    // ── Drift Switch ─────────────────────────────────────────
    DSW10:     { type:'drift', slAtrMult:2.2, tpAtrMult:3.5, spikeGuard:0.4, minSlPct:0.1, maxSlPct:2.0, entryFilter:'normal', trendBias: null },
  };
  return profiles[s] || { type:'vol', slAtrMult:1.8, tpAtrMult:3.0, spikeGuard:0.5, minSlPct:0.1, maxSlPct:2.5, entryFilter:'normal', trendBias: null };
}

// Legacy shim — keep getSymbolVolScale working for anything that still calls it

  const p = getSymbolProfile(sym || currentSymbol);
  return p.slAtrMult / 1.2; // normalise to old scale
}
